<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HospesAI</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<meta name="theme-color" content="#1855A3" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Neutralna chłodna paleta szarości (przedtem ciepłe kremowe było zbyt żółtawe).
     Tailwind slate/zinc inspirowane — czystszy, nowoczesny look. */
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --surface2: #ECEEF1;
  --surface3: #E1E4E8;
  --border: #D4D7DD;
  --border2: #B7BCC4;
  --text: #1A1917;
  --text2: #6B6860;
  --text3: #A09D97;
  --blue: #1855A3;
  --blue-light: #E6EDF8;
  --blue-dark: #0C3B7A;
  --blue-mid: #B5CAEE;
  --green: #2A6812;
  --green-light: #E4F0DE;
  --green-mid: #6DB049;
  --orange: #B05810;
  --orange-light: #FAF0E6;
  --orange-border: #EEC298;
  --red: #A31E1E;
  --red-light: #FAE8E8;
  --red-border: #F0BBBB;
  --yellow: #8A6200;
  --yellow-light: #FDF6DC;
  --yellow-border: #F0D566;
  --violet: #7C3AED;       /* fiolet z logo (prawa półkula AI) */
  --violet-light: #EDE9FE; /* light violet bg, light mode */
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 18px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
}

[data-theme="dark"] {
  --bg: #111110;
  --surface: #1C1B1A;
  --surface2: #242320;
  --surface3: #2C2B28;
  --border: #323028;
  --border2: #434038;
  --text: #ECEAE4;
  --text2: #9C9A94;
  --text3: #68665E;
  --blue: #4D8ED9;
  --blue-light: #192840;
  --blue-dark: #6AAFF0;
  --blue-mid: #1C3450;
  --green: #5ABF38;
  --green-light: #182E0E;
  --green-mid: #3A7820;
  --orange: #D98228;
  --orange-light: #2A1A06;
  --orange-border: #6A3C0E;
  --red: #D93E3E;
  --red-light: #2A0E0E;
  --red-border: #5A1616;
  --yellow: #D9B43A;
  --yellow-light: #2A2006;
  --yellow-border: #6A5010;
  --violet: #A78BFA;       /* fiolet w dark mode — light variant for visibility */
  --violet-light: #2E1D5C; /* ciemny fiolet bg dla dark mode */
}

body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── LAYOUT ─── */
.shell { display: flex; flex-direction: row; min-height: 100vh; }

/* ─── SIDEBAR (lewy panel z brand + nav + user) ─── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  padding: 14px 10px 12px;
  z-index: 50;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 9px; padding: 4px 8px 16px;
  color: var(--blue); border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.sidebar-brand h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }

.sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
.nav-btn {
  padding: 8px 12px; border-radius: var(--radius); border: none;
  background: transparent; color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: all 0.1s;
  display: flex; align-items: center; gap: 9px; text-align: left; width: 100%;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
.nav-btn svg { stroke: currentColor; flex-shrink: 0; }

.sidebar-footer {
  padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px;
}
.sidebar-user {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius);
}
.sidebar-user-name { font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-user-role { font-size: 9px; padding: 2px 6px; border-radius: 99px; font-weight: 700; }

/* ─── TOP BAR (cienki, tylko gdy potrzebny — Obiekty z search) ─── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 40; height: 48px;
}
.topbar-spacer { flex: 1; }
.topbar-greeting {
  flex: 1; display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text2);
}
.topbar-greeting-main { font-weight: 600; color: var(--text); }
.topbar-greeting-sep { color: var(--text3); }
.topbar-greeting-date { color: var(--text2); font-family: inherit; font-variant-numeric: tabular-nums; font-size: 12px; }

.search-wrap { flex: 1; max-width: 320px; position: relative; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 28px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--surface2); font-size: 13px;
  color: var(--text); outline: none; font-family: inherit; font-variant-numeric: tabular-nums; transition: border-color 0.12s;
}
.search-wrap input:focus { border-color: var(--blue); background: var(--surface); }
.search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }

.icon-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 5px 10px; cursor: pointer; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; font-size: 12px;
  display: flex; align-items: center; gap: 5px; transition: background 0.1s;
}
.icon-btn:hover { background: var(--border); }

.main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.main { padding: 20px; flex: 1; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ─── HAMBURGER + MOBILE DRAWER (v3.11) ─────────────────────────
   Desktop (≥720px): sidebar to standardowy column flex (220px sticky).
   Mobile (<720px):  sidebar to drawer — slide-in z lewej, hamburger w topbarze. */
.hamburger-btn {
  display: none;  /* domyślnie schowany, włączamy w @media */
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 8px; cursor: pointer;
  color: var(--text); align-items: center; justify-content: center;
}
.hamburger-btn:hover { background: var(--border); }
.hamburger-btn svg { display: block; }

.sidebar-close {
  display: none;  /* tylko mobile */
  position: absolute; top: 10px; right: 8px;
  background: transparent; border: none; padding: 6px; cursor: pointer;
  color: var(--text2); border-radius: var(--radius);
}
.sidebar-close:hover { background: var(--surface2); color: var(--text); }

.mobile-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 150;
  animation: backdropFade 0.18s ease-out;
}
@keyframes backdropFade { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 720px) {
  /* Sidebar drawer — height: 100dvh (dynamic viewport height).
     Historia bólu:
     - v3.12: height: 100dvh — czasem renderowane jako za małe, sidebar krótszy
       niż widoczny ekran, widać było main content pod footerem
     - v3.14: height: auto + top:0 + bottom:0 — sidebar sięgał za daleko (za system
       nav Androida?), footer admin/Wyloguj był ukryty
     - v3.15: wracamy do 100dvh, ale BEZ konfliktów (bez bottom:0, bez padding ze
       safe-area, które poprzednio robiły zamieszanie). 100dvh = aktualne widoczne
       pole, dynamicznie reaguje na URL bar. Footer zawsze na dnie viewport'u.
     dvh wspierane w Chrome 108+, Safari 15.4+, Firefox 101+. Fallback do base
     CSS `height: 100vh` jeśli przeglądarka nie zna dvh. */
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 260px;
    height: 100dvh;
    transform: translateX(-100%);
    transition: transform 0.25s ease-out;
    box-shadow: 4px 0 16px rgba(0, 0, 0, 0.18);
    z-index: 200;
    padding: 14px 10px 16px;  /* prosty bottom padding, bez safe-area magii */
  }
  .sidebar.is-open { transform: translateX(0); }
  .sidebar-close { display: flex; align-items: center; justify-content: center; }
  .sidebar-brand { padding-right: 38px; }
  /* Shell pełny width — sidebar jest fixed, nie zajmuje miejsca w flow */
  .shell { flex-direction: row; }
  .main-area { width: 100%; min-width: 0; }
  .hamburger-btn { display: flex; }

  /* Topbar */
  .topbar { padding: 0 12px; gap: 8px; }
  .topbar-greeting { font-size: 12px; gap: 4px; min-width: 0; overflow: hidden; }
  .topbar-greeting-main { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-greeting-date { display: none; }
  /* Icon-only buttons na mobile — label schowany przez .btn-lbl */
  .topbar .icon-btn .btn-lbl { display: none; }
  .topbar .icon-btn { padding: 6px 9px; gap: 0; }
  .topbar .icon-btn svg { width: 16px; height: 16px; }
  /* Main content padding */
  .main { padding: 14px; }

  /* ── Settings (cennik) — fix horizontal overflow ──
     Tabela ma sztywne grid-template-columns (5/6 kolumn) z inline-style.
     Wrapper .settings-table-wrap pozwala scrollować poziomo, a min-width na
     dzieciach gwarantuje że kolumny zachowują czytelne rozmiary. */
  .settings-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .settings-table-wrap > div { min-width: 580px; }

  /* ── Invoices filters — ctrl-group select pełna szerokość ── */
  .status-controls { gap: 6px; }
  .status-controls .ctrl-group { min-width: 0; flex: 1 1 calc(50% - 6px); }
  .status-controls .ctrl-group select,
  .status-controls .ctrl-group input { width: 100%; box-sizing: border-box; }

  /* ── AI tab — 2-column grid → 1-column na mobile ──
     grid auto-fit minmax(380px) na 360px viewport NIE działa (380 > 360).
     Force 1 column. */
  [style*="repeat(auto-fit,minmax(380px"] { grid-template-columns: 1fr !important; }

  /* ── Dashboard 3-col grid (Obłożenie + Przyjazdy + Wyjazdy) → 1-col ──
     Inline style "grid-template-columns:1fr 1fr 1fr" jest w 2 miejscach:
     dashboard hero strip i media inputs (Prąd/Gaz/Woda). Oba na 360px
     są za wąskie — ostatnia kolumna wystaje. Override na 1-col. */
  [style*="grid-template-columns:1fr 1fr 1fr"] { grid-template-columns: 1fr !important; }

  /* ── Charts: summary-strip hero-layout (4 cards) → 2x2 grid ──
     Default: 1.4fr 1fr 1fr 1fr (4 cols). Na 360px to ~80px każda — nieczytelne.
     Hero zostaje na pełną szerokość, pozostałe 3 robią 2+1. */
  .summary-strip.hero-layout { grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary-strip.hero-layout .sum-card.hero { grid-column: 1 / -1; }
  /* Default summary-strip (3 cards w Raportach) — też 2x2 (hero pełen) */
  .summary-strip { grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ── Reports: loc-finance-totals → stack 1-col na mobile ──
     5 kart (2 hero + 3 detale) — na 360px stack pionowy daje czytelny widok. */
  .loc-finance-totals,
  .loc-finance-totals.dual-hero-layout { grid-template-columns: 1fr; }
  .loc-finance-totals .loc-fin-stat,
  .loc-finance-totals .loc-fin-stat.hero,
  .loc-finance-totals.dual-hero-layout .loc-fin-stat,
  .loc-finance-totals.dual-hero-layout .loc-fin-stat.hero {
    grid-column: 1 / -1;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .loc-finance-totals .loc-fin-stat:last-child { border-bottom: none; }
  .loc-finance-totals .loc-fin-stat .v { font-size: 14px; }
  .loc-finance-totals .loc-fin-stat.hero .v { font-size: 19px; }

  /* Dual-hero summary-strip — też stack 1-col na mobile */
  .summary-strip.dual-hero-layout { grid-template-columns: 1fr; }
  .summary-strip.dual-hero-layout .sum-card,
  .summary-strip.dual-hero-layout .sum-card.hero { grid-column: 1 / -1; }

  /* ── Reports: report-row (4-col grid 1fr 1fr 1fr auto) → stack pionowo ──
     Na mobile 4 kolumny dają ~80px każda — wszystko się ucinało, ostatnia
     kolumna (kwota+edytuj) "uciekała w prawo". Stack 1-col z większym
     pionowym gap'em. */
  .report-row { grid-template-columns: 1fr; gap: 6px; padding: 12px 14px; }
  .report-row > div:nth-child(3),
  .report-row > div:nth-child(4) {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px dashed var(--border); padding-top: 6px;
  }
  .report-amount { text-align: left; }

  /* pay-strip already uses flex-wrap, just tighten gap na mobile */
  .pay-strip { gap: 12px; padding: 8px 14px; }

  /* ── Reports filter bar — ctrl-group items wrap nicely ── */
  .reports-toolbar { gap: 6px; }
}

/* ─── SECTION HEADER ─── */
.sec-label { font-size: 11px; color: var(--text3); margin-bottom: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

/* ─── LOCATION GRID ─── */
.loc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
.city-section { margin-bottom: 24px; }
.city-section-hdr {
  font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.city-section-hdr span {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 99px;
  font-size: 10px; padding: 1px 7px; color: var(--text3); font-weight: 600;
}
.loc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
}
.loc-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.loc-img { width: 100%; height: 100px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 44px; }
.loc-info { padding: 11px; }
.loc-name { font-size: 13px; font-weight: 600; margin-bottom: 1px; }
.loc-city { font-size: 11px; color: var(--text2); }
.loc-rooms { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: inherit; font-variant-numeric: tabular-nums; }

/* ─── STATUS TAB ─── */
.status-controls {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
}
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
.ctrl-group input[type=date] {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums;
  outline: none; transition: border-color 0.12s; cursor: pointer;
}
.ctrl-group input[type=date]:focus { border-color: var(--blue); background: var(--surface); }
.ctrl-search-btn {
  padding: 7px 18px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: background 0.12s; white-space: nowrap;
}
.ctrl-search-btn:hover { background: var(--blue-dark); }

/* Status overview grid — masonry-like, cards natural height */
/* ─── STATUS — accordion per obiekt, grid pokoi pod ─── */
.status-loc-grid {
  display: flex; flex-direction: column; gap: 10px;
}
.status-loc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
}
.status-loc-hdr {
  padding: 12px 14px; background: var(--surface2);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.12s;
}
.status-loc-card .status-loc-hdr { border-bottom: 1px solid var(--border); }
/* Gdy zwinięty, header ma pełny radius (bez border-bottom) */
.status-loc-card.is-collapsed .status-loc-hdr { border-radius: var(--radius-lg); border-bottom: none; }
.status-loc-hdr:hover { background: var(--surface3); }
.status-loc-hdr .loc-icon { font-size: 20px; }
.status-loc-hdr strong { font-size: 14px; font-weight: 700; }
.status-loc-hdr em { font-size: 11px; color: var(--text2); font-style: normal; }
.status-loc-hdr-meta { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text2); font-family: inherit; font-variant-numeric: tabular-nums; }
.status-loc-toggle { color: var(--text3); font-size: 13px; background: none; border: none; cursor: pointer; padding: 5px 9px; margin: -5px -4px -5px 0; border-radius: 7px; display: inline-flex; align-items: center; transition: transform 0.15s, background 0.12s, color 0.12s; }
.status-loc-toggle:hover { background: var(--surface); color: var(--text); }

.status-loc-body {
  padding: 0;
  display: grid;
  /* auto-fit zwija puste kolumny — obiekt z 1 pokojem nie ma 3 pustych miejsc */
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
}

.status-room-row {
  display: grid; grid-template-columns: 1fr auto;
  align-items: center; padding: 10px 14px; gap: 10px; font-size: 12px;
  border-top: 1px solid var(--border); border-right: 1px solid var(--border);
}
/* Ostatnia kolumna w rzędzie bez right border */
.status-room-row:nth-child(4n) { border-right: none; }
@media (max-width: 1100px) {
  .status-room-row:nth-child(3n) { border-right: none; }
  .status-room-row:nth-child(4n) { border-right: 1px solid var(--border); }
}
.status-room-row:last-child { border-bottom: none; }
.status-room-clickable { cursor: pointer; transition: background 0.12s; }
.status-room-clickable:hover { background: var(--blue-light); }
.status-room-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
.status-room-info { font-size: 11px; color: var(--text2); margin-top: 1px; }
.status-room-who {
  font-size: 11px; color: var(--text2); margin-top: 2px; display: flex;
  flex-direction: column; gap: 1px;
}
.status-room-who .who-name { font-weight: 600; color: var(--text); font-size: 12px; }
.status-room-who .who-name.who-company { color: #7B2FBE; }
.status-room-who .who-name.who-individual { color: var(--blue); }
[data-theme="dark"] .status-room-who .who-name.who-company { color: #B87FE8; }
.status-room-who .who-dates { font-family: inherit; font-variant-numeric: tabular-nums; font-size: 10px; color: var(--text3); }
.status-badge-col { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

/* Status detail view (single location) */
.status-detail-back {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; cursor: pointer;
  color: var(--text2); font-size: 13px; font-weight: 500;
}
.status-detail-back:hover { color: var(--blue); }
.status-detail-hdr {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.status-detail-hdr .big-icon { font-size: 28px; }
.status-detail-title { font-size: 16px; font-weight: 700; }
.status-detail-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

.status-results-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.status-result-header {
  padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.status-result-header .loc-icon { font-size: 20px; }
.status-result-header strong { font-size: 14px; font-weight: 700; }
.status-result-header span { font-size: 12px; color: var(--text2); margin-left: auto; font-family: inherit; font-variant-numeric: tabular-nums; }

.status-detail-row {
  display: grid; grid-template-columns: 180px 110px 1fr 140px;
  align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px; font-size: 13px;
}
.status-detail-row:last-child { border-bottom: none; }
.status-room-nm { font-weight: 600; }

.badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px;
  border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge::before {
  content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.badge-free { background: var(--green-light); color: var(--green); }
.badge-free::before { background: var(--green); }
.badge-occupied { background: var(--red-light); color: var(--red); }
.badge-occupied::before { background: var(--red); }
.badge-reserved { background: var(--yellow-light); color: var(--yellow); }
.badge-reserved::before { background: var(--yellow); }
.badge-blocked { background: var(--orange-light); color: var(--orange); }
.badge-blocked::before { background: var(--orange); }

.status-who { font-size: 12px; color: var(--text2); }
.status-dates { font-size: 11px; color: var(--text3); font-family: inherit; font-variant-numeric: tabular-nums; }

/* ─── STATUS TODAY GRID (fallback) ─── */
.status-today-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
.status-today-header { padding: 11px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.status-today-header strong { font-size: 13px; font-weight: 700; }
.status-today-header em { font-size: 11px; color: var(--text2); margin-left: auto; font-style: normal; }

/* ─── REPORTS TAB ─── */
.reports-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.reports-title { font-size: 17px; font-weight: 700; }

.summary-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.summary-strip.hero-layout { grid-template-columns: 1.4fr 1fr 1fr 1fr; }
/* Dual-hero (Przychód planowany + zrealizowany + 3 detale) — 6-col grid, 2 rzędy:
   - rząd 1: 2 hero spanują po 3 kol (każdy 50%)
   - rząd 2: 3 detale spanują po 2 kol (każdy 33%) */
.summary-strip.dual-hero-layout { grid-template-columns: repeat(6, 1fr); }
.summary-strip.dual-hero-layout .sum-card.hero { grid-column: span 3; }
.summary-strip.dual-hero-layout .sum-card:not(.hero) { grid-column: span 2; }
.sum-card.hero-cash { background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%); }
.sum-card.hero-cash .lbl { color: var(--blue); }
.sum-card.hero-cash .val { color: var(--blue); }
.hero-tag {
  display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 99px;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  background: var(--surface2); color: var(--text3); border: 1px solid var(--border);
  vertical-align: middle;
}
/* Per-location dual-hero: ten sam layout 6-col */
.loc-finance-totals.dual-hero-layout { grid-template-columns: repeat(6, 1fr); }
.loc-finance-totals.dual-hero-layout .loc-fin-stat.hero { grid-column: span 3; }
.loc-finance-totals.dual-hero-layout .loc-fin-stat:not(.hero) { grid-column: span 2; }
.loc-fin-stat.hero-cash { background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%); }
.loc-fin-stat.hero-cash .k { color: var(--blue); }
.loc-fin-stat.hero-cash .v { color: var(--blue); }
/* Borders w grid 2-row: prawej krawędzi nie dawać na last-in-row */
.loc-finance-totals.dual-hero-layout .loc-fin-stat:nth-child(2) { border-right: none; }  /* hero-cash = ostatni w rzędzie 1 */
.loc-finance-totals.dual-hero-layout .loc-fin-stat:nth-child(5) { border-right: none; }  /* Do pobrania = ostatni w rzędzie 2 */
.sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
.sum-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--border2); }
.sum-card.hero { background: linear-gradient(135deg, var(--green-light) 0%, var(--surface) 100%); border-color: var(--green-mid); }
.sum-card.hero:hover { border-color: var(--green); }
.sum-card .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 5px; }
.sum-card.hero .lbl { color: var(--green); }
.sum-card .val { font-size: 22px; font-weight: 700; font-family: inherit; font-variant-numeric: tabular-nums; }
.sum-card.hero .val { font-size: 28px; color: var(--green); }
.sum-card .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Location finance block */
.loc-finance-block {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  margin-bottom: 20px; overflow: hidden;
}
.loc-finance-hdr {
  padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.loc-finance-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
.loc-finance-sub { font-size: 11px; color: var(--text2); }
.loc-finance-totals {
  display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 0; border-bottom: 1px solid var(--border);
}
.loc-fin-stat {
  padding: 10px 14px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px;
}
.loc-fin-stat:last-child { border-right: none; }
.loc-fin-stat.hero { background: linear-gradient(135deg, var(--green-light) 0%, var(--surface) 100%); }
.loc-fin-stat .k { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.loc-fin-stat.hero .k { color: var(--green); }
.loc-fin-stat .v { font-size: 17px; font-weight: 700; font-family: inherit; font-variant-numeric: tabular-nums; }
.loc-fin-stat.hero .v { font-size: 22px; color: var(--green); }
.loc-fin-stat .sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
.loc-fin-stat .v.green { color: var(--green); }
.loc-fin-stat .v.orange { color: var(--orange); }
.loc-fin-stat .v.blue { color: var(--blue); }

.dash-action-btn {
  padding: 9px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums;
  transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.dash-action-btn svg { stroke: currentColor; }
.dash-action-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

/* city group header */
.city-group-hdr {
  font-size: 14px; font-weight: 800; color: var(--text); text-transform: uppercase; letter-spacing: 0.7px;
  padding: 8px 12px; margin: 24px 0 10px; display: flex; align-items: center; gap: 8px;
  border-bottom: 2px solid var(--blue); background: var(--blue-light); border-radius: var(--radius);
}

.report-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 14px; overflow: hidden; }
.report-block-hdr {
  padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.report-entity { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.report-total { background: var(--blue-light); color: var(--blue); padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; font-family: inherit; font-variant-numeric: tabular-nums; }

.report-row {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: center; font-size: 13px;
  transition: background 0.12s ease;
}
.report-row:hover { background: var(--surface2); }
.report-row:last-child { border-bottom: none; }
.report-guest { font-weight: 500; }
.report-sub { font-size: 11px; color: var(--text3); }
.report-dates-cell { font-size: 11px; color: var(--text2); font-family: inherit; font-variant-numeric: tabular-nums; }
.report-amount { font-weight: 700; font-family: inherit; font-variant-numeric: tabular-nums; text-align: right; }

.pm-badge { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 600; }
.pm-invoice { background: var(--blue-light); color: var(--blue); }
.pm-cash { background: var(--green-light); color: var(--green); }
.pm-transfer { background: var(--orange-light); color: var(--orange); }
.pm-pending { background: var(--surface3); color: var(--text2); }

.pay-strip { padding: 8px 16px; background: var(--surface2); font-size: 12px; display: flex; gap: 20px; flex-wrap: wrap; border-top: 1px solid var(--border); }
.pay-strip-item { display: flex; flex-direction: column; gap: 1px; }
.pay-strip-key { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.pay-strip-val { font-weight: 600; font-family: inherit; font-variant-numeric: tabular-nums; }
.pay-strip-val.ok { color: var(--green); }
.pay-strip-val.warn { color: var(--orange); }

/* ─── MEDIA SECTION (per room, in reports) ─── */
.media-loc-section { margin-bottom: 20px; }
.media-loc-title {
  font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; background: var(--orange-light); border: 1px solid var(--orange-border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0; color: var(--orange);
}
.media-room-block {
  border: 1px solid var(--orange-border); border-top: none; background: var(--surface);
}
.media-room-block:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
.media-room-hdr {
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); cursor: pointer; gap: 10px;
}
.media-room-hdr-title { font-size: 12px; font-weight: 600; }
.media-room-hdr-total { font-size: 11px; color: var(--orange); font-family: inherit; font-variant-numeric: tabular-nums; font-weight: 600; }
.media-room-body { padding: 12px 14px; }
.media-period-row {
  display: grid; grid-template-columns: 100px 1fr 1fr 1fr auto;
  gap: 8px; align-items: flex-end; margin-bottom: 8px;
}
.media-period-label { font-size: 11px; font-weight: 600; color: var(--text2); padding-top: 20px; font-family: inherit; font-variant-numeric: tabular-nums; }
.media-field { display: flex; flex-direction: column; gap: 3px; }
.media-field label { font-size: 10px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.media-field input {
  padding: 6px 8px; border: 1px solid var(--orange-border); border-radius: var(--radius);
  background: var(--surface); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none;
  width: 100%;
}
.media-field input:focus { border-color: var(--orange); }
.media-save-btn {
  padding: 6px 12px; background: var(--orange); color: white; border: none; border-radius: var(--radius);
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; white-space: nowrap;
}
.media-add-period-btn {
  background: none; border: 1px dashed var(--orange-border); border-radius: var(--radius);
  padding: 5px 12px; font-size: 11px; color: var(--orange); cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums;
  margin-top: 4px;
}
.media-add-period-btn:hover { background: var(--orange-light); }
.media-room-summary {
  margin-top: 8px; padding: 8px 10px; background: var(--orange-light); border-radius: var(--radius);
  font-size: 11px; color: var(--orange); font-family: inherit; font-variant-numeric: tabular-nums;
}
.media-price-breakdown {
  font-size: 11px; color: var(--text3); padding: 6px 14px 8px;
  border-top: 1px dashed var(--border);
}
.media-base { color: var(--text2); }
.media-plus { color: var(--orange); font-weight: 600; }
.media-total-price { color: var(--text); font-weight: 700; }

/* ─── ACTION BUTTONS ─── */
.action-row { display: flex; gap: 5px; justify-content: flex-end; }
.act-btn {
  padding: 3px 9px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 11px; font-weight: 500;
  color: var(--text2); transition: all 0.1s; font-family: inherit; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 3px;
}
.act-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
.act-btn.danger:hover { background: var(--red-light); color: var(--red); border-color: var(--red-border); }

/* ─── SETTINGS ─── */
.settings-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 14px; overflow: hidden; }
.settings-hdr { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 7px; }
.settings-row {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px;
}
.settings-row:last-child { border-bottom: none; }
.settings-room-nm { font-size: 13px; font-weight: 500; }
.settings-room-loc { font-size: 11px; color: var(--text2); }
.settings-inputs { display: flex; gap: 7px; }
.s-inp-grp { display: flex; flex-direction: column; gap: 2px; }
.s-inp-grp label { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.s-inp-grp input {
  width: 72px; padding: 5px 7px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); font-size: 12px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none;
}
.s-inp-grp input:focus { border-color: var(--blue); }
.save-btn {
  padding: 8px 18px; background: var(--blue); color: white; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: background 0.12s;
}
.save-btn:hover { background: var(--blue-dark); }

/* ─── MODAL ─── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 14px;
}
.modal {
  background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border);
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
}
.modal-hdr {
  padding: 16px 18px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); z-index: 2;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-hdr h2 { font-size: 16px; font-weight: 700; }
.modal-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.close-btn {
  background: var(--red-light); border: 1px solid var(--red-border); cursor: pointer; color: var(--red);
  font-size: 14px; padding: 4px 8px; border-radius: var(--radius); transition: all 0.1s; font-weight: 700;
}
.close-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }
.modal-body { padding: 16px; flex: 1; }

/* Step dots */
.step-nav { display: flex; align-items: center; gap: 5px; margin-bottom: 14px; }
.step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: all 0.2s; }
.step-dot.active { background: var(--blue); width: 20px; border-radius: 3px; }
.step-dot.done { background: var(--green-mid); }
.step-lbl { font-size: 11px; color: var(--text2); margin-left: 4px; }

/* Type selector */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.type-btn {
  padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-lg); background: var(--surface);
  cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; text-align: center; transition: all 0.15s; color: var(--text);
  display: flex; flex-direction: column; align-items: center;
}
.type-btn:hover { border-color: var(--border2); background: var(--surface2); }
.type-btn.sel { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.type-icon { font-size: 22px; display: block; margin-bottom: 4px; }
.type-lbl { font-size: 13px; font-weight: 600; display: block; }
.type-desc { font-size: 11px; color: var(--text2); margin-top: 3px; display: block; }
.type-btn.sel .type-desc { color: var(--blue); opacity: 0.8; }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 5px 11px; cursor: pointer; font-size: 15px; color: var(--text); line-height: 1;
}
.cal-nav-btn:hover { background: var(--border); }
.cal-month { font-size: 14px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 6px; }
.cal-dow { font-size: 9px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 12px; border-radius: 6px; cursor: pointer; border: none;
  background: transparent; color: var(--text); transition: background 0.1s, color 0.1s;
  font-family: inherit; font-variant-numeric: tabular-nums; width: 100%; position: relative;
}
.cal-day:hover:not([disabled]):not(.empty) { background: var(--surface2); }
.cal-day.empty { pointer-events: none; visibility: hidden; }
.cal-day[disabled] { color: var(--text3); cursor: default; opacity: 0.35; }
.cal-day.range-start { background: var(--blue) !important; color: #fff !important; border-radius: 6px 0 0 6px; }
.cal-day.range-end { background: var(--blue) !important; color: #fff !important; border-radius: 0 6px 6px 0; }
.cal-day.range-start.range-end { border-radius: 6px !important; }
.cal-day.in-range { background: var(--blue-mid); color: var(--text); border-radius: 0; }
.cal-day.today { font-weight: 700; color: var(--blue); }
.cal-day.blocked-day { background: var(--red-light); color: var(--red); cursor: default; }
.cal-day.reserved-day { background: var(--yellow-light); color: var(--yellow); cursor: default; }
.cal-legend { display: flex; gap: 12px; margin-bottom: 10px; font-size: 11px; color: var(--text2); flex-wrap: wrap; }
.legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; }

.cal-hint { font-size: 12px; color: var(--text2); text-align: center; min-height: 16px; margin-bottom: 10px; font-family: inherit; font-variant-numeric: tabular-nums; }

.check-btn {
  width: 100%; padding: 9px; background: var(--blue); color: white; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: background 0.12s;
}
.check-btn:hover:not([disabled]) { background: var(--blue-dark); }
.check-btn[disabled] { background: var(--surface2); color: var(--text3); cursor: default; }

/* Avail results */
.avail-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
.avail-ok-lbl { font-size: 13px; color: var(--green); margin-bottom: 8px; font-weight: 600; }
.room-option {
  display: block; width: 100%; text-align: left; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--surface); cursor: pointer; font-size: 13px;
  color: var(--text); margin-bottom: 7px; transition: all 0.1s; font-family: inherit; font-variant-numeric: tabular-nums;
}
.room-option:hover { background: var(--surface2); border-color: var(--border2); }
.room-option.sel { border-color: var(--blue); background: var(--blue-light); }
.room-meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: inherit; font-variant-numeric: tabular-nums; }
.continue-btn {
  width: 100%; padding: 9px; background: var(--green); color: white; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: background 0.12s; margin-top: 2px;
}
.continue-btn:hover { background: #1A4E0A; }
.no-avail-box { background: var(--red-light); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 12px 14px; }
.no-avail-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
.alt-line { font-size: 12px; color: var(--text2); margin-top: 5px; padding-left: 12px; position: relative; }
.alt-line::before { content: "·"; position: absolute; left: 4px; }

/* Booking form */
.price-box {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
}
.price-lbl { font-size: 12px; color: var(--text2); }
.price-breakdown { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: inherit; font-variant-numeric: tabular-nums; }
.price-val { font-size: 22px; font-weight: 700; font-family: inherit; font-variant-numeric: tabular-nums; }

.form-field { margin-bottom: 12px; }
.form-field label { font-size: 11px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-field input, .form-field select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none; transition: border-color 0.12s;
}
.form-field input:focus, .form-field select:focus { border-color: var(--blue); background: var(--surface); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-wrap { display: flex; flex-direction: column; gap: 3px; }
.field-wrap label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.field-wrap input {
  padding: 7px 9px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none; transition: border-color 0.12s;
  /* width: 100% + min-width: 0 — input nie wystaje poza grid-cell na mobile.
     Bez min-width: 0 input zachowuje intrinsic size (przeglądarki ~20 chars dla
     type=tel), co rozpychało .field-row 2-col grid → pole telefonu wystawało w prawo. */
  width: 100%; min-width: 0;
}
.field-row { min-width: 0; }
.field-wrap input:focus { border-color: var(--blue); background: var(--surface); }
.checkbox-row { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; margin-top: 6px; }
.checkbox-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--blue); }

/* Buffer field */
.buffer-field { margin-bottom: 12px; background: var(--yellow-light); border: 1px solid var(--yellow-border); border-radius: var(--radius); padding: 10px 12px; }
.buffer-field label { font-size: 11px; color: var(--yellow); font-weight: 600; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
.buffer-field input {
  width: 100%; padding: 6px 9px; border: 1px solid var(--yellow-border); border-radius: var(--radius);
  background: var(--surface); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none;
}
.buffer-hint { font-size: 11px; color: var(--yellow); margin-top: 4px; }

/* Payment section — simplified (no amount in booking step) */
.payment-section { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 12px; }
.payment-sec-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
.pm-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }
.pm-btn {
  padding: 7px 4px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface);
  cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; text-align: center; transition: all 0.12s; color: var(--text); font-size: 12px; font-weight: 500;
}
.pm-btn:hover { border-color: var(--border2); }
.pm-btn.sel { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.pm-btn .pmi { display: block; font-size: 15px; margin-bottom: 2px; }
.timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.timing-btn {
  padding: 7px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface);
  cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; text-align: center; transition: all 0.12s; color: var(--text); font-size: 12px; font-weight: 500;
}
.timing-btn.sel { border-color: var(--green); background: var(--green-light); color: var(--green); }
.pay-info-note { font-size: 11px; color: var(--text3); margin-top: 8px; font-style: italic; }

/* Guests */
.guests-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.guests-lbl { font-size: 14px; font-weight: 700; }
.add-guest-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 10px;
  font-size: 12px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 3px;
  transition: background 0.1s; font-family: inherit; font-variant-numeric: tabular-nums;
}
.add-guest-btn:hover { background: var(--surface2); }

.guest-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px; background: var(--surface); }
.guest-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.guest-num { font-size: 10px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.remove-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 3px 7px; border-radius: var(--radius); transition: all 0.1s; font-family: inherit; font-variant-numeric: tabular-nums; }
.remove-btn:hover { background: var(--red-light); color: var(--red); }

.cap-warning { background: var(--yellow-light); border: 1px solid var(--yellow-border); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: var(--yellow); }
.company-badge { font-size: 12px; background: var(--blue-light); color: var(--blue); padding: 6px 10px; border-radius: var(--radius); margin-bottom: 12px; font-weight: 600; }

/* Modal footer */
.modal-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px;
  position: sticky; bottom: 0; background: var(--surface); border-radius: 0 0 var(--radius-xl) var(--radius-xl);
}
.btn-back {
  flex: 1; padding: 9px; border: 1px solid var(--border); background: transparent;
  border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text);
  transition: background 0.1s; font-family: inherit; font-variant-numeric: tabular-nums;
}
.btn-back:hover { background: var(--surface2); }
.btn-confirm {
  flex: 2; padding: 9px; background: var(--blue); color: white; border: none;
  border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.12s; font-family: inherit; font-variant-numeric: tabular-nums;
}
.btn-confirm:hover:not([disabled]) { background: var(--blue-dark); }
.btn-confirm[disabled] { background: var(--surface2); color: var(--text3); cursor: default; }

/* Success */
.success-box { text-align: center; padding: 20px 0 6px; }
.success-icon { font-size: 48px; margin-bottom: 10px; }
.success-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.success-box p { font-size: 13px; color: var(--text2); }
.success-detail { background: var(--surface2); border-radius: var(--radius-lg); padding: 12px 14px; margin: 14px 0; text-align: left; }
.success-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.success-row:last-child { border-bottom: none; font-weight: 700; font-size: 13px; }
.success-row span:first-child { color: var(--text2); }
.done-btn {
  width: 100%; padding: 10px; background: var(--blue); color: white; border: none;
  border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums;
}
.done-btn:hover { background: var(--blue-dark); }

/* Edit modal */
.edit-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 14px; }
.edit-modal {
  background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border);
  width: 100%; max-width: 460px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg);
}
.edit-modal-hdr { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
.edit-modal-hdr h3 { font-size: 14px; font-weight: 700; }
.edit-modal-body { padding: 16px; }
.edit-field { margin-bottom: 12px; }
.edit-field label { font-size: 11px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
.edit-field input:not([type="checkbox"]):not([type="radio"]), .edit-field select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); font-size: 13px; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; outline: none; transition: border-color 0.12s;
}
.edit-field input[type="checkbox"], .edit-field input[type="radio"] { width: auto; }
.edit-field input:focus, .edit-field select:focus { border-color: var(--blue); background: var(--surface); }
.edit-conflict { font-size: 12px; color: var(--red); margin-top: 6px; }
.edit-extend-warn { background: var(--orange-light); border: 1px solid var(--orange-border); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--orange); margin-top: 8px; }
.edit-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 7px; }
.btn-danger { flex: 1; padding: 8px; background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; }
.btn-danger:hover { background: var(--red); color: white; }
.btn-save { flex: 2; padding: 8px; background: var(--blue); color: white; border: none; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; }
.btn-save:hover { background: var(--blue-dark); }

/* Inline badges */
.ibadge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 99px; font-size: 10px; font-weight: 600; }
.ibadge-co { background: var(--blue-light); color: var(--blue); }
.ibadge-in { background: var(--green-light); color: var(--green); }

/* EXTENDED stays */
.ext-badge { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); padding: 1px 6px; border-radius: 99px; font-size: 10px; font-weight: 600; margin-left: 4px; display: inline-flex; }

/* Room detail modal (status tab) */
.room-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 14px; }
.room-detail-modal {
  background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border);
  width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg);
}
.room-detail-hdr { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: var(--radius-xl) var(--radius-xl) 0 0; position: sticky; top: 0; z-index: 2; }
.room-detail-hdr h3 { font-size: 14px; font-weight: 700; }
.room-detail-body { padding: 16px; }
.room-booking-card {
  border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 10px;
  background: var(--surface2);
}
.room-booking-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.room-booking-card-title { font-size: 13px; font-weight: 700; }
.room-booking-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.room-booking-row:last-child { border-bottom: none; }
.room-booking-row span:first-child { color: var(--text2); }
.room-booking-row span:last-child { font-family: inherit; font-variant-numeric: tabular-nums; font-weight: 500; }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px);
  background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: 99px;
  font-size: 12px; font-weight: 500; z-index: 9999; transition: transform 0.3s; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.info-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; background: var(--blue-light); color: var(--blue); }
.no-results-box { padding: 48px; text-align: center; color: var(--text2); font-size: 14px; }

/* ─── PODGLĄD (v3.21) ─── */
.preview-city-group { margin-bottom: 24px; }
.preview-city-hdr {
  font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.preview-city-count { font-size: 10px; color: var(--text3); background: var(--surface2); padding: 1px 7px; border-radius: 99px; font-weight: 600; }
.preview-loc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.preview-loc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px 16px; cursor: pointer; text-align: left; font-family: inherit;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  display: flex; flex-direction: column; gap: 4px;
}
.preview-loc-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.preview-loc-city { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
.preview-loc-name { font-size: 16px; font-weight: 700; color: var(--text); }
.preview-loc-meta { font-size: 11px; color: var(--text2); margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Detail view */
.preview-hero {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  border: 1px solid var(--blue-mid); border-radius: var(--radius-lg);
  padding: 18px 22px; margin-bottom: 18px;
}
.preview-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.preview-hero-city { font-size: 12px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.preview-hero-name { font-size: 22px; font-weight: 700; color: var(--text); margin: 0; }
.preview-hero-meta { font-size: 12px; color: var(--text2); margin-top: 4px; font-variant-numeric: tabular-nums; }
.preview-hero-month-label { font-size: 22px; font-weight: 700; color: var(--blue); margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }
.preview-year-select { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.preview-year-select select {
  padding: 8px 14px; border: 1px solid var(--blue-mid); border-radius: var(--radius);
  background: var(--surface); font-size: 14px; font-weight: 600; color: var(--blue);
  font-family: inherit; font-variant-numeric: tabular-nums; outline: none; cursor: pointer;
  min-width: 100px;
}
.preview-year-select select:focus { border-color: var(--blue); }

.preview-toolbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.preview-filter-wrap { display: flex; align-items: center; gap: 6px; }
.preview-legend {
  display: flex; gap: 16px; font-size: 11px; color: var(--text2); align-items: center; flex-wrap: wrap;
}
.preview-legend-box { display: inline-block; width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); vertical-align: middle; margin-right: 4px; }
.preview-legend-box.is-free { background: #bbf7d0; border-color: #16a34a; }       /* green */
.preview-legend-box.is-occupied { background: #fecaca; border-color: #dc2626; }   /* red */
.preview-legend-box.is-perm { background: #93c5fd; border-color: #2563eb; }       /* blue */

/* Grid (rooms × days) */
.preview-grid-wrap {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin-bottom: 14px;
}
.preview-row {
  display: flex; align-items: stretch; border-bottom: 1px solid var(--border);
  min-width: max-content;  /* allow horizontal scroll when days don't fit */
}
.preview-row:last-child { border-bottom: none; }
.preview-grid-header { background: var(--surface2); position: sticky; top: 0; z-index: 5; font-weight: 700; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
.preview-room-cell {
  width: 140px; flex-shrink: 0; padding: 10px 12px;
  border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px;
  font-size: 12px; background: inherit; position: sticky; left: 0; z-index: 4;
}
.preview-row:not(.preview-grid-header) .preview-room-cell { background: var(--surface); }
.preview-room-sub { font-size: 10px; color: var(--text3); font-weight: 400; font-variant-numeric: tabular-nums; }
.preview-days-wrap { display: flex; flex: 1; }
/* Day header — 2 wiersze: literka dnia tygodnia + numer dnia */
.preview-day-header {
  width: 35px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
  padding: 0;
}
.preview-day-header .dow {
  font-size: 9px; padding: 3px 0 2px;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.3px; font-weight: 700; text-align: center;
}
.preview-day-header .dnum {
  font-size: 11px; padding: 2px 0 5px;
  color: var(--text2); font-weight: 600; text-align: center;
  border-top: 1px solid var(--border);
}
.preview-day-header:last-child { border-right: none; }
.preview-day {
  width: 35px; flex-shrink: 0; text-align: center; padding: 10px 0;
  font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text3);
  border-right: 1px solid var(--border);
  transition: filter 0.1s; cursor: pointer;   /* v3.44 — komórka dnia klikalna */
}
.preview-day:last-child { border-right: none; }
.preview-day.is-free { background: #bbf7d0; color: #14532d; }                     /* green */
.preview-day.is-occupied { background: #fecaca; color: #7f1d1d; font-weight: 600; }/* red */
.preview-day.is-perm { background: #93c5fd; color: #1e3a8a; font-weight: 600; }   /* blue */
.preview-day:hover { filter: brightness(1.08); }

/* v3.34 — Weekendy: header BIAŁY tekst + outline (spójność z data cells).
   Wcześniej zielony tekst, ale user wolał white wszędzie żeby było jednolite.
   Outline (text-shadow) zapewnia czytelność w light + dark mode. */
.preview-day-header.is-weekend .dow,
.preview-day-header.is-weekend .dnum {
  color: #fff;
  text-shadow: 0 0 2px rgba(0, 0, 0, 0.55);
}
/* v3.40 — Weekend data cells: ramka inset (frame) + czarna liczba + bold.
   Wcześniej białe podkreślenie (v3.36) i Sunday's right border 2px (v3.29) —
   user wolał usunąć (asymetryczne, prawa grubiej). Teraz każda komórka
   weekendowa ma własną symetryczną ramkę. */
.preview-day.is-weekend {
  color: #000 !important;
  font-weight: 700;
  text-shadow: none;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.45);
  position: relative;
  z-index: 1;
}
/* Ciemniejsze odcienie weekendowych komórek per status (na pierwszy rzut oka
   widać że to weekend, ale status nadal jednoznaczny przez kolor). */
.preview-day.is-free.is-weekend { background: #86efac; }      /* darker green */
.preview-day.is-occupied.is-weekend { background: #fca5a5; }   /* darker red */
.preview-day.is-perm.is-weekend { background: #60a5fa; }       /* darker blue */

/* v3.40 — usunięte: Sunday's right 2px border. Powodowało asymetrię
   (prawa weekendu grubsza, lewa cienka). Weekend frame na każdej komórce
   wystarczy do wyróżnienia. */

/* Granica między miesiącami (gdy 2 miesiące wybrane) — niebieska gruba lewa */
.preview-day.is-month-boundary,
.preview-day-header.is-month-boundary {
  border-left: 3px solid var(--blue) !important;
}
.preview-month-header-row {
  background: var(--blue-light);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.preview-month-span {
  flex-shrink: 0;
  text-align: center;
  padding: 7px 0;
  border-right: 2px solid var(--blue);
}
.preview-month-span:last-child { border-right: none; }
.preview-sum-cell {
  width: 170px; flex-shrink: 0; padding: 10px 12px;
  border-left: 1px solid var(--border); font-size: 12px;
  display: flex; flex-direction: column; gap: 2px; text-align: right; font-variant-numeric: tabular-nums;
  background: inherit;
}
.preview-sum-rev { font-size: 14px; font-weight: 700; color: var(--blue); }
.preview-sum-paid { font-size: 10px; color: var(--green); font-weight: 600; }
.preview-sum-days { font-size: 10px; color: var(--text3); font-weight: 400; }

/* Clickable row — hover effect */
.preview-row-clickable { cursor: pointer; transition: background 0.12s; }
.preview-row-clickable:hover { background: var(--blue-light); }
.preview-row-clickable:hover .preview-room-cell,
.preview-row-clickable:hover .preview-sum-cell { background: var(--blue-light); }

/* Month nav: arrowy + tabs (TOP) + compare toggle */
.preview-month-nav {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 6px;
}
.preview-nav-arrow {
  flex-shrink: 0;
  width: 32px; height: 32px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; font-family: inherit;
  font-size: 18px; font-weight: 700; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.preview-nav-arrow:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
.preview-month-tabs {
  flex: 1; min-width: 0;
  display: flex; gap: 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding: 0 2px;
}
.preview-month-tabs::-webkit-scrollbar { height: 0; }  /* ukryj scrollbar dla czystości */
.preview-month-tab {
  padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; font-family: inherit;
  font-size: 12px; color: var(--text2); white-space: nowrap; font-variant-numeric: tabular-nums;
  transition: all 0.12s; flex-shrink: 0;
}
.preview-month-tab:hover { background: var(--surface3); color: var(--text); }
.preview-month-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
.preview-compare-toggle {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; color: var(--text2); cursor: pointer; white-space: nowrap;
  font-weight: 600;
}
.preview-compare-toggle input[type=checkbox] { margin: 0; cursor: pointer; }

/* Notes section */
.preview-notes-list { display: flex; flex-direction: column; gap: 8px; }
.preview-note {
  background: var(--yellow-light); border: 1px solid var(--yellow-border);
  border-radius: var(--radius); padding: 10px 12px; font-size: 12px;
}
.preview-note-meta { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.preview-note-text { color: var(--text); white-space: pre-wrap; }

/* Archive / History Section */
.hist-section { background: var(--surface3); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 14px; }
.hist-section h4 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
.hist-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.hist-row:last-child { border-bottom: none; }

/* Chart type buttons */
.chart-type-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 500;
  color: var(--text2); transition: all 0.12s;
}
.chart-type-btn:hover { background: var(--surface2); }
.chart-type-btn.active { background: var(--blue-light); color: var(--blue); border-color: var(--blue); font-weight: 700; }

/* ─── PRINT REPORT (drukowalny raport finansowy) ─────────────────────
   .print-report-shell — full-screen overlay na ekranie (fixed, z-index 1000),
   żeby raport nie pokazywał się "gdzieś na dole strony". Dla druku resetowane
   do statycznego pozycjonowania w @media print poniżej. */
.print-report-shell {
  position: fixed; inset: 0;
  background: #fff;
  overflow-y: auto;
  z-index: 1000;
}
.print-report {
  background: #fff; color: #000;
  font-family: "DM Sans", sans-serif;
  padding: 24px 28px; max-width: 800px; margin: 0 auto;
  font-size: 13px; line-height: 1.5;
}
.print-report h1 { font-size: 20px; margin: 0 0 4px; font-weight: 700; }
.print-report h2 { font-size: 14px; margin: 18px 0 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #999; padding-bottom: 4px; }
.print-report .pr-hdr-sub { font-size: 11px; color: #555; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
.print-report .pr-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-variant-numeric: tabular-nums; margin: 8px 0 4px; }
.print-report .pr-summary .k { color: #333; }
.print-report .pr-summary .v { font-weight: 700; text-align: right; }
.print-report .pr-loc { padding: 6px 0; border-bottom: 1px dashed #ccc; font-variant-numeric: tabular-nums; }
.print-report .pr-loc-name { font-weight: 700; font-size: 13px; }
.print-report .pr-loc-meta { font-size: 11px; color: #555; }
.print-report table { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 6px; }
.print-report th, .print-report td { padding: 4px 6px; border-bottom: 1px solid #ccc; text-align: left; }
.print-report th { background: #f0f0f0; font-weight: 700; }
.print-report td.num { text-align: right; }
.print-report .pr-footer { margin-top: 18px; padding-top: 8px; border-top: 1px solid #999; font-size: 10px; color: #666; text-align: center; }
.print-actions { position: fixed; top: 12px; right: 12px; display: flex; gap: 8px; z-index: 1001; }
/* Kolory hardkodowane (niezależne od dark/light mode) bo print-report jest zawsze
   białą stroną. Wcześniej button "Zamknij" miał var(--surface) bg = czarny w dark
   mode + default browser color = niewidoczny. */
.print-actions button {
  padding: 8px 16px; border: 1px solid #ccc; border-radius: var(--radius);
  background: #fff; color: #000; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
}
.print-actions button:hover { background: #f3f4f6; }
.print-actions button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.print-actions button.primary:hover { background: #1d4ed8; }

@media print {
  body * { visibility: hidden; }
  .print-report-shell, .print-report-shell * { visibility: visible; }
  .print-report-shell { position: static; overflow: visible; }
  .print-report { position: absolute; left: 0; top: 0; width: 100%; max-width: none; }
  .print-actions { display: none !important; }
  @page { margin: 12mm; }
}
</style>
