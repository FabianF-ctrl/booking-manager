}

function buildStatusLocCard(loc, from, to) {
  const rows = loc.rooms.map(room => {
    if (from && to) {
      // Range search
      const overlapping = getRoomStatusForRange(room.id, from, to) || [];
      if (overlapping.length === 0) {
        return `
          <div class="status-room-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły pokoju">
            <div>
              <div class="status-room-name">${esc(room.name)}</div>
            </div>
            <div class="status-badge-col">
              <span class="badge badge-free">Wolny</span>
            </div>
          </div>`;
      }
      return overlapping.map(b => {
        const who = b.bookingType==="company" ? b.companyName : (b.guests[0]?.name || "—");
        const ae = getActualEnd(b); const isExtended = ae && parseDate(ae) > parseDate(b.to);
        const isPermRow = b.isPermanent && b.bookingType !== "company";
        const dateLabel = isPermRow
          ? (b.permanentEnd
            ? `od ${fmtDate(b.permanentStart || b.from)} · do ${fmtDate(b.permanentEnd)}`
            : `od ${fmtDate(b.permanentStart || b.from)} · do odwołania`)
          : `${fmtDate(b.from)} → ${fmtDate(b.to)}`;
        const statusBadge = isPermRow && !b.permanentEnd
          ? `<span class="badge" style="background:var(--green);color:#fff;display:inline-flex;align-items:center;gap:4px">${ICONS.house(11)} Stały najemca</span>`
          : `<span class="badge badge-occupied">Zajęty${isExtended?'<span class="ext-badge">+</span>':''}</span>`;
        return `
          <div class="status-room-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły">
            <div>
              <div class="status-room-name">${esc(room.name)}</div>
              <div class="status-room-who">
                <span class="who-name ${b.bookingType==="company"?"who-company":"who-individual"}">${esc(who)}</span>
                <span class="who-dates">${dateLabel}</span>
              </div>
            </div>
            <div class="status-badge-col">
              ${statusBadge}
              <span class="ibadge ${b.bookingType==="company"?"ibadge-co":"ibadge-in"}">${b.bookingType==="company"?"Firma":"Indyw."}</span>
            </div>
          </div>`;
      }).join("");
    } else {
      // Today status
      const st = getRoomStatusToday(room.id);
      if (st.status === "free") {
        return `
          <div class="status-room-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły pokoju">
            <div><div class="status-room-name">${esc(room.name)}</div></div>
            <div class="status-badge-col"><span class="badge badge-free">Wolny</span></div>
          </div>`;
      } else if (st.status === "occupied") {
        const permBadge = st.isPermanent ? `<span style="background:var(--green);color:#fff;font-size:9px;padding:2px 7px;border-radius:99px;margin-left:4px;font-weight:700;display:inline-flex;align-items:center;gap:3px;vertical-align:middle">${ICONS.house(10)} STAŁY</span>` : '';
        const untilTxt = st.isPermanent ? '<em style="color:var(--green)">stały najemca</em>' : `do ${fmtDate(st.until)}`;
        return `
          <div class="status-room-row status-room-clickable ${st.isPermanent?"":""}" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły" style="${st.isPermanent?"background:linear-gradient(to right, var(--green-light) 0%, transparent 30%)":""}">
            <div>
              <div class="status-room-name">${esc(room.name)}${permBadge}</div>
              <div class="status-room-who">
                <span class="who-name ${st.booking?.bookingType==="company"?"who-company":"who-individual"}">${esc(st.who)}</span>
                <span class="who-dates">${untilTxt}</span>
              </div>
            </div>
            <div class="status-badge-col">
              <span class="badge badge-occupied">Zajęty${st.isExtended?'<span class="ext-badge">+</span>':''}</span>
            </div>
          </div>`;
      } else {
        return `
          <div class="status-room-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły pokoju">
            <div><div class="status-room-name">${esc(room.name)}</div><div class="status-room-info">Bufor do ${fmtDate(st.until)}</div></div>
            <div class="status-badge-col"><span class="badge badge-blocked">Bufor</span></div>
          </div>`;
      }
    }
  }).join("");

  // Licznik zajętych/wolnych dla aktualnego dnia (gdy from/to puste — pokazuje "dziś")
  let occupiedCount = 0, permanentCount = 0;
  loc.rooms.forEach(r => {
    if (from && to) {
      const overlapping = getRoomStatusForRange(r.id, from, to) || [];
      if (overlapping.length > 0) occupiedCount++;
      if (overlapping.some(b => isBookingPermanentActive(b))) permanentCount++;
    } else {
      const st = getRoomStatusToday(r.id);
      if (st.status === "occupied") occupiedCount++;
      if (st.isPermanent) permanentCount++;
    }
  });
  const freeCount = loc.rooms.length - occupiedCount;
  const isCollapsed = !!state.statusLocCollapsed?.[loc.id];

  return `
    <div class="status-loc-card ${isCollapsed?"is-collapsed":""}" data-status-loc="${loc.id}">
      <div class="status-loc-hdr" title="Kliknij aby otworzyć szczegóły obiektu">
        <span class="loc-icon">${locIcon(loc, 18)}</span>
        <strong>${esc(loc.name)}</strong>
        <em>· ${esc(loc.city)}</em>
        <div class="status-loc-hdr-meta">
          <span title="Zajęte / wszystkie"><span style="color:${occupiedCount>0?"var(--red)":"var(--green)"};font-weight:600">${occupiedCount}</span> / ${loc.rooms.length}</span>
          ${permanentCount > 0 ? `<span style="color:var(--green);display:inline-flex;align-items:center;gap:4px" title="Stali najemcy">${ICONS.house(13)} ${permanentCount}</span>` : ""}
          <span style="color:var(--green)">${freeCount} wolnych</span>
          <button class="status-loc-toggle" data-status-toggle="${loc.id}" title="${isCollapsed?"Rozwiń":"Zwiń"} listę pokoi" aria-label="${isCollapsed?"Rozwiń":"Zwiń"}" style="transform:rotate(${isCollapsed?-90:0}deg)">▼</button>
        </div>
      </div>
      ${isCollapsed ? "" : `<div class="status-loc-body">${rows}</div>`}
    </div>`;
}

function buildRoomDetailModal() {
  const { roomId, locId } = state.roomDetailModal;
  const loc = DATA.locations.find(l => l.id === locId);
  const room = loc?.rooms.find(r => r.id === roomId);
  if (!loc || !room) return "";

  const bookings = savedBookings
    .filter(b => b.roomId === roomId && b.locId === locId)
    .sort((a, b) => b.from.localeCompare(a.from));

  const today = todayStr();
  const current = bookings.find(b => { const ae = getActualEnd(b); return today >= b.from && today < (ae || b.to); });

  const cards = bookings.map(b => {
    const isCompany = b.bookingType === "company";
    const who = isCompany ? b.companyName : (b.guests[0]?.name || "—");
    const reservedNights = diffDays(b.from, b.to);
    const actualN = getActualNights(b);
    const hasActual = b.actualDays && b.actualDays.length > 0;
    const total = calcBookingTotal(b, room, reservedNights);
    const actualTotal = hasActual ? calcBookingTotal(b, room, actualN) : null;
    const isPast = b.to < today;
    const isCurrent = b === current;
    const isUpcoming = !isCurrent && !isPast;
    const statusBadge = isCurrent
      ? `<span class="badge badge-occupied">Aktualny</span>`
      : isPast
        ? `<span class="badge" style="background:var(--surface3);color:var(--text3)">Zakończony</span>`
        : `<span class="badge badge-reserved">Nadchodzący</span>`;
    // Kolor lewego paska dla "życia" — visual status accent
    const cardAccent = isCurrent ? "var(--red)" : isPast ? "var(--text3)" : "var(--yellow)";

    // Recurring series info
    const isRecurring = !!b.recurringGroupId;
    const recurringBadge = isRecurring
      ? `<span class="badge" style="background:var(--blue-light);color:var(--blue);display:inline-flex;align-items:center;gap:4px">${ICONS.rotateCw(11)} ${b.recurringIndex||1}/${b.recurringTotal||"?"}</span>`
      : "";
    const isLastInSeries = isRecurring && b.recurringIndex === b.recurringTotal;
    const hasFutureInSeries = isRecurring && savedBookings.some(x =>
      x.recurringGroupId === b.recurringGroupId && x.from > today && x.id !== b.id
    );

    // Guest rows with phones
    const guestRows = !isCompany && b.guests.length > 0
      ? b.guests.map((g, i) => `
          <div class="room-booking-row">
            <span>${ICONS.user(13)} Gość ${i+1}</span>
            <span style="text-align:right">
              <strong>${esc(g.name||"—")}</strong>
              ${g.phone ? `<br><a href="tel:${esc(g.phone)}" style="color:var(--blue);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px">${ICONS.phone(11)} ${esc(g.phone)}</a>` : ""}
            </span>
          </div>`).join("")
      : `<div class="room-booking-row"><span style="display:inline-flex;align-items:center;gap:5px">${ICONS.building(11)} Firma</span><span><strong>${esc(b.companyName||"—")}</strong></span></div>
         ${isCompany && b.guests.length > 0 ? b.guests.map((g,i) => `
          <div class="room-booking-row" style="padding-left:12px">
            <span style="color:var(--text2)">Pracownik ${i+1}</span>
            <span style="text-align:right">
              ${esc(g.name||"—")}
              ${g.phone ? `<br><a href="tel:${esc(g.phone)}" style="color:var(--blue);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px">${ICONS.phone(11)} ${esc(g.phone)}</a>` : ""}
            </span>
          </div>`).join("") : ""}`;

    // Payment display — SVG ikona per metoda
    const methodIcons = { invoice: ICONS.receipt(12), cash: ICONS.banknote(12), transfer: ICONS.landmark(12) };
    const methodNames = { invoice: "Faktura", cash: "Gotówka", transfer: "Przelew" };
    const methodLabel = b.payment?.method
      ? `<span style="display:inline-flex;align-items:center;gap:5px">${methodIcons[b.payment.method]} ${methodNames[b.payment.method]}</span>`
      : "—";
    const timingLabel = { prepaid:"przed pobytem", postpaid:"po pobycie" }[b.payment?.timing] || "";
    // Wpłacono — dla stałego najemcy: paidMonths (lub wszystko jeśli prepaid). Inaczej: explicit amountPaid.
    const isPermForPay = b.isPermanent && b.bookingType !== "company";
    let paid;
    if (isPermForPay) {
      const bpForPay = (b.priceAtBooking?.basePrice ?? room?.basePrice) || 0;
      paid = getPermanentPaidRevenue(b, bpForPay, b.from, null, null, b.payment?.timing);
    } else {
      const _p = parseFloat(b.payment?.amountPaid);
      paid = isNaN(_p) ? 0 : _p;
    }
    const remaining = Math.max(0, (actualTotal ?? total) - paid);
    const payColor = paid >= (actualTotal ?? total) ? "var(--green)" : paid > 0 ? "var(--orange)" : "var(--red)";

    // Price at booking vs current price
    const pb = b.priceAtBooking;
    const currentBase = room.basePrice;
    const priceChanged = pb && pb.basePrice !== currentBase;
    const priceNote = priceChanged
      ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;font-style:italic">Cena pokoju wtedy: <strong>${pb.basePrice} zł/noc</strong> · Aktualnie: <strong>${currentBase} zł/noc</strong></div>`
      : pb ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;font-style:italic">Cena pokoju: ${pb.basePrice} zł/noc (bez zmian)</div>` : "";

    // Actual days summary
    const actualDaysSummary = hasActual
      ? `<div class="room-booking-row">
          <span>Faktyczny pobyt</span>
          <span>${actualN} ${nw(actualN)} · ${b.actualDays[0]} → ${b.actualDays[b.actualDays.length-1]}</span>
        </div>` : "";

    // v3.41 — usunięta sekcja "Media / faktury" z modalu pokoju. Media są teraz
    // kosztem CAŁEGO budynku (per-location), więc odejmowanie pełnych mediów budynku
    // od przychodu pojedynczego pokoju zawyżało koszt. Media budynku są poprawnie
    // pokazane w Raportach (per budynek) i na Wykresach. Tu byłby mylący duplikat.

    const detailWarn = getPaymentWarning(b);
    const detailWarnBanner = detailWarn ? `
      <div style="background:${detailWarn.level === "danger" ? "var(--red-light, #fee)" : "var(--orange-light)"};color:${detailWarn.level === "danger" ? "var(--red)" : "var(--orange)"};border:1.5px solid ${detailWarn.level === "danger" ? "var(--red)" : "var(--orange-border)"};border-radius:var(--radius);padding:8px 10px;margin-top:8px;display:flex;align-items:flex-start;gap:8px;font-size:11px">
        <span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(13)}</span>
        <div style="flex:1"><strong>${esc(detailWarn.title)}.</strong> ${esc(detailWarn.message)}</div>
      </div>` : "";

    return `
      <div class="room-booking-card" id="rdc-${b.id}" style="border-left:3px solid ${cardAccent}">
        <div class="room-booking-card-hdr">
          <span class="room-booking-card-title">${esc(who)}</span>
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
            ${statusBadge}
            ${recurringBadge}
            <span class="ibadge ${isCompany?"ibadge-co":"ibadge-in"}">${isCompany?"Firma":"Indyw."}</span>
          </div>
        </div>
        ${detailWarnBanner}

        <div class="room-booking-row">
          <span style="display:inline-flex;align-items:center;gap:6px">${ICONS.calendar(12)} ${b.isPermanent && b.bookingType !== "company" ? "Stały najemca" : "Rezerwacja"}</span>
          <span>${b.isPermanent && b.bookingType !== "company"
            ? `od ${fmtDate(b.permanentStart || b.from)} · ${b.permanentEnd ? `do ${fmtDate(b.permanentEnd)}` : `<strong style="color:var(--green)">do odwołania</strong>`} · <strong>${getPermanentMonths(b, b.from, null, null)} ${nm(getPermanentMonths(b, b.from, null, null))} aktywności</strong>`
            : `${fmtDate(b.from)} → ${fmtDate(b.to)} · <strong>${reservedNights} ${nw(reservedNights)}</strong>`}</span>
        </div>
        ${actualDaysSummary}
        ${b.bufferDays && !(b.isPermanent && b.bookingType !== "company") ? `<div class="room-booking-row"><span>Bufor</span><span>${b.bufferDays} ${nw(b.bufferDays)} po wyjeździe</span></div>` : ""}

        <div style="border-top:1px solid var(--border);margin:8px 0"></div>
        ${guestRows}

        <div style="border-top:1px solid var(--border);margin:8px 0"></div>
        <div class="room-booking-row">
          <span>Płatność</span>
          <span>${methodLabel}${timingLabel ? " · " + timingLabel : ""}</span>
        </div>
        <div class="room-booking-row">
          <span>Kwota rez.</span>
          <span>zł${total.toLocaleString()}</span>
        </div>
        ${hasActual && actualTotal !== total ? `<div class="room-booking-row">
          <span>Kwota fakt.</span>
          <span>zł${actualTotal.toLocaleString()}</span>
        </div>` : ""}
        <div class="room-booking-row">
          <span>Wpłacono</span>
          <span style="color:${payColor};font-weight:600">zł${paid.toLocaleString()}</span>
        </div>
        ${remaining > 0 ? `<div class="room-booking-row">
          <span>Do pobrania</span>
          <span style="color:var(--orange);font-weight:600">zł${remaining.toLocaleString()}</span>
        </div>` : ""}
        ${priceNote}

        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
          <button class="cal-nav-btn" data-edit-from-detail="${b.id}" style="flex:1;padding:6px 10px;font-size:12px">Edytuj</button>
          ${isRecurring && hasFutureInSeries && API_CREDS?.role === "admin"
            ? `<button class="cal-nav-btn" data-stop-series="${b.recurringGroupId}" style="flex:1;padding:6px 10px;font-size:12px;color:var(--red);border-color:var(--red)">${ICONS.stopCircle(11)} Zatrzymaj serię</button>`
            : ""}
        </div>
      </div>`;
  }).join("");

  return `
    <div class="room-detail-overlay" id="roomDetailOverlay">
      <div class="room-detail-modal">
        <div class="room-detail-hdr">
          <div>
            <h3>${locIcon(loc, 16)} ${esc(loc.name)} · ${esc(room.name)}</h3>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${ICONS.mapPin(11)} ${esc(loc.city)} · ${room.capacity} łóżek · ${bookings.length} ${bookings.length===1?"rezerwacja":bookings.length<5?"rezerwacje":"rezerwacji"}</div>
          </div>
          <button class="close-btn" id="roomDetailClose">✕</button>
        </div>
        <div class="room-detail-body">
          ${bookings.length === 0
            ? `<div class="no-results-box">Brak rezerwacji dla tego pokoju.</div>`
            : cards}
        </div>
      </div>
    </div>`;
}

// v3.44 — Modal szczegółów POJEDYNCZEGO dnia (klik w komórkę kalendarza Podglądu).
// Pokazuje status pokoju dokładnie w tym dniu: wolny / zajęty / stały najemca,
// a dla zajętego — kartę rezerwacji obejmującej ten dzień (+ skok do pełnej historii).
function buildDayDetailModal() {
  const { roomId, locId, dateStr } = state.dayDetailModal;
  const loc = DATA.locations.find(l => l.id === locId);
  const room = loc?.rooms.find(r => r.id === roomId);
  if (!loc || !room) return "";

  const DOW_FULL = ["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];
  const dt = parseDate(dateStr);
  const dowName = DOW_FULL[dt.getDay()];
  const dateLabel = `${dowName.charAt(0).toUpperCase()}${dowName.slice(1)}, ${fmtDateLong(dateStr)}`;

  const s = getRoomDayStatus(roomId, dateStr);
  const b = s.booking;

  const statusBadge = s.status === "perm"
    ? `<span class="badge" style="background:var(--blue);color:#fff;display:inline-flex;align-items:center;gap:4px">${ICONS.house(11)} Stały najemca</span>`
    : s.status === "occupied"
      ? `<span class="badge badge-occupied">Zajęty</span>`
      : `<span class="badge badge-free">Wolny</span>`;

  let bodyHtml;
  if (s.status === "free" || !b) {
    // Wolny dzień — pokaż najbliższą rezerwację po tym dniu jako kontekst (jeśli jest).
    const future = savedBookings
      .filter(x => x.roomId === roomId && x.locId === locId)
      .map(x => {
        const isP = x.isPermanent && x.bookingType !== "company";
        const start = isP ? (x.permanentStart || x.from) : x.from;
        return { x, start };
      })
      .filter(o => o.start > dateStr)
      .sort((a, c) => a.start.localeCompare(c.start));
    const next = future[0];
    const nextWho = next ? (next.x.bookingType === "company"
      ? (next.x.companyName || "—")
      : (next.x.guests?.map(g => g.name).filter(Boolean).join(", ") || "—")) : null;
    bodyHtml = `
      <div class="no-results-box" style="text-align:center;padding:18px 12px">
        <div style="font-size:14px;color:var(--green);font-weight:700">✓ Pokój wolny tego dnia</div>
        ${next
          ? `<div style="font-size:11px;color:var(--text2);margin-top:8px">Najbliższa rezerwacja: <strong>${fmtDate(next.start)}</strong> — ${esc(nextWho)}</div>`
          : `<div style="font-size:11px;color:var(--text3);margin-top:8px">Brak nadchodzących rezerwacji tego pokoju.</div>`}
      </div>`;
  } else {
    const isCompany = b.bookingType === "company";
    const isPerm = b.isPermanent && b.bookingType !== "company";
    const who = isCompany ? (b.companyName || "—") : (b.guests?.[0]?.name || "—");
    const reservedNights = diffDays(b.from, b.to);

    const methodIcons = { invoice: ICONS.receipt(12), cash: ICONS.banknote(12), transfer: ICONS.landmark(12) };
    const methodNames = { invoice: "Faktura", cash: "Gotówka", transfer: "Przelew" };
    const methodLabel = b.payment?.method
      ? `<span style="display:inline-flex;align-items:center;gap:5px">${methodIcons[b.payment.method]} ${methodNames[b.payment.method]}</span>` : "—";
    const timingLabel = { prepaid:"przed pobytem", postpaid:"po pobycie" }[b.payment?.timing] || "";

    const total = calcBookingTotal(b, room, isPerm ? getActualNights(b) : reservedNights);
    let paid;
    if (isPerm) {
      const bp = (b.priceAtBooking?.basePrice ?? room?.basePrice) || 0;
      paid = getPermanentPaidRevenue(b, bp, b.from, null, null, b.payment?.timing);
    } else {
      const _p = parseFloat(b.payment?.amountPaid); paid = isNaN(_p) ? 0 : _p;
    }
    const remaining = Math.max(0, total - paid);
    const payColor = paid >= total ? "var(--green)" : paid > 0 ? "var(--orange)" : "var(--red)";

    const guestRows = !isCompany && b.guests?.length > 0
      ? b.guests.map((g,i) => `<div class="room-booking-row"><span>${ICONS.user(13)} Gość ${i+1}</span><span style="text-align:right"><strong>${esc(g.name||"—")}</strong>${g.phone?`<br><a href="tel:${esc(g.phone)}" style="color:var(--blue);font-size:11px;text-decoration:none">${ICONS.phone(11)} ${esc(g.phone)}</a>`:""}</span></div>`).join("")
      : isCompany ? `<div class="room-booking-row"><span style="display:inline-flex;align-items:center;gap:5px">${ICONS.building(11)} Firma</span><span><strong>${esc(b.companyName||"—")}</strong> · ${b.guests?.length||0} os.</span></div>` : "";

    const warn = getPaymentWarning(b);
    const warnBanner = warn ? `<div style="background:${warn.level==="danger"?"var(--red-light, #fee)":"var(--orange-light)"};color:${warn.level==="danger"?"var(--red)":"var(--orange)"};border:1.5px solid ${warn.level==="danger"?"var(--red)":"var(--orange-border)"};border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;font-size:11px"><span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(13)}</span><div style="flex:1"><strong>${esc(warn.title)}.</strong> ${esc(warn.message)}</div></div>` : "";

    const dateRange = isPerm
      ? `od ${fmtDate(b.permanentStart || b.from)} · ${b.permanentEnd ? `do ${fmtDate(b.permanentEnd)}` : `<strong style="color:var(--green)">do odwołania</strong>`}`
      : `${fmtDate(b.from)} → ${fmtDate(b.to)} · <strong>${reservedNights} ${nw(reservedNights)}</strong>`;

    bodyHtml = `
      <div class="room-booking-card" style="border-left:3px solid ${s.status==="perm"?"var(--blue)":"var(--red)"}">
        <div class="room-booking-card-hdr">
          <span class="room-booking-card-title">${esc(who)}</span>
          <span class="ibadge ${isCompany?"ibadge-co":"ibadge-in"}">${isCompany?"Firma":"Indyw."}</span>
        </div>
        ${warnBanner}
        <div class="room-booking-row">
          <span style="display:inline-flex;align-items:center;gap:6px">${ICONS.calendar(12)} ${isPerm?"Stały najemca":"Rezerwacja"}</span>
          <span>${dateRange}</span>
        </div>
        <div style="border-top:1px solid var(--border);margin:8px 0"></div>
        ${guestRows}
        <div style="border-top:1px solid var(--border);margin:8px 0"></div>
        <div class="room-booking-row"><span>Płatność</span><span>${methodLabel}${timingLabel?" · "+timingLabel:""}</span></div>
        <div class="room-booking-row"><span>Kwota</span><span>zł${total.toLocaleString()}</span></div>
        <div class="room-booking-row"><span>Wpłacono</span><span style="color:${payColor};font-weight:600">zł${paid.toLocaleString()}</span></div>
        ${remaining>0?`<div class="room-booking-row"><span>Do pobrania</span><span style="color:var(--orange);font-weight:600">zł${remaining.toLocaleString()}</span></div>`:""}
        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
          <button class="cal-nav-btn" data-edit-from-detail="${b.id}" style="flex:1;padding:6px 10px;font-size:12px">Edytuj rezerwację</button>
          <button class="cal-nav-btn" data-day-to-room="1" style="flex:1;padding:6px 10px;font-size:12px">Wszystkie rezerwacje pokoju</button>
        </div>
      </div>`;
  }

  return `
    <div class="room-detail-overlay" id="dayDetailOverlay">
      <div class="room-detail-modal" style="max-width:440px">
        <div class="room-detail-hdr">
          <div>
            <h3>${locIcon(loc, 16)} ${esc(loc.name)} · ${esc(room.name)}</h3>
            <div style="font-size:11px;color:var(--text2);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="display:inline-flex;align-items:center;gap:4px">${ICONS.calendar(11)} ${dateLabel}</span> ${statusBadge}
            </div>
          </div>
          <button class="close-btn" id="dayDetailClose">✕</button>
        </div>
        <div class="room-detail-body">
          ${bodyHtml}
        </div>
      </div>
    </div>`;
}

function buildStatusDetail(locId, from, to) {
  const loc = DATA.locations.find(l => l.id === locId);
  if (!loc) return "";

  const rows = loc.rooms.map(room => {
    const overlapping = getRoomStatusForRange(room.id, from, to) || [];
    if (overlapping.length === 0) {
      return `
        <div class="status-detail-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły pokoju">
          <div class="status-room-nm">${esc(room.name)}</div>
          <div><span class="badge badge-free">Wolny</span></div>
          <div class="status-who">—</div>
          <div class="status-dates">cały okres wolny</div>
        </div>`;
    }
    return overlapping.map(b => {
      const isCompany = b.bookingType==="company";
      const who = isCompany ? b.companyName : (b.guests[0]?.name || "—");
      const reservedNights = diffDays(b.from, b.to);
      const actualN = getActualNights(b);
      const ae = getActualEnd(b); const isExtended = ae && parseDate(ae) > parseDate(b.to);
      const isPermanentRow = b.isPermanent && b.bookingType !== "company";
      const badge = isPermanentRow && !b.permanentEnd
        ? `<span class="badge" style="background:var(--green);color:#fff;display:inline-flex;align-items:center;gap:4px">${ICONS.house(11)} Stały najemca</span>`
        : `<span class="badge badge-occupied">Zajęty${isExtended?'<span class="ext-badge">+</span>':''}</span>`;
      const dateInfo = isPermanentRow
        ? (b.permanentEnd
          ? `od ${fmtDate(b.permanentStart || b.from)} · do ${fmtDate(b.permanentEnd)}`
          : `od ${fmtDate(b.permanentStart || b.from)} · do odwołania`)
        : `${fmtDate(b.from)} → ${fmtDate(b.to)} · ${reservedNights} ${nw(reservedNights)}`;
      const actualInfo = !isPermanentRow && actualN !== reservedNights ? ` · faktycznie: ${actualN} ${nw(actualN)}` : "";
      return `
        <div class="status-detail-row status-room-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły">
          <div class="status-room-nm">${esc(room.name)}</div>
          <div>${badge}</div>
          <div class="status-who">${esc(who)} <span class="ibadge ${isCompany?"ibadge-co":"ibadge-in"}">${isCompany?"Firma":"Indyw."}</span></div>
          <div class="status-dates">${dateInfo}${actualInfo}</div>
        </div>`;
    }).join("");
  }).join("");

  return `
    <div class="status-detail-back" id="statusBackBtn">← <span style="color:var(--red)">Wróć do wszystkich obiektów</span></div>

    <div class="status-controls">
      <div class="ctrl-group">
        <label>Od</label>
        <input type="date" id="statusFrom" value="${esc(from)}" />
      </div>
      <div class="ctrl-group">
        <label>Do</label>
        <input type="date" id="statusTo" value="${esc(to)}" />
      </div>
      <button class="ctrl-search-btn" id="statusSearchBtn">Odśwież</button>
    </div>

    <div class="status-detail-hdr">
      <span class="big-icon">${locIcon(loc, 36)}</span>
      <div>
        <div class="status-detail-title">${esc(loc.name)}</div>
        <div class="status-detail-sub">${ICONS.mapPin(11)} ${esc(loc.city)} · ${fmtDate(from)} → ${fmtDate(to)}</div>
      </div>
    </div>

    <div class="status-results-block">
      <div class="status-result-header">
        <span class="loc-icon">${locIcon(loc, 18)}</span>
        <strong>${loc.rooms.length} ${npokoi(loc.rooms.length)}</strong>
        <span>${fmtDate(from)} → ${fmtDate(to)}</span>
      </div>
      ${rows}
    </div>`;
}

// ─── REPORTS TAB ─────────────────────────────────────────────
function buildReports() {
  // Collect available years from bookings
  const allYears = [...new Set(savedBookings.map(b => b.from?.slice(0,4)).filter(Boolean))].sort().reverse();

  const filterBar = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div class="ctrl-group">
        <label>Rok</label>
        <select id="reportsYear" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none">
          <option value="">Wszystkie lata</option>
          ${allYears.map(y=>`<option value="${y}" ${state.reportsYear===y?"selected":""}>${y}</option>`).join("")}
        </select>
      </div>
      <div class="ctrl-group">
        <label>Miesiąc</label>
        <select id="reportsMonth" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none" ${!state.reportsYear?"disabled":""}>
          <option value="">Wszystkie miesiące</option>
          ${MONTHS.map((n,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${state.reportsMonth===String(i+1).padStart(2,'0')?"selected":""}>${n}</option>`).join("")}
        </select>
      </div>
      <div class="search-wrap" style="max-width:240px;flex:1">
        <span class="search-icon">${ICONS.search(13)}</span>
        <input type="text" id="reportsSearch" placeholder="Szukaj firmy, gościa, obiektu…" value="${esc(state.reportsSearch||"")}" autocomplete="off" />
      </div>
      <div class="ctrl-group">
        <label>Sortuj</label>
        <select id="reportsSort" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none">
          <option value="date_desc"      ${state.reportsSort==="date_desc"?"selected":""}>Data ↓ (najnowsze)</option>
          <option value="date_asc"       ${state.reportsSort==="date_asc"?"selected":""}>Data ↑ (najstarsze)</option>
          <option value="amount_desc"    ${state.reportsSort==="amount_desc"?"selected":""}>Kwota ↓ (najwyższa)</option>
          <option value="amount_asc"     ${state.reportsSort==="amount_asc"?"selected":""}>Kwota ↑ (najniższa)</option>
          <option value="remaining_desc" ${state.reportsSort==="remaining_desc"?"selected":""}>Do pobrania ↓</option>
          <option value="name_asc"       ${state.reportsSort==="name_asc"?"selected":""}>Klient A→Z</option>
        </select>
      </div>
      ${(state.reportsYear||state.reportsMonth) ? `<button class="ctrl-search-btn" id="reportsClearFilter" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)">✕ Wyczyść filtr</button>` : ""}
    </div>`;

  // Deduplicate savedBookings by ID (guard against any double-push edge cases)
  const seenIds = new Set();
  const uniqueBookings = savedBookings.filter(b => {
    if (seenIds.has(b.id)) return false;
    seenIds.add(b.id); return true;
  });

  // Apply year/month filter
  const fy = state.reportsYear;
  const fm = state.reportsMonth;

  // Wyliczenie zakresu okresu raportu (jeśli filtry aktywne)
  // periodRange.from inclusive, periodRange.to exclusive — w formacie YYYY-MM-DD
  let periodRange = null;
  if (fy) {
    const yr = parseInt(fy);
    if (fm) {
      const mn = parseInt(fm) - 1; // JS months 0-based
      periodRange = { from: toStr(new Date(yr, mn, 1)), to: toStr(new Date(yr, mn + 1, 1)) };
    } else {
      periodRange = { from: toStr(new Date(yr, 0, 1)), to: toStr(new Date(yr + 1, 0, 1)) };
    }
  }

  // Sprawdza czy rezerwacja jest aktywna w okresie raportu (overlap test dla wszystkich).
  // Rezerwacja zachodzi z okresem jeśli ich zakresy się przecinają — bez względu na typ.
  // Stały najemca: aktywny od permanentStart do permanentEnd (lub end-of-current-month).
  // Zwykła rezerwacja: od b.from do b.to.
  const bookingMatchesPeriod = (b) => {
    if (!periodRange) return true;
    // v3.56 — okresy rozliczeniowe: pasuje jeśli MA okres kończący się w tym miesiącu (po dacie "to").
    if (bookingHasBillingPeriods(b)) return billingMatchesRange(b, periodRange.from, periodRange.to);
    const hasPermBooking = !!b.isPermanent;
    const hasPermGuest = Array.isArray(b.guests) && b.guests.some(g => g.isPermanent);
    let bStart, bEnd;
    if (hasPermBooking || hasPermGuest) {
      bStart = b.permanentStart || b.from;
      let pEnd = b.permanentEnd;
      if (hasPermGuest) {
        const permGuests = b.guests.filter(g => g.isPermanent);
        const guestStarts = permGuests.map(g => g.permanentStart || b.from);
        const earliest = guestStarts.reduce((a, c) => (a < c ? a : c), bStart);
        if (earliest < bStart) bStart = earliest;
        const anyActive = permGuests.some(g => !g.permanentEnd);
        if (anyActive) pEnd = null;
        else {
          const latest = permGuests.map(g => g.permanentEnd).reduce((a, c) => (a > c ? a : c), pEnd || "");
          if (!pEnd || latest > pEnd) pEnd = latest;
        }
      }
      // v3.28: open-ended → effectivePermanentEnd(rangeTo) zamiast endOfCurrentMonthExclusive
      bEnd = pEnd || effectivePermanentEnd(b, periodRange?.to);
    } else {
      bStart = b.from;
      bEnd = b.to;
    }
    // Overlap test: [bStart, bEnd) ∩ [periodRange.from, periodRange.to)
    return bStart < periodRange.to && bEnd > periodRange.from;
  };

  const filteredByPeriod = uniqueBookings.filter(bookingMatchesPeriod);

  const periodLabel = fy ? (fm ? `${MONTHS[parseInt(fm)-1]} ${fy}` : `rok ${fy}`) : "wszystkie okresy";

  if (filteredByPeriod.length===0) return `
    <div class="reports-toolbar"><div class="reports-title" style="display:flex;align-items:center;gap:8px">${ICONS.fileText(22)} Raporty i finanse</div></div>
    ${filterBar}
    <div class="no-results-box">Brak rezerwacji${fy||fm?` dla okresu: ${periodLabel}`:""}.<br><small>${savedBookings.length===0?"Dodaj pierwszą rezerwację, aby zobaczyć raport.":"Zmień filtr okresu."}</small></div>`;

  // Global totals (for filtered set). v3.54 — Przychód=BRUTTO, Obrót=NETTO, Zysk=Obrót−media(netto).
  let totRevenueBrutto=0, totRevenue=0, totPaid=0, totPaidBrutto=0, totMedia=0;
  let lastPaymentDate = null;
  filteredByPeriod.forEach(b => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    const nights = getActualNights(b);
    const t = calcBookingTotal(b, room, nights, periodRange);
    const _factor = bookingNettoFactor(b);  // v3.38 — netto factor
    totRevenueBrutto += t;          // Przychód (brutto)
    totRevenue += t * _factor;      // Obrót (netto)
    // v3.19 — pro-rata clip wpłaconej kwoty do okresu filtra
    const _pInRange = bookingPaidInRange(b, room, periodRange?.from, periodRange?.to);
    totPaidBrutto += _pInRange;     // Wpłacono (brutto — realna gotówka)
    totPaid += _pInRange * _factor;
    const isPerm = b.isPermanent && b.bookingType !== "company";
    if (isPerm) {
      // Najnowsza data wpłaty (z paidMonths YYYY-MM, traktujemy jako ostatni dzień miesiąca)
      const pm = Array.isArray(b.paidMonths) ? b.paidMonths : [];
      if (pm.length > 0) {
        const latest = pm.slice().sort().pop();
        if (!lastPaymentDate || latest > lastPaymentDate) lastPaymentDate = latest;
      }
    }
  });
  // Media w okresie raportu — uwzględniamy tylko miesiące nakładające się z filtrem.
  // v3.39: filtr na valid loc IDs (skip legacy room-keyed entries).
  const _validLocs = new Set(DATA.locations.map(l => String(l.id)));
  Object.entries(roomMedia).forEach(([key, m]) => {
    const [keyId, period] = key.split("__");
    if (!_validLocs.has(keyId)) return;
    if (!periodRange) { totMedia += sumMediaObjNetto(m); return; }   // v3.46 — główny hero netto → media netto
    if (periodOverlapsRange(period, periodRange.from, periodRange.to)) totMedia += sumMediaObjNetto(m);
  });

  // Data rozliczenia = ostatnia odnotowana wpłata (z paidMonths stałych najemców
  // lub z payment.amountPaid). Format YYYY-MM dla najpóźniejszego paidMonths.
  let lastPaymentDateLabel = "";
  if (lastPaymentDate) {
    const [py, pm] = lastPaymentDate.split("-").map(Number);
    lastPaymentDateLabel = `${MONTHS[pm-1]} ${py}`;
  }

  let html = `
    <div class="reports-toolbar">
      <div class="reports-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${ICONS.fileText(22)} Raporty i finanse <span style="font-size:12px;font-weight:400;color:var(--text2)">${periodLabel}</span>${lastPaymentDateLabel ? `<span style="font-size:11px;color:var(--green);background:var(--green-light);border:1px solid var(--green-mid);padding:3px 9px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:5px">${ICONS.checkCircle(11)} Ostatnie rozliczenie: ${lastPaymentDateLabel}</span>` : ""}</div>
    </div>
    ${filterBar}
    ${(() => {
      const totZysk = totRevenue - totMedia;                              // Zysk = Obrót netto − Media netto
      const totRemaining = Math.max(0, totRevenueBrutto - totPaidBrutto);  // Do pobrania (brutto)
      const unpaidCount = filteredByPeriod.filter(b => {
        const loc = DATA.locations.find(l=>l.id===b.locId);
        const room = loc?.rooms.find(r=>r.id===b.roomId);
        const t = calcBookingTotal(b, room, getActualNights(b), periodRange);
        const paid = bookingPaidInRange(b, room, periodRange?.from, periodRange?.to);
        return Math.max(0, t - paid) > 0;
      }).length;
      const paidPct = totRevenueBrutto > 0 ? Math.round((totPaidBrutto / totRevenueBrutto) * 100) : 0;
      const zl = n => `zł${Math.round(n).toLocaleString()}`;
      // v3.54 — model: Przychód (brutto) · Obrót (netto) · Zysk = Obrót − Media (netto).
      return `
      <div class="summary-strip dual-hero-layout">
        <div class="sum-card hero">
          <div class="lbl">Zysk <span class="hero-tag">obrót − media</span></div>
          <div class="val" style="color:${totZysk < 0 ? "var(--red)" : "var(--green)"}">${zl(totZysk)}</div>
          <div class="sub">Obrót netto ${zl(totRevenue)} − Media netto ${zl(totMedia)}</div>
        </div>
        <div class="sum-card">
          <div class="lbl">Przychód <span class="hero-tag">brutto</span></div>
          <div class="val" style="color:var(--blue)">${zl(totRevenueBrutto)}</div>
          <div class="sub">${filteredByPeriod.length} ${nrez(filteredByPeriod.length)}</div>
        </div>
        <div class="sum-card">
          <div class="lbl">Obrót <span class="hero-tag">netto</span></div>
          <div class="val">${zl(totRevenue)}</div>
          <div class="sub">przychód bez VAT</div>
        </div>
        <div class="sum-card">
          <div class="lbl">Wpłacono <span class="hero-tag">brutto</span></div>
          <div class="val" style="color:${totPaidBrutto>=totRevenueBrutto?"var(--green)":"var(--text)"}">${zl(totPaidBrutto)}</div>
          <div class="sub">${paidPct}% przychodu</div>
        </div>
        <div class="sum-card">
          <div class="lbl">Do pobrania <span class="hero-tag">brutto</span></div>
          <div class="val" style="color:${totRemaining>0?"var(--orange)":"var(--green)"}">${zl(totRemaining)}</div>
          <div class="sub">${unpaidCount > 0 ? `${unpaidCount} ${nrez(unpaidCount)} z zaległością` : "wszystko opłacone"}</div>
        </div>
      </div>`;
    })()}`;

  // Group bookings by city → location → company/individual
  const rq = (state.reportsSearch||"").toLowerCase();
  const byCity = {};
  DATA.locations.forEach(loc => {
    let locBookings = filteredByPeriod.filter(b => b.locId === loc.id);
    if (rq) {
      locBookings = locBookings.filter(b => {
        const who = b.bookingType==="company" ? b.companyName : b.guests.map(g=>g.name).join(" ");
        return who.toLowerCase().includes(rq) || loc.name.toLowerCase().includes(rq) || loc.city.toLowerCase().includes(rq);
      });
    }
    if (locBookings.length === 0) return;
    if (!byCity[loc.city]) byCity[loc.city] = [];
    byCity[loc.city].push({ loc, bookings: locBookings });
  });

  Object.entries(byCity).forEach(([city, locEntries]) => {
    html += `<div class="city-group-hdr">${ICONS.mapPin(11)} ${esc(city)}</div>`;

    locEntries.forEach(({ loc, bookings }) => {
      // Calculate location financials
      // v3.46 — blok per-lokalizacja liczony w BRUTTO (operacyjnie), plus osobny
      // wskaźnik "Zysk netto" = przychód netto − media netto (realny zysk dla obiektu).
      let locRevenueB = 0, locRevenueN = 0, locPaidB = 0, locMediaB = 0, locMediaN = 0;
      bookings.forEach(b => {
        const room = loc.rooms.find(r=>r.id===b.roomId);
        const nights = getActualNights(b);
        const t = calcBookingTotal(b, room, nights, periodRange);
        const _f = bookingNettoFactor(b);
        locRevenueB += t;          // brutto
        locRevenueN += t * _f;     // netto
        // v3.19 — pro-rata clip wpłaconej kwoty (brutto)
        locPaidB += bookingPaidInRange(b, room, periodRange?.from, periodRange?.to);
      });
      // media per-LOCATION: brutto (bloki operacyjne) + netto (zysk netto)
      getRoomMediaPeriods(loc.id).forEach(period => {
        if (periodRange && !periodOverlapsRange(period, periodRange.from, periodRange.to)) return;
        locMediaB += sumRoomMedia(loc.id, period);
        locMediaN += sumRoomMediaNetto(loc.id, period);
      });
      const locZysk = locRevenueN - locMediaN;                    // Zysk = Obrót netto − Media netto
      const locRemainingB = Math.max(0, locRevenueB - locPaidB);  // Do pobrania (brutto)
      const _zl = n => `zł${Math.round(n).toLocaleString()}`;

      html += `
        <div class="loc-finance-block">
          <div class="loc-finance-hdr">
            <div>
              <div class="loc-finance-title">${locIcon(loc, 16)} ${esc(loc.name)}</div>
              <div class="loc-finance-sub">${bookings.length} ${nrez(bookings.length)}</div>
            </div>
          </div>
          <div class="loc-finance-totals dual-hero-layout">
            <div class="loc-fin-stat hero" style="border:1.5px solid var(--green);background:var(--green-light)">
              <span class="k" style="color:var(--green);font-weight:700">Zysk <span class="hero-tag" style="background:var(--green);color:#fff">obrót − media</span></span>
              <span class="v" style="color:${locZysk < 0 ? 'var(--red)' : 'var(--green)'};font-weight:800">${_zl(locZysk)}</span>
              <span class="sub">Obrót netto ${_zl(locRevenueN)} − Media netto ${_zl(locMediaN)}</span>
            </div>
            <div class="loc-fin-stat"><span class="k">Przychód <span class="hero-tag">brutto</span></span><span class="v blue">${_zl(locRevenueB)}</span></div>
            <div class="loc-fin-stat"><span class="k">Obrót <span class="hero-tag">netto</span></span><span class="v">${_zl(locRevenueN)}</span></div>
            <div class="loc-fin-stat"><span class="k">Wpłacono <span class="hero-tag">brutto</span></span><span class="v ${locPaidB>=locRevenueB?"green":""}">${_zl(locPaidB)}</span></div>
            <div class="loc-fin-stat"><span class="k">Do pobrania <span class="hero-tag">brutto</span></span><span class="v ${locRemainingB>0?"orange":"green"}">${_zl(locRemainingB)}</span></div>
          </div>`;

      // Group by permanent / company / individual within this location.
      // Stali najemcy mają osobną sekcję bo rządzą się innymi regułami (paidMonths, no expiry).
      const permanents = [];
      const companies = {};
      const individuals = [];
      bookings.forEach(b => {
        const isPerm = b.isPermanent && b.bookingType !== "company";
        if (isPerm) {
          permanents.push(b);
        } else if (b.bookingType === "company") {
          if (!companies[b.companyName]) companies[b.companyName] = [];
          companies[b.companyName].push(b);
        } else {
          individuals.push(b);
        }
      });

      // v3.20 — sortowanie bookings wewnątrz każdej grupy wg state.reportsSort.
      // Stosowane do permanents, individuals, oraz każdej firmy z osobna.
      const sortBookingsInGroup = (list) => {
        const sortKey = state.reportsSort || "date_desc";
        const dir = sortKey.endsWith("_asc") ? 1 : -1;
        return list.slice().sort((a, b) => {
          const room_a = loc.rooms.find(r=>r.id===a.roomId);
          const room_b = loc.rooms.find(r=>r.id===b.roomId);
          if (sortKey.startsWith("date")) {
            const da = a.isPermanent ? (a.permanentStart || a.from) : a.from;
            const db = b.isPermanent ? (b.permanentStart || b.from) : b.from;
            return da === db ? 0 : (da < db ? 1 : -1) * dir;
          }
          if (sortKey.startsWith("amount")) {
            const ta = calcBookingTotal(a, room_a, getActualNights(a), periodRange);
            const tb = calcBookingTotal(b, room_b, getActualNights(b), periodRange);
            return (tb - ta) * dir;  // dir handles asc/desc
          }
          if (sortKey === "remaining_desc") {
            const ta = calcBookingTotal(a, room_a, getActualNights(a), periodRange);
            const tb = calcBookingTotal(b, room_b, getActualNights(b), periodRange);
            const pa = bookingPaidInRange(a, room_a, periodRange?.from, periodRange?.to);
            const pb = bookingPaidInRange(b, room_b, periodRange?.from, periodRange?.to);
            return Math.max(0, tb - pb) - Math.max(0, ta - pa);  // desc
          }
          if (sortKey === "name_asc") {
            const na = a.bookingType === "company" ? (a.companyName || "") : ((a.guests?.[0]?.name) || "");
            const nb = b.bookingType === "company" ? (b.companyName || "") : ((b.guests?.[0]?.name) || "");
            return na.localeCompare(nb, "pl");
          }
          return 0;
        });
      };

      // Stali najemcy — sekcja pierwsza, najbardziej "powtarzalny" przychód.
      if (permanents.length > 0) {
        const t = permanents.reduce((s, b) => {
          const room = loc.rooms.find(r => r.id === b.roomId);
          return s + calcBookingTotal(b, room, getActualNights(b), periodRange);
        }, 0);
        const overdueTotal = permanents.reduce((s, b) => s + getPermanentOverdueMonths(b, b.from, b.payment?.timing).length, 0);
        const fullyPaidCount = permanents.filter(b => {
          const am = getPermanentActiveMonths(b, b.from, periodRange?.from, periodRange?.to);
          const pm = am.filter(m => (b.paidMonths||[]).includes(m));   // v3.53 — bez auto-pay prepaid
          return am.length > 0 && pm.length === am.length;
        }).length;
        const headerBadge = overdueTotal > 0
          ? `<span style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:8px;display:inline-flex;align-items:center;gap:3px">${ICONS.alertTriangle(10)} ${overdueTotal} zaległych mies.</span>`
          : (fullyPaidCount === permanents.length
            ? `<span style="background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:8px;display:inline-flex;align-items:center;gap:3px">${ICONS.checkCircle(10)} wszyscy opłaceni</span>`
            : `<span style="background:var(--surface3);color:var(--text2);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:8px">${fullyPaidCount}/${permanents.length} opłaconych</span>`);
        html += `
          <div class="report-block" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:1px solid var(--border);background:var(--green-light);">
            <div class="report-block-hdr">
              <div class="report-entity">${ICONS.house(13)} Stali najemcy <span class="ibadge ibadge-in" style="background:var(--green);color:#fff">Permanent</span>${headerBadge}</div>
              <div class="report-total">zł${t.toLocaleString()}</div>
            </div>
            ${sortBookingsInGroup(permanents).map(b => buildReportRow(b, loc, periodRange)).join("")}
          </div>`;
      }

      Object.entries(companies).forEach(([name, cBookings]) => {
        const t = cBookings.reduce((s,b) => {
          const room = loc.rooms.find(r=>r.id===b.roomId);
          const nights = getActualNights(b);
          return s + calcBookingTotal(b, room, nights, periodRange);
        }, 0);
        // Grupuj bookingi tej firmy po (from, to) — jedna transza = jedna grupa multi-room.
        // v3.20: cBookings sortowane przed groupowaniem → trancheGroups insertion order = sort order
        const trancheGroups = {};
        sortBookingsInGroup(cBookings).forEach(b => {
          const key = `${b.from}__${b.to}`;
          (trancheGroups[key] = trancheGroups[key] || []).push(b);
        });
        html += `
          <div class="report-block" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:1px solid var(--border);">
            <div class="report-block-hdr">
              <div class="report-entity">${ICONS.building(13)} ${esc(name)} <span class="ibadge ibadge-co">Firma</span></div>
              <div class="report-total">zł${t.toLocaleString()}</div>
            </div>
            ${Object.values(trancheGroups).map(group => {
              return group.length === 1
                ? buildReportRow(group[0], loc, periodRange)
                : buildReportGroupRow(group, loc, name, periodRange);
            }).join("")}
          </div>`;
      });

      if (individuals.length>0) {
        const t = individuals.reduce((s,b) => {
          const room = loc.rooms.find(r=>r.id===b.roomId);
          const nights = getActualNights(b);
          return s + calcBookingTotal(b, room, nights, periodRange);
        }, 0);
        html += `
          <div class="report-block" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:1px solid var(--border);">
            <div class="report-block-hdr">
              <div class="report-entity">${ICONS.user(13)} Indywidualne <span class="ibadge ibadge-in">Indyw.</span></div>
              <div class="report-total">zł${t.toLocaleString()}</div>
            </div>
            ${sortBookingsInGroup(individuals).map(b=>buildReportRow(b, loc, periodRange)).join("")}
          </div>`;
      }

      html += `</div>`; // close loc-finance-block

      // ─── MEDIA PER LOCATION (inline, after bookings) ───
      html += buildMediaSectionForLoc(loc);

    });
  });

  return html;
}

// Grupowy wiersz dla firm multi-room (ta sama firma + te same daty = jedna transza).
// Jeden wiersz z sumarycznym opisem; klik rozwija osobne wpisy per pokój.
function buildReportGroupRow(groupBookings, loc, companyName, periodRange) {
  const groupId = `${companyName}__${groupBookings[0].from}__${groupBookings[0].to}`;
  const isExpanded = !!state.expandedGroups[groupId];
  const first = groupBookings[0];
  const reservedNights = diffDays(first.from, first.to);

  // Suma kwoty i wpłat (z clip do okresu raportu, v3.19).
  let totalCost = 0, totalPaid = 0;
  groupBookings.forEach(b => {
    const room = loc.rooms.find(r=>r.id===b.roomId);
    const _f = bookingNettoFactor(b);  // v3.38 — netto
    totalCost += calcBookingTotal(b, room, getActualNights(b), periodRange) * _f;
    totalPaid += bookingPaidInRange(b, room, periodRange?.from, periodRange?.to) * _f;
  });
  const totalRemaining = Math.max(0, totalCost - totalPaid);

  // Lista pokoi (etykietki)
  const roomChips = groupBookings.map(b => {
    const r = loc.rooms.find(x => x.id === b.roomId);
    const label = r ? (/^\d+$/.test(r.name||"") ? `Pokój ${r.name}` : r.name) : b.roomId;
    return `<span style="font-variant-numeric:tabular-nums;background:var(--surface);padding:2px 8px;border-radius:99px;border:1px solid var(--border);font-size:11px">${esc(label)}</span>`;
  }).join("");

  // Unikalne osoby w grupie (po name) — bo guests są kopiowani do każdego bookingu
  const uniqueGuestNames = new Set();
  groupBookings.forEach(b => (b.guests || []).forEach(g => g.name && uniqueGuestNames.add(g.name)));
  const totalPeople = uniqueGuestNames.size;

  const pmLabels = { invoice:"Faktura", cash:"Gotówka", transfer:"Przelew" };
  const pmCls = { invoice:"pm-invoice", cash:"pm-cash", transfer:"pm-transfer" };
  const timLabels = { prepaid:"Przed pobytem", postpaid:"Po pobycie" };

  // Ile osób ma status stałego najemcy
  const permCount = [...uniqueGuestNames].filter(name => {
    return groupBookings.some(b => (b.guests || []).find(g => g.name === name && g.isPermanent));
  }).length;

  return `
    <div class="report-row" data-group-toggle="${groupId}" style="cursor:pointer;background:${isExpanded?"var(--blue-light)":""};transition:background 0.1s">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--orange);letter-spacing:0.3px;margin-bottom:4px">
          ${isExpanded ? "▼" : "▶"} ${groupBookings.length} ${groupBookings.length<5?"pokoje":"pokoi"} · ${totalPeople} ${totalPeople===1?"osoba":totalPeople<5?"osoby":"osób"}${permCount > 0 ? ` · <span style="color:var(--green);display:inline-flex;align-items:center;gap:4px">${ICONS.house(12)} ${permCount} ${permCount===1?"stały":"stali"}</span>` : ""}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${roomChips}</div>
      </div>
      <div>
        <div class="report-dates-cell">Zab: ${fmtDate(first.from)} → ${fmtDate(first.to)} (${reservedNights} ${nw(reservedNights)})</div>
      </div>
      <div>
        <span class="pm-badge ${pmCls[first.payment?.method]||"pm-pending"}">${pmLabels[first.payment?.method]||"—"}</span>
        <div class="report-sub">${timLabels[first.payment?.timing]||"—"}</div>
      </div>
      <div>
        <div class="report-amount">zł${totalCost.toLocaleString()}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">${isExpanded ? "Kliknij aby zwinąć" : "Kliknij aby zobaczyć szczegóły"}</div>
      </div>
    </div>
    ${totalPaid > 0 || totalRemaining > 0 ? `
      <div class="pay-strip" data-group-toggle="${groupId}" style="cursor:pointer">
        <div class="pay-strip-item"><span class="pay-strip-key">Łącznie</span><span class="pay-strip-val">zł${totalCost.toLocaleString()}</span></div>
        <div class="pay-strip-item"><span class="pay-strip-key">Wpłacono</span><span class="pay-strip-val ok">zł${totalPaid.toLocaleString()}</span></div>
        <div class="pay-strip-item"><span class="pay-strip-key">Pozostało</span><span class="pay-strip-val ${totalRemaining>0?"warn":"ok"}">zł${totalRemaining.toLocaleString()}</span></div>
      </div>` : ""}
    ${isExpanded ? `
      <div style="padding:0 0 0 24px;border-left:3px solid var(--blue-mid);margin:0 0 8px 14px;background:var(--surface2)">
        ${groupBookings.map(b => buildReportRow(b, loc, periodRange)).join("")}
      </div>` : ""}`;
}

function buildReportRow(b, loc, periodRange) {
  const room = loc?.rooms.find(r=>r.id===b.roomId) || DATA.locations.find(l=>l.id===b.locId)?.rooms.find(r=>r.id===b.roomId);
  const actualNights = getActualNights(b);
  const reservedNights = diffDays(b.from, b.to);
  const ae = getActualEnd(b); const isExtended = ae && parseDate(ae) > parseDate(b.to);
  // v3.46 — wiersze rezerwacji per-lokalizacja pokazują kwoty BRUTTO (operacyjnie).
  const total = calcBookingTotal(b, room, actualNights, periodRange);

  // v3.19 — używa bookingPaidInRange (pro-rata clip dla non-perm, paidMonths dla perm).
  const isPerm = b.isPermanent && b.bookingType !== "company";
  const rFrom = periodRange?.from || null;
  const rTo = periodRange?.to || null;
  const paid = bookingPaidInRange(b, room, rFrom, rTo);
  const remaining = Math.max(0, total - paid);
  const overdueMonths = isPerm ? getPermanentOverdueMonths(b, b.from, b.payment?.timing) : [];

  const pmLabels = { invoice:"Faktura", cash:"Gotówka", transfer:"Przelew" };
  const pmCls = { invoice:"pm-invoice", cash:"pm-cash", transfer:"pm-transfer" };
  const timLabels = { prepaid:"Przed pobytem", postpaid:"Po pobycie" };

  // Dla firmy multi-room (bedsUsed) pokazujemy liczbę pracowników przypisanych DO TEGO pokoju, nie wszystkich z bookingu
  const inRoomGuests = b.bookingType === "company"
    ? (b.guests || []).filter(g => !g.assignedRoom || g.assignedRoom === b.roomId)
    : b.guests || [];
  const who = b.bookingType==="company"
    ? `${b.companyName}${inRoomGuests.length > 0 ? ` (${inRoomGuests.length} ${inRoomGuests.length===1?"os.":"os."})` : ""}`
    : b.guests.map(g=>g.name).filter(Boolean).join(", ");
  // "Pokój X" prefiks gdy nazwa jest czystą liczbą; inaczej zostaw oryginalną nazwę
  const roomLabel = room ? (/^\d+$/.test(room.name||"") ? `Pokój ${room.name}` : room.name) : "—";

  // Permanent tenant rate info — pokazujemy w sub-tekście pod datami
  const permMonthlyBooking = b.isPermanent ? parseFloat(b.permanentMonthlyRate) : NaN;
  const permGuestsWithMonthly = (b.guests || []).filter(g => g.isPermanent && parseFloat(g.permanentMonthlyRate) > 0);
  const showPermMonthly = (!isNaN(permMonthlyBooking) && permMonthlyBooking > 0) || permGuestsWithMonthly.length > 0;
  const permMonthlyHint = !showPermMonthly ? "" : (() => {
    if (!isNaN(permMonthlyBooking) && permMonthlyBooking > 0) {
      return `<div class="report-dates-cell" style="color:var(--green);display:flex;align-items:center;gap:4px">${ICONS.house(11)} Stała stawka: zł${permMonthlyBooking}/mies.</div>`;
    }
    const labels = permGuestsWithMonthly.map(g => `${esc(g.name||"—")}: zł${parseFloat(g.permanentMonthlyRate)}/mies.`).join(", ");
    return `<div class="report-dates-cell" style="color:var(--green);display:flex;align-items:center;gap:4px">${ICONS.house(11)} ${labels}</div>`;
  })();

  // Permanent payment status badge — quick-glance ✓ / ⚠
  const activeMonthsInPeriod = isPerm ? getPermanentActiveMonths(b, b.from, rFrom, rTo) : [];
  // v3.59 — model kumulacyjny: liczymy miesiące POKRYTE (raty/override), nie tylko pełne zaznaczenia.
  const permCov = isPerm ? getPermanentCoverage(b, (b.priceAtBooking?.basePrice ?? room?.basePrice ?? 0), b.from) : null;
  const coveredSet = permCov ? new Set(permCov.months.filter(m => m.fullyCovered).map(m => m.ym)) : new Set();
  const paidInPeriod = activeMonthsInPeriod.filter(m => coveredSet.has(m));
  const fullyPaid = isPerm && activeMonthsInPeriod.length > 0 && paidInPeriod.length === activeMonthsInPeriod.length;
  const permStatusBadge = !isPerm ? "" : (fullyPaid
    ? `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px" title="Wszystkie miesiące w okresie zapłacone">${ICONS.checkCircle(10)} Opłacone</span>`
    : (overdueMonths.length > 0
      ? `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px" title="Zaległość: ${overdueMonths.join(', ')}">${ICONS.alertTriangle(10)} Zaległość: ${overdueMonths.length} ${overdueMonths.length===1?'mies.':overdueMonths.length<5?'mies.':'mies.'}</span>`
      : (activeMonthsInPeriod.length > 0
        ? `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-border);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:6px" title="${paidInPeriod.length}/${activeMonthsInPeriod.length} miesięcy zapłaconych w okresie">${paidInPeriod.length}/${activeMonthsInPeriod.length} mies.</span>`
        : "")));

  // v3.53 — status wpłaty dla zwykłej (nie-permanent) rezerwacji ZAWSZE widoczny:
  // opłacone (zielony) / niepełna wpłata / brak wpłaty z zaległością (czerwony) /
  // częściowo bez zaległości (pomarańczowy) / niezapłacone (szary, jeszcze nie wymagalne).
  const postpaidWarn = !isPerm ? getPaymentWarning(b) : null;
  const _badge = (bg, col, br, icon, txt, ttl) => `<span style="display:inline-flex;align-items:center;gap:3px;background:${bg};color:${col};${br?`border:1px solid ${br};`:""}font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px" title="${esc(ttl||txt)}">${icon} ${txt}</span>`;
  const postpaidBadge = isPerm ? "" : (() => {
    if (total <= 0) return "";
    if (paid >= total - 0.01) return _badge("var(--green)", "#fff", "", ICONS.checkCircle(10), "Opłacone", `Wpłacono zł${Math.round(paid).toLocaleString()}`);
    if (postpaidWarn) return _badge("var(--red)", "#fff", "", ICONS.alertTriangle(10), postpaidWarn.paid > 0 ? "Niepełna wpłata" : "Brak wpłaty", postpaidWarn.message);
    if (paid > 0) return _badge("var(--orange-light)", "var(--orange)", "var(--orange-border)", ICONS.clock ? ICONS.clock(10) : "", `Wpłacono zł${Math.round(paid).toLocaleString()}/${Math.round(total).toLocaleString()}`);
    return _badge("var(--surface3)", "var(--text2)", "", "", "Niezapłacone", "Brak wpłaty (jeszcze nie wymagalne)");
  })();

  return `
    <div>
      <div class="report-row">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--orange);letter-spacing:0.3px;margin-bottom:2px">${esc(roomLabel)}</div>
          <div class="report-guest">${esc(who||"—")}${isExtended?'<span class="ext-badge">Przedłużony</span>':''}${permStatusBadge}${postpaidBadge}</div>
        </div>
        <div>
          ${isPerm
            ? `<div class="report-dates-cell" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                 <span style="display:inline-flex;align-items:center;gap:4px;color:var(--green);font-weight:600">${ICONS.house(11)} Stały najemca</span>
                 <span>od ${fmtDate(b.permanentStart || b.from)}</span>
                 ${b.permanentEnd
                   ? `<span>· do ${fmtDate(b.permanentEnd)}</span>`
                   : `<span style="color:var(--green);font-weight:600">· do odwołania</span>`}
               </div>
               ${activeMonthsInPeriod.length > 0 ? `<div class="report-dates-cell" style="color:var(--text2)">${activeMonthsInPeriod.length} ${nm(activeMonthsInPeriod.length)} ${periodRange ? "w okresie" : "aktywności"}</div>` : ""}`
            : `<div class="report-dates-cell">Zab: ${fmtDate(b.from)} → ${fmtDate(b.to)} (${reservedNights} ${nw(reservedNights)})</div>
               ${actualNights !== reservedNights ? `<div class="report-dates-cell" style="color:var(--orange)">Fakt: ${actualNights} ${nw(actualNights)} zaznaczonych</div>` : ""}`}
          ${permMonthlyHint}
        </div>
        <div>
          <span class="pm-badge ${pmCls[b.payment?.method]||"pm-pending"}">${pmLabels[b.payment?.method]||"—"}</span>
          <div class="report-sub">${timLabels[b.payment?.timing]||"—"}</div>
        </div>
        <div>
          <div class="report-amount">zł${total.toLocaleString()}</div>
          <div class="action-row" style="margin-top:4px">
            <button class="act-btn" data-edit="${b.id}">Edytuj</button>
          </div>
        </div>
      </div>
      ${(paid > 0 || remaining > 0) && !(isPerm && fullyPaid) ? `
        <div class="pay-strip">
          <div class="pay-strip-item"><span class="pay-strip-key">Łącznie</span><span class="pay-strip-val">zł${total.toLocaleString()}</span></div>
          <div class="pay-strip-item"><span class="pay-strip-key">Wpłacono</span><span class="pay-strip-val ok">zł${paid.toLocaleString()}</span></div>
          <div class="pay-strip-item"><span class="pay-strip-key">${isPerm ? "Do zapłaty" : "Pozostało"}</span><span class="pay-strip-val ${remaining>0?"warn":"ok"}">zł${remaining.toLocaleString()}</span></div>
        </div>` : ""}
    </div>`;
}

// ─── MEDIA SECTION per location (embedded in reports) ────────
function buildMediaSectionForLoc(loc) {
  // v3.39: Media PER OBIEKT (nie per pokój). Klucz w storage to loc.id.
  // Pokazuje wszystkie okresy zapisane dla tego obiektu + jeden form do dodania
  // wpisu za wybrany YYYY-MM. Aplikuje się do całego budynku jako koszt operacyjny.
  const allPeriods = getRoomMediaPeriods(loc.id);
  const hasAnyBookings = savedBookings.some(b => b.locId === loc.id);
  let locMediaTotal = 0, locMediaTotalNetto = 0;   // v3.46 — brutto + netto
  allPeriods.forEach(p => { locMediaTotal += sumRoomMedia(loc.id, p); locMediaTotalNetto += sumRoomMediaNetto(loc.id, p); });

  if (allPeriods.length === 0 && !hasAnyBookings) return "";

  const isExpanded = !!state.mediaExpanded[loc.id];
  const summary = allPeriods.length > 0
    ? `${allPeriods.length} ${allPeriods.length===1?"okres":allPeriods.length<5?"okresy":"okresów"} · zł${locMediaTotal.toFixed(2)}`
    : `brak wpisów — kliknij aby dodać`;

  let html = `
    <div class="media-loc-section" style="margin-top:0;border-top:2px dashed var(--orange-border)">
      <div class="media-loc-title" data-media-loc-toggle="${loc.id}" style="border-radius:0;border-top:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px">
        <span>${isExpanded ? "▼" : "▶"} Media — ${locIcon(loc, 16)} ${esc(loc.name)}</span>
        <span style="font-size:11px;font-weight:500;color:var(--text2);font-variant-numeric:tabular-nums">${summary}</span>
      </div>
      ${isExpanded ? `<div style="padding:0">` : ""}`;

  if (!isExpanded) {
    html += `</div>`;
    return html;
  }

  const cp = currentPeriod();
  // v3.58 — media/faktury respektują filtr miesiąca/roku z Raportów.
  // Filtr miesiąca → tylko ten miesiąc; filtr roku → miesiące tego roku; brak → wszystkie + bieżący.
  let periods;
  if (state.reportsYear && state.reportsMonth) {
    periods = [`${state.reportsYear}-${state.reportsMonth}`];
  } else if (state.reportsYear) {
    const yp = allPeriods.filter(p => p.slice(0,4) === state.reportsYear);
    periods = yp.length ? yp : (allPeriods.includes(cp) ? allPeriods : [cp, ...allPeriods]);
  } else {
    periods = allPeriods.includes(cp) ? allPeriods : [cp, ...allPeriods];
  }

  // Header pojedynczy summary dla całego obiektu
  html += `
    <div style="padding:10px 14px;background:var(--orange-light);border-bottom:1px dashed var(--orange-border);font-size:11px;color:var(--orange);font-weight:600">
      ${locMediaTotal > 0 ? `Łącznie media obiektu: <strong>zł${locMediaTotal.toFixed(2)}</strong> netto` : "Brak wpisów media. Dodaj okres niżej."}
    </div>`;

  // Editor — jeden per okres (rzędy electricity/gas/water + others)
  periods.forEach(period => {
    const m = getRoomMedia(loc.id, period);
    const periodSum = sumRoomMedia(loc.id, period);
    const periodSumNetto = sumRoomMediaNetto(loc.id, period);   // v3.46
    const others = m.others || [];
    // v3.51 — wszystkie faktury przypięte do tego obiektu i okresu (niezależnie od opisu)
    const periodInvoices = invoices.filter(inv => inv.locId == loc.id && (inv.period || inv.date?.slice(0,7) || "") === period);
    html += `
      <div style="border:1px solid var(--orange-border);border-radius:var(--radius);padding:10px 12px;margin:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums">${period}</span>
          <span style="font-size:11px;color:var(--orange);font-variant-numeric:tabular-nums;font-weight:600">${periodSum>0?`Suma: zł${periodSum.toFixed(2)} netto`:""}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          ${[{field:"electricity",label:"Prąd",icon:ICONS.zap,val:m.electricity,vatField:"electricityVat",vatVal:m.electricityVat},{field:"gas",label:"Gaz",icon:ICONS.flame,val:m.gas,vatField:"gasVat",vatVal:m.gasVat},{field:"water",label:"Woda",icon:ICONS.droplet,val:m.water,vatField:"waterVat",vatVal:m.waterVat}].map(ft => {
            const linked = invoices.filter(inv => inv.roomId === loc.id && inv.period === period && stripEmoji(inv.note) === ft.label);
            const fid = `mi-${ft.field}-${loc.id}-${period}`;
            return `<div class="media-field">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
                <label style="margin:0;display:inline-flex;align-items:center;gap:5px">${ft.icon(13)} ${ft.label} (zł netto)</label>
                <label for="${fid}" style="cursor:pointer;font-size:10px;color:var(--blue);padding:1px 6px;border-radius:4px;background:var(--blue-light);white-space:nowrap;font-weight:600;display:inline-flex;align-items:center;gap:3px">${ICONS.pin(10)}${linked.length > 0 ? linked.length : ''}</label>
              </div>
              <input type="file" id="${fid}" style="display:none" accept=".pdf,.jpg,.jpeg,.png"
                data-mi-room="${loc.id}" data-mi-loc="${loc.id}" data-mi-period="${period}"
                data-mi-type="${ft.label}" data-mi-field="${ft.field}" />
              <input type="number" class="media-inp" data-roomid="${loc.id}" data-period="${period}" data-field="${ft.field}" value="${ft.val||""}" placeholder="0.00" min="0" step="0.01" />
              ${linked.map(inv => `<a href="${inv.url||"#"}" target="_blank" title="${esc(inv.filename)}"
                style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--blue);text-decoration:none;margin-top:3px;padding:2px 6px;border-radius:4px;background:var(--blue-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                📄 ${esc(inv.filename||"Faktura")}</a>`).join("")}
            </div>`;
          }).join("")}
        </div>
        ${others.map((o,idx) => {
          const oLabel = o.label || `Inne ${idx+1}`;
          const oLinked = invoices.filter(inv => inv.roomId === loc.id && inv.period === period && stripEmoji(inv.note) === stripEmoji(oLabel));
          const ofid = `mi-other-${loc.id}-${period}-${idx}`;
          return `
          <div style="display:grid;grid-template-columns:1fr 120px auto auto;gap:6px;align-items:flex-end;margin-bottom:6px">
            <div class="media-field"><label style="display:inline-flex;align-items:center;gap:5px">${ICONS.pin(12)} Inne — opis</label>
              <input type="text" class="media-inp" data-roomid="${loc.id}" data-period="${period}" data-field="other_label_${idx}" value="${esc(oLabel)}" placeholder="np. Naprawa…" style="font-family:inherit" /></div>
            <div class="media-field"><label>Kwota (zł netto)</label>
              <input type="number" class="media-inp" data-roomid="${loc.id}" data-period="${period}" data-field="other_amount_${idx}" value="${o.amount||""}" placeholder="0.00" min="0" step="0.01" /></div>
            <div style="align-self:flex-end;margin-bottom:1px">
              <input type="file" id="${ofid}" style="display:none" accept=".pdf,.jpg,.jpeg,.png"
                data-mi-room="${loc.id}" data-mi-loc="${loc.id}" data-mi-period="${period}"
                data-mi-type="${esc(oLabel)}" data-mi-field="other_${idx}" />
              <label for="${ofid}" style="display:flex;align-items:center;justify-content:center;cursor:pointer;width:30px;height:30px;border-radius:var(--radius);background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:700;border:1px solid var(--blue-light)"${oLinked.length > 0 ? ' title="'+oLinked.length+' faktura/y"' : ''}>${ICONS.pin(13)}${oLinked.length > 0 ? `<span style="font-size:9px;margin-left:2px">${oLinked.length}</span>` : ""}</label>
            </div>
            <button class="remove-btn" data-remove-other="${loc.id}" data-period="${period}" data-other-idx="${idx}" style="margin-bottom:1px;align-self:flex-end">✕</button>
          </div>`;
        }).join("")}
        ${periodInvoices.length > 0 ? `
        <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px;display:flex;align-items:center;gap:5px">${ICONS.fileText(11)} Faktury za ten okres (${periodInvoices.length})</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${periodInvoices.map(inv => `
              <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:11px">
                <span style="flex-shrink:0;color:var(--blue)">${ICONS.fileText(13)}</span>
                <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(inv.filename || "Faktura")}${inv.note ? ` · <span style="color:var(--text3)">${esc(stripEmoji(inv.note))}</span>` : ""}${inv.amount ? ` · <strong style="font-variant-numeric:tabular-nums">zł${parseFloat(inv.amount).toLocaleString()}</strong>` : ""}</div>
                ${inv.url ? `<a href="${esc(inv.url)}" target="_blank" rel="noopener" style="flex-shrink:0;display:inline-flex;align-items:center;gap:4px;color:var(--blue);text-decoration:none;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--blue-light)" title="Otwórz fakturę w nowej karcie">${ICONS.eye(12)} Podgląd</a>` : `<span style="flex-shrink:0;color:var(--text3);font-size:10px">brak pliku</span>`}
              </div>`).join("")}
          </div>
        </div>` : ""}
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="media-add-period-btn" data-add-other="${loc.id}" data-period="${period}" style="margin-top:0">+ Dodaj inne</button>
          <button class="media-save-btn" data-media-save="${loc.id}" data-period="${period}">${ICONS.save(13)} Zapisz</button>
        </div>
      </div>`;
  });

  // Dodaj nowy okres
  html += `
    <div style="padding:10px 14px;border-top:1px dashed var(--orange-border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--surface)">
      <span style="font-size:11px;color:var(--text2)">Dodaj media za inny okres:</span>
      <input type="month" id="media-period-picker-${loc.id}" value="${currentPeriod()}"
        style="padding:5px 8px;border:1px dashed var(--orange-border);border-radius:var(--radius);font-size:11px;color:var(--orange);background:var(--surface);font-variant-numeric:tabular-nums;outline:none;cursor:pointer" />
      <button class="media-add-period-btn" data-add-period="${loc.id}" style="margin-top:0">+ Dodaj wybrany okres</button>
    </div>`;

  html += `</div></div>`; // close padding wrapper + media-loc-section
  return html;
}
