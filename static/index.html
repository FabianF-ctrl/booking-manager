// ─── CHARTS TAB ──────────────────────────────────────────────
function buildCharts() {
  const hasData = savedBookings.length > 0;
  const selLoc = state.chartLocId || "all";
  const selType = state.chartType || "revenue";
  const chartFrom = state.chartFrom || toStr(addDays(parseDate(todayStr()), -180));
  const chartTo = state.chartTo || todayStr();

  const chartTypes = [
    { id:"revenue",   lbl:"Przychód",   icon: ICONS.barChart(14) },
    { id:"occupancy", lbl:"Obłożenie",  icon: ICONS.grid(14) },
    { id:"bookings",  lbl:"Rezerwacje", icon: ICONS.fileText(14) },
    { id:"line",      lbl:"Trend",      icon: ICONS.barChart(14) },
    { id:"pie",       lbl:"Podział",    icon: ICONS.grid(14) },
  ];

  // ── KPI computation ──────────────────────────────────────────
  // Dla stałego najemcy: liczymy nights = miesiące, ale wyświetlamy je osobno (żeby
  // "61 nocy" nie było mylące dla permanent z monthly rate).
  let kpiRevenueBrutto = 0, kpiRevenue = 0, kpiNights = 0, kpiBookings = 0, kpiPaid = 0, kpiPaidBrutto = 0;
  let kpiPermMonths = 0, kpiPermBookings = 0;
  const kpiBuckets = {}; // YYYY-MM → revenue
  const kpiFromD = parseDate(chartFrom), kpiToD = parseDate(chartTo);
  const chartFromExcl = chartFrom;
  // chartTo jest inclusive w UI → przekształć na exclusive end (dzień+1) dla period range
  const chartToExcl = toStr(addDays(parseDate(chartTo), 1));
  const roomSet = new Set();
  savedBookings.forEach(b => {
    if (selLoc !== "all" && b.locId !== parseInt(selLoc)) return;
    // Dla permanent: weź pod uwagę overlap z chart range (nie tylko b.from)
    const isPerm = b.isPermanent && b.bookingType !== "company";
    if (bookingHasBillingPeriods(b)) {                            // v3.56 — po miesiącu końcowym okresu
      if (!billingMatchesRange(b, chartFromExcl, chartToExcl)) return;
    } else if (isPerm) {
      const pStart = b.permanentStart || b.from;
      // v3.28: open-ended → effectivePermanentEnd(chartToExcl) zamiast endOfCurrentMonthExclusive
      const pEnd = effectivePermanentEnd(b, chartToExcl);
      if (pStart >= chartToExcl || pEnd <= chartFromExcl) return;
    } else {
      const bFromD = parseDate(b.from);
      if (bFromD < kpiFromD || bFromD > kpiToD) return;
    }
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    const nights = getActualNights(b);
    const rev = calcBookingTotal(b, room, nights, { from: chartFromExcl, to: chartToExcl });
    const _kf = bookingNettoFactor(b);  // v3.38 — netto factor
    kpiRevenueBrutto += rev;        // v3.55 — Przychód (brutto)
    kpiRevenue += rev * _kf;        // Obrót (netto)
    kpiBookings++;
    // v3.19 — pro-rata clip wpłaconej kwoty do okresu wykresu
    const _kpaid = bookingPaidInRange(b, room, chartFromExcl, chartToExcl);
    kpiPaidBrutto += _kpaid;        // Wpłacono (brutto)
    kpiPaid += _kpaid * _kf;
    if (isPerm) {
      kpiPermBookings++;
      kpiPermMonths += getPermanentMonths(b, b.from, chartFromExcl, chartToExcl);
    } else {
      kpiNights += nights;
    }
    roomSet.add(b.roomId);
    const bFromForBucket = isPerm ? (b.permanentStart || b.from) : b.from;
    const dForBucket = parseDate(bFromForBucket);
    const key = `${dForBucket.getFullYear()}-${String(dForBucket.getMonth()+1).padStart(2,"0")}`;
    kpiBuckets[key] = (kpiBuckets[key] || 0) + rev * _kf;
  });
  const kpiMonthCount = Object.keys(kpiBuckets).length || 1;
  const kpiAvg = Math.round(kpiRevenue / kpiMonthCount);
  const kpiBest = Object.entries(kpiBuckets).sort((a,b)=>b[1]-a[1])[0];
  const kpiRemaining = Math.max(0, kpiRevenue - kpiPaid);

  // v3.18 — Media w okresie wykresu, dla zysku planowanego/zrealizowanego
  // v3.39: media per-LOCATION — filtr na valid loc IDs (skip legacy room keys)
  let kpiMedia = 0;
  const _validLocsK = new Set(DATA.locations.map(l => String(l.id)));
  Object.entries(roomMedia).forEach(([key, m]) => {
    const [keyId, period] = key.split("__");
    if (!_validLocsK.has(keyId)) return;
    if (periodOverlapsRange(period, chartFromExcl, chartToExcl)) kpiMedia += sumMediaObjNetto(m);   // v3.46 — wykresy netto
  });
  const kpiProfitPlanned = kpiRevenue - kpiMedia;
  const kpiProfitRealized = kpiPaid - kpiMedia;
  const kpiPaidPct = kpiRevenue > 0 ? Math.round((kpiPaid/kpiRevenue)*100) : 0;

  // Dual-hero (Przychód planowany + zrealizowany) + 3 detale (Przychód, Wpłacono, Do pobrania).
  // Wcześniej: hero "Przychód w okresie" + 3 detale (Wpłacono / Do pobrania / Najlepszy mies).
  // "Najlepszy miesiąc" usunięty — informacja zawarta w wykresie pod spodem.
  const _kzl = n => `${Math.round(n).toLocaleString()} zł`;
  const kpiZysk = kpiRevenue - kpiMedia;                                  // Zysk = Obrót netto − Media netto
  const kpiRemainingBrutto = Math.max(0, kpiRevenueBrutto - kpiPaidBrutto);
  const kpiPaidPctB = kpiRevenueBrutto > 0 ? Math.round((kpiPaidBrutto/kpiRevenueBrutto)*100) : 0;

        <div class="sub">Obrót netto ${_kzl(kpiRevenue)} − Media netto ${_kzl(kpiMedia)} · ${kpiAvg.toLocaleString()} zł/mies śr.</div>
      </div>

function buildChartCanvas(locId, type, from, to) {
  // Pie chart — breakdown by location
  if (type === "pie") {
    return buildPieChart(locId, from, to);
  }

  // Build monthly buckets between from and to
  const fromD = parseDate(from), toD = parseDate(to);
  const buckets = {}; // YYYY-MM → { revenue, nights, count }

  let d = new Date(fromD.getFullYear(), fromD.getMonth(), 1);
  while (d <= toD) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    buckets[key] = { revenue:0, nights:0, count:0 };
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  savedBookings.forEach(b => {
    if (locId !== "all" && b.locId !== parseInt(locId)) return;
    const bFrom = parseDate(b.from);
    if (bFrom < fromD || bFrom > toD) return;
    const key = `${bFrom.getFullYear()}-${String(bFrom.getMonth()+1).padStart(2,"0")}`;
    if (!buckets[key]) return;
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    const nights = getActualNights(b);
    const rev = calcBookingTotal(b, room, nights);
    buckets[key].revenue += rev;
    buckets[key].nights += nights;
    buckets[key].count += 1;
  });

  const keys = Object.keys(buckets).sort();
  if (keys.length === 0) return `<div class="no-results-box">Brak danych dla wybranego okresu.</div>`;

  const vals = keys.map(k => type==="revenue"||type==="line" ? buckets[k].revenue : type==="occupancy" ? buckets[k].nights : buckets[k].count);
  const maxVal = Math.max(...vals, 1);
  const chartH = 380;
  const unit = type==="revenue"||type==="line" ? "zł" : type==="occupancy" ? "nocy" : "rez.";

  if (type === "line") {
    return buildLineChart(keys, vals, maxVal, chartH, unit, from, to, locId);
  }

  const barW = Math.max(20, Math.min(48, Math.floor(540 / keys.length) - 4));
  const totalW = keys.length * (barW + 6) + 60;

  const bars = keys.map((k, i) => {
    const v = vals[i];
    const barH = Math.max(2, Math.round((v / maxVal) * chartH));
    const y = chartH - barH + 30;
    const x = 50 + i * (barW + 6);
    const color = type==="revenue" ? "var(--blue)" : type==="occupancy" ? "var(--green)" : "var(--orange)";
    const lbl = k.slice(2); // YY-MM
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="3" opacity="0.85" style="cursor:pointer">
        <title>${k}: ${v} ${unit}</title>
      </rect>
      <text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="var(--text2)">${v > 0 ? (type==="revenue" ? `zł${v}` : v) : ""}</text>
      <text x="${x + barW/2}" y="${chartH + 48}" text-anchor="middle" font-size="10" fill="var(--text2)" transform="rotate(-40,${x + barW/2},${chartH + 48})">${lbl}</text>`;
  }).join("");

  // Y-axis labels
  const yLabels = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const v = Math.round(maxVal * f);
    const y = 30 + chartH - Math.round(f * chartH);
    return `<text x="44" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text2)">${type==="revenue"?"zł":""}${v}</text>
      <line x1="50" y1="${y}" x2="${totalW}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
  }).join("");

  const typeLabel = { revenue:"Przychód miesięczny (zł)", occupancy:"Obłożenie (nocy)", bookings:"Liczba rezerwacji" }[type];
  const locLabel = locId==="all" ? "Wszystkie obiekty" : DATA.locations.find(l=>l.id===parseInt(locId))?.name || "";

  return `
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">${typeLabel}</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${locLabel} · ${fmtDate(from)} → ${fmtDate(to)}</div>
    <div style="overflow-x:auto">
      <svg width="${Math.max(totalW, 400)}" height="${chartH + 70}" style="display:block">
        ${yLabels}
        ${bars}
        <line x1="50" y1="30" x2="50" y2="${chartH+30}" stroke="var(--border2)" stroke-width="1"/>
        <line x1="50" y1="${chartH+30}" x2="${Math.max(totalW,400)}" y2="${chartH+30}" stroke="var(--border2)" stroke-width="1"/>
      </svg>
    </div>
    <div style="margin-top:12px;display:flex;gap:14px;flex-wrap:wrap">
      ${keys.map((k,i)=>`
        <div style="font-size:11px;font-variant-numeric:tabular-nums">
          <span style="color:var(--text2)">${k}</span>
          <span style="color:var(--text);font-weight:600;margin-left:6px">${type==="revenue"?"zł":""}${vals[i]} ${type!=="revenue"?unit:""}</span>
        </div>`).join("")}
    </div>`;
}

function buildLineChart(keys, vals, maxVal, chartH, unit, from, to, locId) {
  const totalW = Math.max(keys.length * 60 + 60, 400);
  const pts = keys.map((k, i) => {
    const v = vals[i];
    const x = 50 + i * ((totalW - 60) / Math.max(keys.length - 1, 1));
    const y = 30 + chartH - Math.round((v / maxVal) * chartH);
    return { x, y, v, k };
  });

  const polyline = pts.map(p => `${p.x},${p.y}`).join(" ");
  const areaPath = `M${pts[0].x},${30+chartH} ` + pts.map(p=>`L${p.x},${p.y}`).join(" ") + ` L${pts[pts.length-1].x},${30+chartH} Z`;

  const dots = pts.map(p => `
    <circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--blue)" stroke="var(--surface)" stroke-width="2" style="cursor:pointer">
      <title>${p.k}: ${p.v} ${unit}</title>
    </circle>
    <text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="10" fill="var(--text2)">${p.v > 0 ? (unit==="zł" ? `zł${p.v}` : p.v) : ""}</text>
    <text x="${p.x}" y="${chartH + 48}" text-anchor="middle" font-size="10" fill="var(--text2)" transform="rotate(-40,${p.x},${chartH + 48})">${p.k.slice(2)}</text>`
  ).join("");

  const yLabels = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const v = Math.round(maxVal * f);
    const y = 30 + chartH - Math.round(f * chartH);
    return `<text x="44" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text2)">${unit==="zł"?"zł":""}${v}</text>
      <line x1="50" y1="${y}" x2="${totalW}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
  }).join("");

  const locLabel = locId==="all" ? "Wszystkie obiekty" : DATA.locations.find(l=>l.id===parseInt(locId))?.name || "";
  return `
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">📉 Trend przychodu</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${locLabel} · ${fmtDate(from)} → ${fmtDate(to)}</div>
    <div style="overflow-x:auto">
      <svg width="${totalW}" height="${chartH + 70}" style="display:block">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--blue)" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="var(--blue)" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        ${yLabels}
        <path d="${areaPath}" fill="url(#areaGrad)"/>
        <polyline points="${polyline}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
        <line x1="50" y1="30" x2="50" y2="${chartH+30}" stroke="var(--border2)" stroke-width="1"/>
        <line x1="50" y1="${chartH+30}" x2="${totalW}" y2="${chartH+30}" stroke="var(--border2)" stroke-width="1"/>
      </svg>
    </div>`;
}

function buildPieChart(locId, from, to) {
  const fromD = parseDate(from), toD = parseDate(to);
  // Revenue per location
  const slices = [];
  DATA.locations.forEach(loc => {
    if (locId !== "all" && loc.id !== parseInt(locId)) return;
    let rev = 0;
    savedBookings.forEach(b => {
      if (b.locId !== loc.id) return;
      const bFrom = parseDate(b.from);
      if (bFrom < fromD || bFrom > toD) return;
      const room = loc.rooms.find(r=>r.id===b.roomId);
      const nights = getActualNights(b);
      rev += calcBookingTotal(b, room, nights);
    });
    if (rev > 0) slices.push({ label: loc.name, city: loc.city, icon: loc.icon, value: rev });
  });

  if (slices.length === 0) return `<div class="no-results-box">Brak danych dla wybranego okresu.</div>`;

  const total = slices.reduce((s, sl) => s + sl.value, 0);
  const COLORS = ["#1855A3", "#2A6812", "#B05810", "#A31E1E", "#7B2FBE", "#0E8A6E", "#C47A0A", "#1571A8", "#6B3FA0", "#1A7A4A"];
  const cx = 210, cy = 200, r = 170;

  let currentAngle = -Math.PI / 2;
  const paths = slices.map((sl, i) => {
    const frac = sl.value / total;
    const angle = frac * 2 * Math.PI;
    const x1 = cx + r * Math.cos(currentAngle);
    const y1 = cy + r * Math.sin(currentAngle);
    currentAngle += angle;
    const x2 = cx + r * Math.cos(currentAngle);
    const y2 = cy + r * Math.sin(currentAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const midAngle = currentAngle - angle / 2;
    const lx = cx + (r * 0.65) * Math.cos(midAngle);
    const ly = cy + (r * 0.65) * Math.sin(midAngle);
    const pct = Math.round(frac * 100);
    // Handle full circle (single slice) — SVG can't draw a full arc, use circle instead
    const pathD = slices.length === 1
      ? `M${cx},${cy-r} A${r},${r} 0 1,1 ${cx-0.001},${cy-r} Z`
      : `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`;
    return `
      <path d="${pathD}"
        fill="${COLORS[i % COLORS.length]}" opacity="0.88" stroke="white" stroke-width="2" style="cursor:pointer">
        <title>${sl.label}: zł${sl.value.toLocaleString()} (${pct}%)</title>
      </path>
      ${pct >= 5 ? `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">${pct}%</text>` : ""}`;
  }).join("");

  const legend = slices.map((sl, i) => `
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px;padding:5px 8px;border-radius:var(--radius);background:var(--surface2)">
      <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${COLORS[i % COLORS.length]};flex-shrink:0"></span>
      <span style="font-weight:600;display:inline-flex;align-items:center;gap:5px">${(LOC_ICON_MAP[sl.icon] ? ICONS[LOC_ICON_MAP[sl.icon]](14) : ICONS.building(14))} ${esc(sl.label)}</span>
      <span style="margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:var(--blue)">zł${sl.value.toLocaleString()}</span>
      <span style="background:var(--surface3);border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700;color:var(--text)">${Math.round(sl.value/total*100)}%</span>
    </div>`).join("");

  return `
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">🥧 Podział przychodów wg obiektu</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${fmtDate(from)} → ${fmtDate(to)} · Łącznie: zł${total.toLocaleString()}</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
      <svg width="420" height="400" style="display:block;flex-shrink:0">
        ${paths}
      </svg>
      <div style="flex:1;min-width:200px">${legend}</div>
    </div>`;
}

    if (dto && invPeriod && invPeriod > dto) return false;
    if (sq) {
      const loc = DATA.locations.find(l=>l.id===inv.locId);
      const room = loc?.rooms.find(r=>r.id===inv.roomId);
      const haystack = [inv.filename, inv.note, inv.period, inv.amount, loc?.name, room?.name].filter(Boolean).join(" ").toLowerCase();

    }
    return true;
  });

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap">

        <label>Szukaj</label>

        <select id="invLocFilter" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none">
          <option value="">Wszystkie</option>
          ${DATA.locations.map(l=>`<option value="${l.id}" ${selLoc==l.id?"selected":""}>${l.name} (${l.city})</option>`).join("")}
        </select>
      </div>
      <div class="ctrl-group">
        <label>Okres od</label>
        <input type="month" id="invDateFrom" value="${dfrom}"
          style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;outline:none" />
      </div>
      <div class="ctrl-group">
        <label>Okres do</label>
        <input type="month" id="invDateTo" value="${dto}"
          style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;outline:none" />
      </div>
      ${hasFilter ? `<div class="ctrl-group" style="align-self:flex-end">
        <button class="cal-nav-btn" id="invClearFilter" style="padding:7px 12px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px">${ICONS.x(12)} Wyczyść</button>
      </div>` : ""}
    </div>

    ${filtered.length===0
      ? `<div class="no-results-box">${hasFilter ? 'Brak wyników dla wybranych filtrów.' : 'Brak faktur.'}<br><small>${hasFilter ? 'Zmień kryteria lub wyczyść filtry.' : 'Dodaj pierwszą fakturę klikając „+ Dodaj fakturę”'}</small></div>`
      : `<div class="settings-block">
          ${filtered.map(inv => {
            const loc = DATA.locations.find(l=>l.id===inv.locId);
            const room = loc?.rooms.find(r=>r.id===inv.roomId);
            return `
              <div class="settings-row" style="grid-template-columns:1fr auto auto">
                <div>
                  <div class="settings-room-nm" style="display:flex;align-items:center;gap:6px">${ICONS.fileText(16)} ${esc(inv.filename)}</div>
                  <div class="settings-room-loc" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
                    ${loc ? `<span style="display:inline-flex;align-items:center;gap:4px">${locIcon(loc, 13)} ${esc(loc.name)}</span>` : "—"}
                    ${room ? ` · ${esc(room.name)}` : ""}
                    ${inv.period ? ` · <span style="font-variant-numeric:tabular-nums">${inv.period}</span>` : ""}
                    ${inv.amount ? ` · <strong>zł${parseFloat(inv.amount).toLocaleString()}</strong>` : ""}
                    ${inv.date ? ` · <span style="color:var(--text3);font-size:11px">dodano ${inv.date}</span>` : ""}
                  </div>
                  ${inv.note ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(stripEmoji(inv.note))}</div>` : ""}

// ─── SETTINGS TAB ────────────────────────────────────────────
function buildNotes() {
  const q = (state.notesSearch||"").toLowerCase();
  const filterType = state.notesFilter || "all";   // "all" | "general" | "booking"

  // Posortuj świeże najpierw
  const sorted = [...notes].sort((a,b) => (b.createdAt||"").localeCompare(a.createdAt||""));

  const general = sorted.filter(n => n.type === "general");
  const bookingNotes = sorted.filter(n => n.type === "booking");

  const matches = (n) => {
    if (filterType !== "all" && n.type !== filterType) return false;
    if (!q) return true;
    if ((n.text||"").toLowerCase().includes(q)) return true;
    if (n.type === "booking") {
      const b = savedBookings.find(x => x.id === n.bookingId);
      const room = b ? DATA.locations.flatMap(l=>l.rooms).find(r=>r.id===b.roomId) : null;
      const who = b?.bookingType === "company" ? b.companyName : (b?.guests?.[0]?.name || "");
      return (room?.name||"").toLowerCase().includes(q) || (who||"").toLowerCase().includes(q);
    }
    return false;
  };

  const renderNote = (n) => {
    const dt = n.createdAt ? new Date(n.createdAt) : null;
    const dtStr = dt ? `${dt.toLocaleDateString("pl-PL")} ${dt.toTimeString().slice(0,5)}` : "";
    let context = "";
    if (n.type === "booking") {
      const b = savedBookings.find(x => x.id === n.bookingId);
      if (b) {
        const loc = DATA.locations.find(l => l.id === b.locId);
        const room = loc?.rooms.find(r => r.id === b.roomId);
        const who = b.bookingType === "company" ? b.companyName : (b.guests?.[0]?.name || "—");
        context = `<div style="font-size:11px;color:var(--text2);margin-bottom:4px">
          🏨 ${esc(loc?.name||"")} · ${esc(room?.name||"")} · ${ICONS.user(12)} ${esc(who)}
          · ${ICONS.calendar(12)} ${fmtDate(b.from)} → ${fmtDate(b.to)}
          <a href="#" data-open-edit="${b.id}" style="margin-left:8px;color:var(--blue);text-decoration:none">otwórz rezerwację →</a>
        </div>`;
      } else {
        context = `<div style="font-size:11px;color:var(--orange);margin-bottom:4px">⚠️ Rezerwacja ${esc(n.bookingId||"")} została usunięta — notatka zachowana w historii.</div>`;
      }
    }
    return `
      <div class="settings-row" style="align-items:flex-start;gap:10px" data-note-id="${n.id}">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="ibadge ${n.type==='general'?'ibadge-in':'ibadge-co'}" style="display:inline-flex;align-items:center;gap:4px">${n.type==='general'?`${ICONS.notebook(11)} Ogólna`:`${ICONS.pin(11)} Rezerwacja`}</span>
            <span style="font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums">${dtStr} · ${esc(n.createdBy||"")}</span>
          </div>
          ${context}
          <div data-note-text="${n.id}" style="white-space:pre-wrap;font-size:13px;line-height:1.5">${esc(n.text||"")}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="cal-nav-btn" data-edit-note="${n.id}" style="font-size:11px;padding:4px 10px">Edytuj</button>
          <button class="cal-nav-btn" data-delete-note="${n.id}" style="font-size:11px;padding:4px 10px;color:var(--red);border-color:var(--red)">🗑 Usuń</button>
        </div>
      </div>`;
  };

  const generalFiltered  = general.filter(matches);
  const bookingFiltered  = bookingNotes.filter(matches);

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px">${ICONS.notebook(22)} Notatki</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="search-wrap" style="max-width:240px">
          <span class="search-icon">${ICONS.search(13)}</span>
          <input type="text" id="notesSearch" placeholder="Szukaj w notatkach…" value="${esc(state.notesSearch||"")}" autocomplete="off" />
        </div>
        <select id="notesFilter" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none">
          <option value="all"     ${filterType==="all"?"selected":""}>Wszystkie typy</option>
          <option value="general" ${filterType==="general"?"selected":""}>Tylko ogólne</option>
          <option value="booking" ${filterType==="booking"?"selected":""}>Tylko rezerwacji</option>
        </select>
      </div>
    </div>

    <div class="settings-block">
      <div class="settings-hdr">${ICONS.plus(14)} Dodaj notatkę ogólną</div>
      <div style="padding:12px;display:flex;flex-direction:column;gap:8px">
        <textarea id="newGeneralNote" rows="3" placeholder="Wpisz notatkę ogólną — np. uwagi dla całej firmy, przypomnienia, ważne kontakty…"
          style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:13px;color:var(--text);font-family:inherit;outline:none;resize:vertical"></textarea>
        <button class="save-btn" id="saveGeneralNoteBtn" style="align-self:flex-start">${ICONS.save(13)} Zapisz notatkę ogólną</button>
      </div>
    </div>

    ${filterType !== "booking" ? `
    <div class="settings-block" style="margin-top:14px">
      <div class="settings-hdr" style="display:flex;align-items:center;gap:8px">${ICONS.notebook(14)} Notatki ogólne (${generalFiltered.length})</div>
      ${generalFiltered.length > 0 ? generalFiltered.map(renderNote).join("") :
        `<div style="padding:18px;text-align:center;color:var(--text3);font-size:13px">Brak notatek ogólnych.</div>`}
    </div>` : ""}

    ${filterType !== "general" ? `
    <div class="settings-block" style="margin-top:14px">
      <div class="settings-hdr" style="display:flex;align-items:center;gap:8px">${ICONS.pin(14)} Notatki przypisane do rezerwacji (${bookingFiltered.length})</div>
      ${bookingFiltered.length > 0 ? bookingFiltered.map(renderNote).join("") :
        `<div style="padding:18px;text-align:center;color:var(--text3);font-size:13px">Brak notatek do rezerwacji. Dodawaj je z modal-u edycji rezerwacji.</div>`}
    </div>` : ""}

    <div style="margin-top:14px;padding:10px 12px;background:var(--blue-light);border-radius:var(--radius);font-size:12px;color:var(--blue)">
      Wszystkie notatki są zapisywane w <code>data/notes.json</code> i objęte codziennym backupem (3:00 w nocy).
    </div>`;
}

// ─── PODGLĄD (Preview) — Excel-style siatka pokoje × dni per obiekt ──

// Wyłącznie do odczytu, nie do edycji. Inspiracja: Excel usera z arkuszem
// per obiekt + zakładki miesięcy + kolorowe komórki dni.
function buildPreview() {
  if (state.previewLocId !== null) return buildPreviewDetail(state.previewLocId);

  // Lista — grupowana po miastach alfabetycznie, w każdym mieście obiekty po nazwie.
  const byCity = {};
  DATA.locations.forEach(loc => {
    if (!byCity[loc.city]) byCity[loc.city] = [];
    byCity[loc.city].push(loc);
  });
  const cities = Object.keys(byCity).sort((a, b) => a.localeCompare(b, "pl"));
  cities.forEach(c => byCity[c].sort((a, b) => a.name.localeCompare(b.name, "pl")));

  return `
    <div style="margin-bottom:18px">
      <h2 style="font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px">${ICONS.eye(22)} Podgląd</h2>
      <p style="font-size:13px;color:var(--text2);margin-top:6px">Wybierz obiekt, aby zobaczyć siatkę rezerwacji wg dni i pokoi (jak w Excelu, tylko do odczytu).</p>
    </div>
    ${cities.map(city => `
      <div class="preview-city-group">
        <div class="preview-city-hdr">${ICONS.mapPin(13)} ${esc(city)} <span class="preview-city-count">${byCity[city].length} ${byCity[city].length===1?"obiekt":byCity[city].length<5?"obiekty":"obiektów"}</span></div>
        <div class="preview-loc-grid">
          ${byCity[city].map(loc => {
            const totalBeds = loc.rooms.reduce((s, r) => s + (r.capacity || 0), 0);
            return `
              <button class="preview-loc-card" data-preview-loc="${loc.id}">
                <div class="preview-loc-city">${esc(city)}</div>
                <div class="preview-loc-name">${esc(loc.name)}</div>
                <div class="preview-loc-meta">${loc.rooms.length} ${loc.rooms.length===1?"pokój":loc.rooms.length<5?"pokoje":"pokoi"} · ${totalBeds} łóżek</div>
              </button>`;
          }).join("")}
        </div>
      </div>
    `).join("")}
  `;
}

// Status pokoju w danym dniu (YYYY-MM-DD): "free" | "occupied" | "perm" + booking + guestName.
// Jeden źródłowy stan dla: kolorów komórek Podglądu i modalu szczegółów dnia (v3.44).
// Permanent bez końca → aktywny w nieskończoność ("9999-12-31").
function getRoomDayStatus(roomId, dayStr) {
  for (const b of savedBookings) {
    if (b.roomId !== roomId) continue;
    const isPerm = b.isPermanent && b.bookingType !== "company";
    const hasPermGuest = (b.guests || []).some(g => g.isPermanent);
    if (isPerm || hasPermGuest) {
      const pStart = b.permanentStart || b.from;
      const pEnd = b.permanentEnd || "9999-12-31";
      if (pStart <= dayStr && pEnd > dayStr) {
        const who = b.bookingType === "company" ? b.companyName : (b.guests?.[0]?.name || "—");
        return { status: "perm", booking: b, guestName: who };
      }
    } else {
      if (b.from <= dayStr && b.to > dayStr) {
        const who = b.bookingType === "company"
          ? b.companyName
          : (b.guests || []).map(g => g.name).filter(Boolean).join(", ");
        return { status: "occupied", booking: b, guestName: who };
      }
    }
  }
  return { status: "free" };
}

// Detail: hero + month tabs (TOP, z arrowami + compare toggle) + grid + notatki.
// v3.27: multi-month select (max 2), weekend bolding/ramka, tabs przeniesione pod hero.
function buildPreviewDetail(locId) {
  const loc = DATA.locations.find(l => l.id === locId);
  if (!loc) return `<div class="no-results-box">Obiekt nie znaleziony.</div>`;

  // Selected months — array (1 or 2), chronologically sorted.
  const today = todayStr();
  const selectedMonths = (state.previewMonths && state.previewMonths.length > 0)
    ? state.previewMonths.slice().sort()
    : [today.slice(0, 7)];
  const primaryMonth = selectedMonths[0];  // dla year selector i tab centering
  const [yr, mn] = primaryMonth.split("-").map(Number);
  const compareMode = !!state.previewCompareMode;

  // Etykieta np. "Maj 2026" lub "Maj 2026 + Czerwiec 2026"
  const monthLabel = selectedMonths.map(m => {
    const [y, n] = m.split("-").map(Number);
    return `${MONTHS[n-1]} ${y}`;
  }).join(" + ");

  // Flat array dni przez wszystkie wybrane miesiące.
  // Zawiera: yr, mn, day, dateStr, dow (0-6), isWeekend, isMonthStart (pierwszy dzień drugiego miesiąca).
  const allDays = [];
  selectedMonths.forEach((m, midx) => {
    const [y, n] = m.split("-").map(Number);
    const di = new Date(y, n, 0).getDate();
    for (let d = 1; d <= di; d++) {
      const dateStr = `${m}-${String(d).padStart(2, "0")}`;
      const dt = new Date(y, n - 1, d);
      const dow = dt.getDay();  // 0=niedziela, 6=sobota
      const isWeekend = (dow === 0 || dow === 6);
      const isMonthStart = (midx > 0 && d === 1);
      allDays.push({ yr: y, mn: n, day: d, dateStr, dow, isWeekend, isMonthStart });
    }
  });

  // Helper: status komórki (room, day) — deleguje do modułowego getRoomDayStatus,
  // żeby kafelki kalendarza i modal szczegółów dnia liczyły status tak samo (v3.44).
  const getCellStatus = (roomId, dayStr) => getRoomDayStatus(roomId, dayStr);

  // Revenue/paid agregowany przez wszystkie wybrane miesiące.
  const computeRoomFinances = (room) => {
    let rev = 0, paid = 0;
    selectedMonths.forEach(m => {
      const [y, n] = m.split("-").map(Number);
      const mStart = `${m}-01`;
      const mEndExcl = toStr(new Date(y, n, 1));
      const roomBookings = savedBookings.filter(b => b.roomId === room.id);
      roomBookings.forEach(b => {
        const isPerm = b.isPermanent && b.bookingType !== "company";
        const bStart = isPerm ? (b.permanentStart || b.from) : b.from;
        const bEnd = isPerm ? (b.permanentEnd || "9999-12-31") : b.to;
        if (bStart >= mEndExcl || bEnd <= mStart) return;
        const bForCalc = (isPerm && !b.permanentEnd) ? { ...b, permanentEnd: "9999-12-31" } : b;
        rev += calcBookingTotal(bForCalc, room, getActualNights(bForCalc), { from: mStart, to: mEndExcl });
        paid += bookingPaidInRange(bForCalc, room, mStart, mEndExcl);
      });
    });
    return { rev, paid, remaining: Math.max(0, rev - paid) };
  };

  // Polskie skróty dni tygodnia (Nd=niedziela, Pn=poniedziałek, ..., So=sobota).
  // MUSI być zadeklarowane PRZED roomsHtml bo dayCells tooltipa go używają.
  // Wcześniej deklaracja była niżej → ReferenceError (temporal dead zone) →
  // render crashował przy klik na lokację (LIST → DETAIL).
  const dowLetters = ["Nd", "Pn", "Wt", "Śr", "Cz", "Pt", "So"];

  // Build rows
  const filter = state.previewFilter || "all";
  const roomsHtml = loc.rooms.map(room => {
    let occupiedDays = 0, permDays = 0, companyDays = 0, regularDays = 0;
    const dayCells = allDays.map(day => {
      const s = getCellStatus(room.id, day.dateStr);
      const statusCls = s.status === "perm" ? "is-perm" : s.status === "occupied" ? "is-occupied" : "is-free";
      const boundaryCls = day.isMonthStart ? "is-month-boundary" : "";
      const weekendCls = day.isWeekend ? "is-weekend" : "";   // v3.40 — ciemniejszy odcień statusu
      if (s.status === "perm") permDays++;
      else if (s.status === "occupied") occupiedDays++;
      // v3.40 — liczniki dla filtra firmy/zwykli: firma = bookingType company;
      // zwykły najemca = zajęte (czasowe), nie firma, nie stały.
      if (s.booking?.bookingType === "company") companyDays++;
      else if (s.status === "occupied") regularDays++;
      const tooltip = s.guestName
        ? `${dowLetters[day.dow]} ${day.day}.${String(day.mn).padStart(2,"0")} · ${s.guestName}`
        : `${dowLetters[day.dow]} ${day.day}.${String(day.mn).padStart(2,"0")} · wolny`;
      return `<div class="preview-day ${statusCls} ${boundaryCls} ${weekendCls}" data-pvday="${day.dateStr}" data-pvroom="${room.id}" data-pvloc="${loc.id}" title="${esc(tooltip)}">${day.day}</div>`;
    }).join("");

    if (filter === "occupied" && occupiedDays === 0 && permDays === 0) return "";
    if (filter === "free" && (occupiedDays > 0 || permDays > 0)) return "";
    if (filter === "perm" && permDays === 0) return "";
    if (filter === "company" && companyDays === 0) return "";
    if (filter === "regular" && regularDays === 0) return "";

    const { rev, paid, remaining } = computeRoomFinances(room);
    const totalUsed = occupiedDays + permDays;
    const totalDaysCount = allDays.length;
    return `
      <div class="preview-row preview-row-clickable" data-room-detail="${room.id}" data-room-loc="${loc.id}" title="Kliknij aby zobaczyć szczegóły pokoju">
        <div class="preview-room-cell">
          <strong>${esc(room.name)}</strong>
          <div class="preview-room-sub">${room.capacity || 1} ${(room.capacity||1)===1?"łóżko":(room.capacity||1)<5?"łóżka":"łóżek"}${room.basePrice?` · zł${room.basePrice}/dobę`:""}</div>
        </div>
        <div class="preview-days-wrap">${dayCells}</div>
        <div class="preview-sum-cell">
          <div class="preview-sum-rev">zł${rev.toLocaleString()}</div>
          <div class="preview-sum-paid">wpł. zł${Math.round(paid).toLocaleString()}${remaining>0?` · <span style="color:var(--orange)">zł${remaining.toLocaleString()} do pobrania</span>`:""}</div>
          <div class="preview-sum-days">${totalUsed}/${totalDaysCount} dni${permDays>0?` (${permDays} stały)`:""}</div>
        </div>
      </div>`;
  }).filter(Boolean).join("");

  // Day header row: literka dnia tygodnia + numer dnia (v3.29 — wystarczy by oznaczyć weekend).
  // Polska konwencja: tydzień Pn-Nd. Niedziela (dow=0) to koniec tygodnia → grubsza right border.
  // (dowLetters już zdeklarowane wyżej, przed roomsHtml — patrz komentarz tam.)
  const dayHeaderCells = allDays.map(day => {
    const weekendCls = day.isWeekend ? "is-weekend" : "";
    const boundaryCls = day.isMonthStart ? "is-month-boundary" : "";
    return `<div class="preview-day-header ${weekendCls} ${boundaryCls}">
      <div class="dow">${dowLetters[day.dow]}</div>
      <div class="dnum">${day.day}</div>
    </div>`;
  }).join("");

  // Month label row (powyżej day numbers) — pokazuje który miesiąc dotyczy danego zakresu dni.
  // Pokazujemy tylko gdy 2 miesiące wybrane (przy 1 — etykieta w hero wystarcza).
  const monthHeaderRow = selectedMonths.length > 1 ? `
    <div class="preview-row preview-month-header-row">
      <div class="preview-room-cell"></div>
      <div class="preview-days-wrap">
        ${selectedMonths.map(m => {
          const [y, n] = m.split("-").map(Number);
          const di = new Date(y, n, 0).getDate();
          return `<div class="preview-month-span" style="width:${di * 35}px">${MONTHS[n-1]} ${y}</div>`;
        }).join("")}
      </div>
      <div class="preview-sum-cell"></div>
    </div>` : "";

  // Tab months — ±18 miesięcy (więcej do scroll'a arrows).
  const tabMonths = [];
  for (let i = -18; i <= 18; i++) {
    const d = new Date(yr, mn - 1 + i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    tabMonths.push({ ym, label: `${MONTHS[d.getMonth()].slice(0,3)} '${String(d.getFullYear()).slice(2)}` });
  }
  const tabsHtml = tabMonths.map(t => {
    const isSelected = selectedMonths.includes(t.ym);
    return `<button class="preview-month-tab ${isSelected?"active":""}" data-preview-month="${t.ym}">${esc(t.label)}</button>`;
  }).join("");

  const totalBeds = loc.rooms.reduce((s, r) => s + (r.capacity || 0), 0);

  // Notatki dla rezerwacji z tego obiektu (wszystkie aktywne — nie clipowane do miesiąca).
  const locBookingIds = new Set(savedBookings.filter(b => b.locId === locId).map(b => b.id));
  const relevantNotes = notes.filter(n => n.type === "booking" && locBookingIds.has(n.bookingId))
    .sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  const notesHtml = relevantNotes.length === 0
    ? `<div style="color:var(--text3);font-size:12px;font-style:italic;padding:8px">Brak notatek dla tego obiektu.</div>`
    : relevantNotes.slice(0, 20).map(n => {
        const b = savedBookings.find(x => x.id === n.bookingId);
        const room = b ? loc.rooms.find(r => r.id === b.roomId) : null;
        const who = b?.bookingType === "company" ? b.companyName : (b?.guests?.[0]?.name || "—");
        const dt = n.createdAt ? new Date(n.createdAt).toLocaleDateString("pl-PL") : "";
        return `
          <div class="preview-note">
            <div class="preview-note-meta">
              <strong>${esc(room?.name || "—")}</strong> · ${esc(who)} <span style="color:var(--text3)">· ${dt}</span>
            </div>
            <div class="preview-note-text">${esc(n.text || "")}</div>
          </div>`;
      }).join("");

  return `
    <div class="preview-detail">
      <button class="cal-nav-btn" id="previewBackBtn" style="margin-bottom:12px">← Wszystkie obiekty</button>

      <div class="preview-hero">
        <div class="preview-hero-row">
          <div>
            <div class="preview-hero-city">${ICONS.mapPin(14)} ${esc(loc.city)}</div>
            <h2 class="preview-hero-name">${esc(loc.name)}</h2>
            <div class="preview-hero-meta">${loc.rooms.length} ${loc.rooms.length===1?"pokój":loc.rooms.length<5?"pokoje":"pokoi"} · ${totalBeds} łóżek</div>
            <div class="preview-hero-month-label">${monthLabel}</div>
          </div>
          <div class="preview-year-select">
            <label style="font-size:11px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Rok</label>
            <select id="previewYearSelect">
              ${(() => {
                const bookingYears = savedBookings
                  .map(b => parseInt((b.permanentStart || b.from || "").slice(0, 4)))
                  .filter(y => !isNaN(y));
                const currentY = new Date().getFullYear();
                const minY = Math.min(2020, bookingYears.length > 0 ? Math.min(...bookingYears) : currentY);
                // v3.45 — zawsze do +3 lat w przód (przeglądanie pustych przyszłych lat),
                // a gdy istnieje rezerwacja jeszcze dalej — do roku tej rezerwacji + 1.
                const maxY = Math.max(currentY + 3, bookingYears.length > 0 ? Math.max(...bookingYears) + 1 : currentY + 3);
                const years = [];
                for (let y = maxY; y >= minY; y--) years.push(y);
                return years.map(y => `<option value="${y}" ${y === yr ? "selected" : ""}>${y}</option>`).join("");
              })()}
            </select>
          </div>
        </div>
      </div>

      <!-- Month tabs (TOP, z arrowami + compare toggle) -->
      <div class="preview-month-nav">
        <button class="preview-nav-arrow" id="previewTabsPrev" title="Przewiń w lewo">‹</button>
        <div class="preview-month-tabs" id="previewMonthTabs">${tabsHtml}</div>
        <button class="preview-nav-arrow" id="previewTabsNext" title="Przewiń w prawo">›</button>
        <label class="preview-compare-toggle" title="Gdy włączone — kliknięcia dodają/usuwają miesiące (max 2)">
          <input type="checkbox" id="previewCompareToggle" ${compareMode?"checked":""} />
          Porównaj 2 mies.
        </label>
      </div>

      <!-- Toolbar: legend + filter -->
      <div class="preview-toolbar">
        <div class="preview-legend">
          <span><span class="preview-legend-box is-free"></span> Wolny</span>
          <span><span class="preview-legend-box is-occupied"></span> Rezerwacja</span>
          <span><span class="preview-legend-box is-perm"></span> Stały najemca</span>
        </div>
        <div class="preview-filter-wrap">
          <label style="font-size:11px;color:var(--text2);font-weight:600">Pokaż:</label>
          <select id="previewFilter" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-size:12px;color:var(--text);font-family:inherit;outline:none">
            <option value="all"      ${filter==="all"?"selected":""}>Wszystkie pokoje</option>
            <option value="occupied" ${filter==="occupied"?"selected":""}>Tylko z rezerwacjami</option>
            <option value="free"     ${filter==="free"?"selected":""}>Tylko wolne cały miesiąc</option>
            <option value="perm"     ${filter==="perm"?"selected":""}>Tylko stały najemca</option>
            <option value="company"  ${filter==="company"?"selected":""}>Tylko firmy</option>
            <option value="regular"  ${filter==="regular"?"selected":""}>Tylko zwykli najemcy</option>
          </select>
        </div>
      </div>

      <!-- Grid -->
      <div class="preview-grid-wrap">
        ${monthHeaderRow}
        <div class="preview-row preview-grid-header">
          <div class="preview-room-cell">Pokój</div>
          <div class="preview-days-wrap">${dayHeaderCells}</div>
          <div class="preview-sum-cell">Razem dni</div>
        </div>
        ${roomsHtml}
      </div>

      <!-- Notes panel -->
      <div class="preview-notes-section">
        <h3 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin:18px 0 10px;display:flex;align-items:center;gap:6px">${ICONS.notebook(14)} Notatki dla obiektu</h3>
        <div class="preview-notes-list">${notesHtml}</div>
      </div>
    </div>
  `;
}

    </div>
    <div style="display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));max-width:1100px">
      <div>
        <h3 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px">${ICONS.search(13)} Zapytania w naturalnym języku</h3>
        ${exampleQ("Ile zarobił obiekt Apartamenty Centralne w maju?", "Apartamenty Centralne, maj 2026: przychód 18 240 zł, koszty mediów 1 850 zł, zysk netto 16 390 zł. To 12% więcej niż w kwietniu.")}
        ${exampleQ("Pokaż mi rezerwacje firmy Demo Logistyka z ostatnich 3 miesięcy", "Znalazłem 7 rezerwacji firmy Demo Logistyka między 2026-02-15 a 2026-05-21. Suma 14 nocy w 4 pokojach, łącznie 8 960 zł. Szczegóły poniżej…")}
      </div>
      <div>
        <h3 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px">${ICONS.sparkles(13)} Akcje automatyczne</h3>
        ${exampleQ("Wygeneruj raport miesięczny dla wszystkich obiektów w PDF", "Generuję raporty… Gotowe. Wysłałem na maila admin@booking.local: 9 PDFów z KPI, listą rezerwacji i rozliczeniem mediów.")}
        ${exampleQ("Zasugeruj cennik na czerwiec na podstawie obłożenia", "Bazując na obłożeniu maja (78%): pokoje 101–113 podnieś o 5%, 207-208 zostaw, 401-433 obniż o 8%. Zastosować zmiany?")}
      </div>
    </div>
    <div style="margin-top:24px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);max-width:1100px">
      <h3 style="font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px">${ICONS.zap(14)} Planowane integracje</h3>
      <ul style="font-size:12px;color:var(--text2);line-height:1.7;margin:0;padding-left:18px">
        <li><strong>Tool use</strong> — agent czyta/zapisuje przez istniejące endpointy API</li>
        <li><strong>Voice input</strong> — Whisper API dla dyktowania zapytań na telefonie</li>
        <li><strong>Anomaly detection</strong> — proaktywne alerty (np. "rezerwacja zmieniana 5 razy w ciągu godziny — czy to OK?")</li>
        <li><strong>Bezpieczeństwo</strong> — agent działa w sandboxie, write actions wymagają potwierdzenia użytkownika</li>
      </ul>
    </div>`;
}

          <li>Kliknij <strong>Dodaj plik</strong> → wybierz PDF / JPG / PNG</li>

      `)}
      ${section(ICONS.fileText(16), "Czytanie raportów", `
        <ul style="margin:0;padding-left:20px">
          <li><strong>Zysk netto</strong> (hero KPI) — przychód minus koszty (media + sprzątanie)</li>
          <li><strong>Δ MoM</strong> — zmiana miesiąc-do-miesiąca w procentach</li>
          <li><strong>Obłożenie</strong> — średni procent zajętych łóżkonocy w okresie</li>

      ${section(ICONS.calculator ? ICONS.calculator(16) : ICONS.fileText(16), "Jak to jest liczone — pełna ściągawka matematyczna", `
        <p style="margin-bottom:10px">Zebrane wzory używane przez raporty. Wszystkie liczone <strong>na żywo</strong> przy każdym otwarciu — żadnych zapisanych "totali" do desynchronizacji.</p>

        <div style="background:var(--surface);padding:10px 12px;border-radius:6px;border-left:3px solid var(--blue);margin-bottom:12px">
          <strong style="color:var(--blue)">PRZYCHÓD (per rezerwacja)</strong>
          <ul style="margin:6px 0 0;padding-left:20px;font-size:12px">
            <li><strong>Indywidualna (domyślnie, classic)</strong>: <code>(basePrice + extraPerAdult × (dorośli−1) + extraPerChild × dzieci) × nocy</code></li>
            <li><strong>Indywidualna per-gość</strong> (gdy choć jeden gość ma <em>Cena/osoba/doba</em> wypełnione w karcie gościa): każdy gość liczony osobno = <code>Σ (rate_gościa × nocy)</code>. <strong>Brak fallbacku</strong> — goście z pustą stawką liczą się jako <code>0 zł</code>. Wymusza explicit wpisanie wszystkich stawek (no hidden math). UI zaznacza puste pola na czerwono gdy tryb per-gość aktywny.</li>
            <li><strong>Firmowa (per pracownik)</strong>: <code>pricePerEmployee × liczba_pracowników_w_pokoju × nocy</code> (z możliwością nadpisania per osoba)</li>
            <li><strong>Stały najemca (monthly rate)</strong>: <code>monthlyRate × miesiące_aktywności</code>. Pełny miesiąc = pełna stawka. Niepełny (start lub koniec w środku) = <code>monthlyRate × dni_w_tym_miesiącu / dni_w_miesiącu</code>, <strong>zaokrąglone do groszy</strong>. Bieżący miesiąc aktywnego najemcy = zawsze pełny (rent płaci się za cały miesiąc).</li>
            <li><strong>Custom price (nadpisana cena)</strong>: stała kwota, ignoruje powyższe formuły. Dla nie-stałych pro-rata do okresu filtru (cena × clipped_nights / total_nights).</li>
          </ul>

        <div style="background:var(--surface);padding:10px 12px;border-radius:6px;border-left:3px solid var(--green);margin-bottom:12px">

          <ul style="margin:6px 0 0;padding-left:20px;font-size:12px">

            <li><strong>Stały najemca</strong> — system bierze pod uwagę 3 źródła w kolejności priorytetu:
              <ol style="margin:4px 0 0;padding-left:20px">
                <li><code>amountPaid</code> (manualna kwota) — jeśli wpisano > 0, traktowane jako <strong>override</strong>. Kwota jest rozdzielana pro-rata między okresy aktywności. Wystarczy wpisać "42000" jeśli najemca zapłacił całą sumę z góry.</li>
                <li><code>timing="prepaid"</code> bez amountPaid → wszystkie aktywne miesiące zapłacone</li>
                <li><code>timing="postpaid"</code> bez amountPaid → tylko miesiące zaznaczone w gridzie "paidMonths" (granular per-month)</li>
              </ol>
            </li>
          </ul>
          <div style="margin-top:6px;padding:6px 8px;background:var(--blue-light);border-radius:4px;font-size:11px;color:var(--blue)">
            💡 Jeśli najemca płaci nieregularnie i chcesz precyzyjnie śledzić które miesiące — zostaw "Kwota wpłacona" puste i klikaj miesiące w gridzie. Jeśli zapłacił wszystko na raz — po prostu wpisz kwotę.
          </div>
        </div>

        <div style="background:var(--surface);padding:10px 12px;border-radius:6px;border-left:3px solid var(--orange);margin-bottom:12px">
          <strong style="color:var(--orange)">MEDIA (prąd / gaz / woda / inne)</strong>
          <p style="margin:6px 0;font-size:12px">Wpisywane <strong>per obiekt per miesiąc</strong> w sekcji Media w Raportach, jako kwoty <strong>netto</strong> (VAT liczycie ręcznie poza systemem). Suma media = suma wpisanych kwot.</p>
          <p style="margin:6px 0;font-size:12px;color:var(--red);font-weight:600">⚠ Media NIE obciążają najemcy. To wyłącznie koszt operacyjny obiektu.</p>
          <ul style="margin:6px 0 0;padding-left:20px;font-size:12px">
            <li>Wpływa na: <strong>Zysk netto = Przychód netto − Media netto</strong> (per obiekt) oraz główny hero (netto). Blok per-lokalizacja pokazuje kwoty brutto.</li>
            <li>NIE wpływa na: <strong>"Do pobrania" / "Wpłacono"</strong> — to są wyłącznie pieniądze należne / wpłacone PRZEZ najemcę</li>
            <li>Filtr okresu klipuje media: tylko miesiące nakładające się z filtrem są wliczane</li>
          </ul>
        </div>

        <div style="background:var(--surface);padding:10px 12px;border-radius:6px;border-left:3px solid var(--text2);margin-bottom:12px">
          <strong>FAKTURY (PDF/JPG) — zakładka Faktury</strong>
          <p style="margin:6px 0;font-size:12px">Osobne <strong>archiwum dokumentów</strong> (faktury VAT, paragony). Wgrywasz pliki dla rezerwacji albo per pokój/miesiąc.</p>
          <p style="margin:6px 0;font-size:12px">NIE wpływa na żadną kalkulację — to tylko storage dla audytu / dokumentacji. Kwoty z faktur wpisujesz osobno w sekcji Media.</p>
        </div>

        <div style="background:var(--surface);padding:10px 12px;border-radius:6px;border-left:3px solid var(--blue)">
          <strong style="color:var(--blue)">RAPORTY — sumy globalne i per obiekt</strong>
          <ul style="margin:6px 0 0;padding-left:20px;font-size:12px">
            <li><strong>Przychód</strong> = Σ przychodów rezerwacji aktywnych w okresie (overlap test). Permanent klipowany do okresu.</li>
            <li><strong>Wpłacono</strong> = Σ wpłat (per rezerwacja, też klipowany dla permanenta)</li>
            <li><strong>Do pobrania</strong> = max(0, Przychód − Wpłacono)</li>
            <li><strong>Zysk netto</strong> = Przychód − Media (media osobno, NIE odejmowane od wpłat)</li>
            <li><strong>Filtr miesiąca</strong>: <code>booking.from &lt; end AND booking.to &gt; start</code> (overlap). Permanent: <code>permStart &lt; end AND permEnd &gt; start</code>.</li>
            <li><strong>Pulpit "Przychód ten/poprzedni miesiąc"</strong>: ta sama logika co Raporty z filtrem aktualnego/poprzedniego miesiąca.</li>

          <strong>⚠ Zaległości po pobycie</strong> (Pulpit + reports row badge): wykryte gdy <strong>postpaid</strong> + pobyt zakończony (<code>b.to ≤ dziś</code>) + <code>amountPaid &lt; przychód</code>. Dla stałego najemcy: <strong>postpaid</strong> + przeszłe miesiące poza paidMonths, LUB najemca zakończony i nie wszystkie active months opłacone.
        </div>
      `)}
      ${section(ICONS.settings(16), "Hasła i użytkownicy", `
        <p>Zarządzanie z linii komend (na serwerze lub lokalnie):</p>
        <pre style="background:var(--surface);padding:8px 10px;border-radius:6px;font-variant-numeric:tabular-nums;font-size:11px;margin:8px 0;overflow-x:auto"><code>./users list                                  # lista
./users add nowy "haslo" --role worker        # dodaj
./users passwd admin "nowe-haslo"             # zmiana hasła
./users role nowy admin                        # promocja
./users delete user2                           # usuń</code></pre>

          <li><strong>Zmianowe</strong> — przy każdym zapisie rezerwacji (ostatnich 90 kopii)</li>

          <tr><td style="padding:4px 8px">${kbd("Enter")}</td><td style="padding:4px 8px;color:var(--text2)">Zapisz (w formularzach)</td></tr>
          <tr><td style="padding:4px 8px">${kbd("Cmd")}+${kbd("Shift")}+${kbd("R")}</td><td style="padding:4px 8px;color:var(--text2)">Hard reload (po wgraniu nowej wersji)</td></tr>

}

function buildSettings() {
  const sq = (state.settingsSearch||"").toLowerCase();
  const onlyMissing = !!state.settingsOnlyMissing;

  // Zbiera pokoje per obiekt z filtrem (search + onlyMissing)
  const locRows = DATA.locations.map(loc => {
    const matchedRooms = loc.rooms.filter(room => {
      if (onlyMissing && (room.basePrice || 0) > 0 && (room.pricePerEmployee || 0) > 0) return false;
      if (!sq) return true;
      return room.name.toLowerCase().includes(sq)
          || loc.name.toLowerCase().includes(sq)
          || loc.city.toLowerCase().includes(sq);
    });
    return { loc, rooms: matchedRooms };
  }).filter(g => g.rooms.length > 0);

  const totalRooms = locRows.reduce((s, g) => s + g.rooms.length, 0);

  // Pojedyncza grupa obiektu — header + (opcjonalnie) tabela
  const buildLocGroup = ({ loc, rooms }) => {
    const collapsed = !!state.settingsCollapsed[loc.id];
    const missingCount = rooms.filter(r => !(r.basePrice || 0) || !(r.pricePerEmployee || 0)).length;

    const tableHead = `
      <div class="settings-table-head" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.2fr;gap:8px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px">
        <div>Pokój</div>
        <div style="text-align:right">Baza zł / pokój</div>
        <div style="text-align:right">Dod. dorosły</div>
        <div style="text-align:right">Dod. dziecko</div>
        <div style="text-align:right">zł / pracownik / doba</div>
      </div>`;

    const tableRows = rooms.map(room => {
      const noBase = !(room.basePrice || 0);
      const noPpe  = !(room.pricePerEmployee || 0);
      return `
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.2fr;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:12px">
          <div>${esc(room.name)} <span style="color:var(--text3);font-size:10px">· ${esc(room.beds)}</span></div>
          <input type="number" class="price-inp" data-room="${room.id}" data-field="basePrice" value="${room.basePrice||0}" min="0"
            style="padding:5px 8px;border:1px solid ${noBase?"var(--orange-border)":"var(--border)"};border-radius:var(--radius);background:${noBase?"var(--orange-light)":"var(--surface2)"};font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" class="price-inp" data-room="${room.id}" data-field="extraPerAdult" value="${room.extraPerAdult||0}" min="0"
            style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" class="price-inp" data-room="${room.id}" data-field="extraPerChild" value="${room.extraPerChild||0}" min="0"
            style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" class="price-inp" data-room="${room.id}" data-field="pricePerEmployee" value="${room.pricePerEmployee||0}" min="0"
            style="padding:5px 8px;border:1px solid ${noPpe?"var(--orange-border)":"var(--border)"};border-radius:var(--radius);background:${noPpe?"var(--orange-light)":"var(--surface2)"};font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
        </div>`;
    }).join("");

    // Pasek akcji bulk — grid 5-col MATCHUJĄCY tabelę (label + 4 inputy)
    // + button "Zastosuj" jako osobny rząd full-width.
    // Wcześniej był grid 6-col (auto na końcu dla button'a) — auto-col jadło szerokość
    // przez co fr-units w bulkBar były węższe niż w tableHead → misalignment kolumn
    // po horizontal scroll na mobile.
    const bulkBar = `
      <div style="padding:10px 14px;background:var(--blue-light);border-top:1px dashed var(--border)">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.2fr;gap:8px;align-items:center;font-size:11px">
          <div style="font-size:11px;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:5px">${ICONS.clipboardList(13)} Ustaw dla wszystkich pokoi tego obiektu →</div>
          <input type="number" data-bulk-loc="${loc.id}" data-bulk-field="basePrice" placeholder="—" min="0"
            style="padding:5px 8px;border:1px solid var(--blue-mid);border-radius:var(--radius);background:var(--surface);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" data-bulk-loc="${loc.id}" data-bulk-field="extraPerAdult" placeholder="—" min="0"
            style="padding:5px 8px;border:1px solid var(--blue-mid);border-radius:var(--radius);background:var(--surface);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" data-bulk-loc="${loc.id}" data-bulk-field="extraPerChild" placeholder="—" min="0"
            style="padding:5px 8px;border:1px solid var(--blue-mid);border-radius:var(--radius);background:var(--surface);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
          <input type="number" data-bulk-loc="${loc.id}" data-bulk-field="pricePerEmployee" placeholder="—" min="0"
            style="padding:5px 8px;border:1px solid var(--blue-mid);border-radius:var(--radius);background:var(--surface);font-variant-numeric:tabular-nums;text-align:right;outline:none;font-size:12px;color:var(--text)" />
        </div>
        <button class="cal-nav-btn" data-bulk-apply="${loc.id}" style="margin-top:8px;padding:6px 12px;font-size:11px;background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;width:100%">Zastosuj do wszystkich pokoi</button>
      </div>`;

    return `
      <div class="settings-block" style="margin-bottom:14px;overflow:hidden">
        <div class="settings-hdr" data-settings-toggle="${loc.id}" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px">
          <span>${collapsed ? "▶" : "▼"} ${locIcon(loc, 16)} ${esc(loc.name)} <span style="color:var(--text3);font-weight:500;font-size:11px">· ${esc(loc.city)}</span></span>
          <span style="font-size:11px;font-weight:500;color:var(--text2);font-variant-numeric:tabular-nums">
            ${rooms.length} ${rooms.length===1?"pokój":rooms.length<5?"pokoje":"pokoi"}${missingCount > 0 ? ` · <span style="color:var(--orange)">${missingCount} bez ceny</span>` : ""}
          </span>
        </div>
        ${collapsed ? "" : `<div class="settings-table-wrap">${tableHead + tableRows + bulkBar}</div>`}
      </div>`;
  };

  const groupsHtml = locRows.length > 0
    ? locRows.map(buildLocGroup).join("")
    : `<div style="padding:20px;text-align:center;color:var(--text3);background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border)">Brak pokoi pasujących do filtrów.</div>`;

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px">${ICONS.settings(22)} Ustawienia · cennik <span style="font-size:12px;font-weight:400;color:var(--text2);margin-left:6px">${totalRooms} ${totalRooms===1?"pokój":totalRooms<5?"pokoje":"pokoi"} w ${locRows.length} ${locRows.length===1?"obiekcie":locRows.length<5?"obiektach":"obiektach"}</span></h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;padding:6px 10px;border-radius:var(--radius);background:${onlyMissing?"var(--orange-light)":"var(--surface2)"};border:1px solid ${onlyMissing?"var(--orange-border)":"var(--border)"}">
          <input type="checkbox" id="settingsOnlyMissing" ${onlyMissing?"checked":""} style="width:auto;margin:0" />
          Tylko bez ceny
        </label>
        <button class="cal-nav-btn" id="settingsExpandAll" style="font-size:11px;padding:6px 10px">▼ Rozwiń wszystkie</button>
        <button class="cal-nav-btn" id="settingsCollapseAll" style="font-size:11px;padding:6px 10px">▶ Zwiń wszystkie</button>
        <div class="search-wrap" style="max-width:240px">
          <span class="search-icon">${ICONS.search(13)}</span>
          <input type="text" id="settingsSearch" placeholder="Szukaj pokoju lub obiektu…" value="${esc(state.settingsSearch||"")}" autocomplete="off" />
        </div>
      </div>
    </div>
    <div id="settingsRows">
      ${groupsHtml}
    </div>
    <button class="save-btn" id="saveSettingsBtn" style="margin-top:8px">${ICONS.save(13)} Zapisz wszystkie ceny</button>

    <div class="settings-block" style="margin-top:24px">
      <div class="settings-hdr" style="display:flex;align-items:center;gap:8px">${ICONS.image(14)} Zdjęcia obiektów</div>
      <div style="padding:12px 14px;font-size:11px;color:var(--text2);background:var(--blue-light);border-bottom:1px solid var(--border)">
        Wgraj zdjęcie obiektu — pokaże się w zakładce Obiekty zamiast domyślnej ikony. Format: JPG / PNG / WebP. Maks. ~5MB.
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:14px">
        ${DATA.locations.map(loc => {
          const img = locImages[loc.id];
          const isAdmin = API_CREDS?.role === "admin";
          return `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
            <div style="height:100px;background:${img?`url('/loc_images/${esc(img)}?t=${Date.now()}') center/cover`:"var(--surface2)"};display:flex;align-items:center;justify-content:center;color:var(--text3)">${img?"":locIcon(loc, 36)}</div>
            <div style="padding:10px 12px">
              <div style="font-size:12px;font-weight:600;margin-bottom:2px">${esc(loc.name)}</div>
              <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${ICONS.mapPin(11)} ${esc(loc.city)}</div>
              ${isAdmin ? `
              <div style="display:flex;gap:6px">
                <input type="file" id="locimg-${loc.id}" data-loc-image-upload="${loc.id}" accept="image/jpeg,image/png,image/webp" style="display:none" />
                <label for="locimg-${loc.id}" class="cal-nav-btn" style="cursor:pointer;font-size:11px;padding:5px 10px;flex:1;text-align:center">${img?"Zmień":"Wgraj zdjęcie"}</label>
                ${img ? `<button class="cal-nav-btn" data-loc-image-delete="${loc.id}" style="font-size:11px;padding:5px 10px;color:var(--red);border-color:var(--red)" title="Usuń zdjęcie">✕</button>` : ""}
              </div>` : `
              <div style="font-size:10px;color:var(--text3);font-style:italic;padding:4px 0">Zmiana zdjęć wymaga uprawnień admina.</div>
              `}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

function buildModal() {
  const loc = DATA.locations.find(l => l.id === state.modal);
  const min = Math.min(...loc.rooms.map(r => r.basePrice));
  let body = "", footer = "";

  if (state.step==="success") body = buildSuccess(loc);
  else if (state.step==="booking") { body = buildBookingForm(loc); footer = buildFooter(); }
  else if (state.step==="calendar") body = buildCalendar(loc);
  else body = buildTypeSelector();

  const showSteps = state.step !== "success" && state.step !== "type";
  return `
    <div class="overlay" id="overlay">
      <div class="modal" id="modalBox">
        <div class="modal-hdr">
          <div>
            <h2>${locIcon(loc, 16)} ${esc(loc.name)}</h2>
            <div class="modal-sub">${ICONS.mapPin(11)} ${esc(loc.city)} · od zł${min}/noc</div>
          </div>
          <button class="close-btn" id="closeBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
          ${showSteps ? `
            <div class="step-nav">
              <div class="step-dot done"></div>
              <div class="step-dot ${state.step==="calendar"?"active":state.step==="booking"?"done":""}"></div>
              <div class="step-dot ${state.step==="booking"?"active":""}"></div>
              <span class="step-lbl">${state.step==="calendar"?"Krok 2: Wybierz termin blokady":"Krok 3: Dane i płatność"}</span>

}
