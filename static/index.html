        amountPaid: b.payment?.amountPaid||"",
        billingMode: b.billingMode || "room",
        customPrice: b.customPrice != null ? String(b.customPrice) : "",
        guests: b.guests.map(g=>({...g}))
      };
      state.editCalMonth = parseDate(b.from);
      state.actualCalMonth = parseDate(b.from);
      render();
    });
  });

  // "Zatrzymaj serię" — deletes future bookings in recurring group (admin only)
  document.querySelectorAll("[data-stop-series]").forEach(btn => {
    btn.addEventListener("click", async e => {
      e.stopPropagation();
      const groupId = btn.dataset.stopSeries;
      const today = todayStr();
      const future = savedBookings.filter(b => b.recurringGroupId === groupId && b.from > today);
      if (future.length === 0) { showToast("Brak przyszłych rezerwacji w tej serii."); return; }
      if (!confirm(`Usunąć ${future.length} przyszłych rezerwacji z tej serii?`)) return;
      try {
        for (const b of future) await deleteBookingAPI(b.id);
        showToast(`✅ Zatrzymano serię — usunięto ${future.length} rezerwacji.`);
        state.roomDetailModal = null;
      } catch(err) {
        showToast("❌ Błąd: " + err.message);
      }
    });
  });

  // Booking modal
  if (!state.modal) return;
  document.getElementById("closeBtn")?.addEventListener("click", closeModal);
  // Overlay click does NOT close modal (fix: accidental click outside loses data)

  if (state.step==="type") {
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.bookingType = btn.dataset.type;
        if (state.bookingType==="individual") state.companyName="";
        state.guests = [newGuest()];
        render();
      });
    });
    // Company name input — patch only the button disabled state, no re-render
    const cni = document.getElementById("companyNameInput");
    if (cni) {
      cni.addEventListener("input", e => {
        state.companyName = e.target.value;
        patchDisabled("typeNextBtn", !state.companyName.trim());
      });
    }
    document.getElementById("typeNextBtn")?.addEventListener("click", () => {
      state.step="calendar"; render();
    });
  }

  if (state.step==="calendar") {
    // Checkbox "stały najemca" w widoku kalendarza (tylko indywidualne)
    document.getElementById("calIsPermanent")?.addEventListener("change", e => {
      state.isPermanent = e.target.checked;
      if (e.target.checked) {
        // Auto-set start na dziś jeśli nie ma, end na placeholder (+1 dzień) — "to" i tak jest
        // bez znaczenia gdy isPermanent. Flagi placeholder pozwala wykryć "fake end" gdy user
        // później odhaczy stałego najemcę w booking-form.
        if (!state.calStart) state.calStart = todayStr();
        const d = new Date(state.calStart); d.setDate(d.getDate() + 1);
        state.calEnd = toStr(d);
        state.calEndWasPlaceholder = true;
      } else {
        // Wyłączamy stały najemca → reset placeholdera end, niech user wybierze normalnie
        state.calEnd = null;
        state.calEndWasPlaceholder = false;
        state.permanentMonthlyRate = "";
      }
      state.availResult = null;
      state.selectedRoom = null;
      render();
    });
    document.getElementById("permStartInput")?.addEventListener("change", e => {
      state.calStart = e.target.value;
      // Placeholder end = start + 1 dzień (i tak ignorowany dla isPermanent)
      const d = new Date(state.calStart); d.setDate(d.getDate() + 1);
      state.calEnd = toStr(d);
      state.calEndWasPlaceholder = true;
      state.availResult = null;
      render();
    });
    document.getElementById("prevMonth")?.addEventListener("click", () => {
      state.viewMonth = new Date(state.viewMonth.getFullYear(), state.viewMonth.getMonth()-1, 1); render();
    });
    document.getElementById("nextMonth")?.addEventListener("click", () => {
      state.viewMonth = new Date(state.viewMonth.getFullYear(), state.viewMonth.getMonth()+1, 1); render();
    });
    document.querySelectorAll(".cal-day[data-date]").forEach(btn => {
      btn.addEventListener("click", () => {
        const ds = btn.dataset.date;
        // Click w kalendarzu = user wybiera prawdziwe daty, reset flagi placeholder
        state.calEndWasPlaceholder = false;
        if (!state.calStart || (state.calStart && state.calEnd)) {
          state.calStart = ds; state.calEnd = null; state.availResult = null; state.selectedRoom = null;
        } else {
          if (ds <= state.calStart) { state.calStart = ds; state.calEnd = null; }
          else state.calEnd = ds;
        }
        render();
      });
    });
    document.getElementById("checkAvailBtn")?.addEventListener("click", () => {
      state.availResult = checkAvailability(state.modal, state.calStart, state.calEnd);
      state.selectedRoom = null;
      render();
      // Scroll to avail results
      setTimeout(() => {
        const mb = document.getElementById("modalBody");
        const av = document.getElementById("availSection");
        if (mb && av) mb.scrollTo({ top: av.offsetTop - 16, behavior: "smooth" });
      }, 50);
    });
    document.querySelectorAll(".room-option[data-room]").forEach(btn => {
      btn.addEventListener("click", () => {
        const prev = state.selectedRoom;
        state.selectedRoom = btn.dataset.room;
        if (prev) {
          document.querySelectorAll(".room-option").forEach(b => b.classList.remove("sel"));
          btn.classList.add("sel");
          let cb = document.getElementById("continueBtn");
          if (!cb) {
            cb = document.createElement("button");
            cb.className = "continue-btn"; cb.id = "continueBtn";
            cb.textContent = "Przejdź do formularza →";
            document.getElementById("availSection")?.appendChild(cb);
            cb.addEventListener("click", () => { state.step="booking"; if(state.guests.length===0) state.guests=[newGuest()]; render(); setTimeout(()=>{ document.getElementById("modalBody")?.scrollTo({top:0,behavior:"smooth"}); },50); });
          }
          const mb = document.getElementById("modalBody");
          if (mb && cb) mb.scrollTo({ top: cb.offsetTop - 60, behavior: "smooth" });
        } else {
          render();
          setTimeout(() => {
            const mb = document.getElementById("modalBody");
            const cb = document.getElementById("continueBtn");
            if (mb && cb) mb.scrollTo({ top: cb.offsetTop - 60, behavior: "smooth" });
          }, 50);
        }
      });
    });
    // Multi-room checkboxes (company bookings)
    document.querySelectorAll("[data-room-cb]").forEach(cb => {
      cb.addEventListener("change", () => {
        if (!state.selectedRooms) state.selectedRooms = [];
        const rid = cb.dataset.roomCb;
        if (cb.checked) {
          if (!state.selectedRooms.includes(rid)) state.selectedRooms.push(rid);
        } else {
          state.selectedRooms = state.selectedRooms.filter(r => r !== rid);
          // Wyczyść stale assignedRoom dla gości przypisanych do odznaczonego pokoju
          (state.guests || []).forEach(g => {
            if (g.assignedRoom === rid) g.assignedRoom = "";
          });
        }
        render();
        setTimeout(() => {
          const mb = document.getElementById("modalBody");
          const av = document.getElementById("availSection");
          if (mb && av) mb.scrollTo({ top: av.offsetTop - 16, behavior: "smooth" });
        }, 50);
      });
    });
    document.getElementById("continueBtn")?.addEventListener("click", () => {
      state.step = "booking";
      if (state.guests.length===0) state.guests = [newGuest()];
      render();
      // Scroll modal to top
      setTimeout(() => {
        const mb = document.getElementById("modalBody");
        if (mb) mb.scrollTo({ top: 0, behavior: "smooth" });
      }, 50);
    });
  }

  if (state.step==="booking") {
    document.getElementById("backBtn")?.addEventListener("click", () => {
      state.step="calendar";
      state.availResult=null;
      state.selectedRoom=null;
      state.selectedRooms=[];
      // Wyczyść assignedRoom u wszystkich gości — pokoje będą wybrane od nowa,
      // stary assignedRoom byłby stale.
      (state.guests || []).forEach(g => { g.assignedRoom = ""; });
      render();
    });
    document.getElementById("addGuestBtn")?.addEventListener("click", () => {
      state.guests.push(newGuest()); render();
    });
    document.querySelectorAll("[data-remove]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.guests.splice(parseInt(btn.dataset.remove),1); render();
      });
    });

    // Guest text inputs — NO re-render, update state silently
    document.querySelectorAll("[data-guest][data-field]").forEach(el => {
      const i = parseInt(el.dataset.guest);
      const f = el.dataset.field;
      if (el.type==="checkbox") {
        el.addEventListener("change", () => { state.guests[i][f]=el.checked; render(); });
      } else if (el.tagName === "SELECT") {
        el.addEventListener("change", () => {
          state.guests[i][f] = el.value;
          // assignedRoom zmienia ceny w radio per-pracownik — odśwież widok
          if (f === "assignedRoom") render();
        });
      } else {
        el.addEventListener("input", () => {
          state.guests[i][f] = el.value;
          // BUG FIX v3.5: patchDisabled liczy WSZYSTKIE warunki (hasName + allAssigned +
          // withinCapacity), nie tylko hasName. Wcześniej wpisanie nazwy w polu odblokowywało
          // confirm nawet gdy ktoś z gości był bez przypisania (firmowa multi-room) →
          // user mógł kliknąć "Potwierdź" bez przypisania pracowników.
          const isCompany = state.bookingType==="company";
          const selRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);
          const hasName = isCompany ? state.guests.length > 0 : state.guests.some(g=>g.name.trim().length>0);
          let allAssigned = true;
          if (isCompany && selRooms.length > 1) {
            allAssigned = !state.guests.some(g => !g.assignedRoom);
          }
          let withinCap = true;
          if (state.calStart && selRooms.length > 0) {
            if (isCompany && state.calEnd) {
              if (selRooms.length > 1) {
                const perRoom = {};
                state.guests.forEach(g => { if (g.assignedRoom) perRoom[g.assignedRoom] = (perRoom[g.assignedRoom]||0)+1; });
                for (const rid of selRooms) {
                  if ((perRoom[rid]||0) > getFreeBeds(rid, state.calStart, state.calEnd)) { withinCap = false; break; }
                }
              } else {
                withinCap = state.guests.length <= getFreeBeds(selRooms[0], state.calStart, state.calEnd);
              }
            }
            // Indywidualna nie blokuje, tylko ostrzega (withinCap zostaje true)
          }
          patchDisabled("confirmBtn", !(hasName && allAssigned && withinCap));
        });
        // dailyRate zmienia total i breakdown — render po opuszczeniu pola (zachowuje focus podczas pisania)
        if (f === "dailyRate") {
          el.addEventListener("change", () => render());
        }
      }
    });

    // Buffer input — no re-render, patch hint text only
    document.getElementById("bufferInput")?.addEventListener("input", e => {
      state.bufferDays = parseInt(e.target.value)||0;
      patchText("bufferHint", `Pokój zablokowany przez dodatkowe ${state.bufferDays} dni po wyjeździe.`);
    });

    document.getElementById("isPermanentInput")?.addEventListener("change", e => {
      // Jeśli user przyszedł z calendar step wybierając "Stały najemca" (calEnd to placeholder
      // start+1 dzień), to odhaczenie tutaj zostawia booking z 1-nocną rezerwacją → cofamy do
      // kalendarza żeby wybrał prawdziwą datę wyjazdu.
      if (!e.target.checked && state.calEndWasPlaceholder) {
        e.target.checked = true; // wizualnie cofnij — render i tak nadpisze
        state.isPermanent = false;
        state.calEnd = null;
        state.calEndWasPlaceholder = false;
        state.permanentMonthlyRate = "";
        state.availResult = null;
        state.selectedRoom = null;
        state.step = "calendar";
        showToast("Wróć do kalendarza i wybierz datę wyjazdu.");
        render();
        return;
      }
      state.isPermanent = e.target.checked;
      if (!e.target.checked) state.permanentMonthlyRate = "";
      render();
    });
    document.getElementById("permanentMonthlyRateInput")?.addEventListener("input", e => {
      state.permanentMonthlyRate = e.target.value;
    });
    document.getElementById("permanentMonthlyRateInput")?.addEventListener("change", () => render());

    // Per-pracownik tryb rozliczenia
    document.querySelectorAll("[data-guest-mode]").forEach(r => {
      r.addEventListener("change", e => {
        const i = parseInt(e.target.dataset.guestMode);
        state.guests[i].billingMode = e.target.value;
        render();
      });
    });
    document.getElementById("customPriceInput")?.addEventListener("input", e => {
      state.customPrice = e.target.value;
    });
    document.getElementById("customPriceInput")?.addEventListener("change", () => render());
    // v3.37 — VAT checkboxes: mutually exclusive, klik na unchecked → switch
    document.querySelectorAll("[data-vat]").forEach(cb => {
      cb.addEventListener("change", e => {
        const newRate = cb.dataset.vat;
        // Wymuś jeden zaznaczony (nigdy oba ani żaden)
        state.vatRate = (state.vatRate === newRate) ? newRate : newRate;
        render();
      });
    });

    document.querySelectorAll(".pm-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.payment.method=btn.dataset.method; state.payment.timing=null; render();
      });
    });
    document.querySelectorAll(".timing-btn").forEach(btn => {
      btn.addEventListener("click", () => { state.payment.timing=btn.dataset.timing; render(); });
    });
    document.getElementById("confirmBtn")?.addEventListener("click", () => { if (!API_CREDS) confirmBooking(); });
  }

  if (state.step==="success") {
    document.getElementById("doneBtn")?.addEventListener("click", closeModal);
  }
}

function attachEditEvents() {
  const em = state.editModal;
  document.getElementById("editCloseBtn")?.addEventListener("click", () => { state.editModal=null; state.editCalMonth=null; state.actualCalMonth=null; render(); });

  // Edit overlay click does NOT close modal (fix: accidental click outside loses data)
  document.getElementById("editCalPrev")?.addEventListener("click", () => {
    const m = state.editCalMonth || new Date();
    state.editCalMonth = new Date(m.getFullYear(), m.getMonth()-1, 1); render();
  });
  document.getElementById("editCalNext")?.addEventListener("click", () => {
    const m = state.editCalMonth || new Date();
    state.editCalMonth = new Date(m.getFullYear(), m.getMonth()+1, 1); render();
  });

  // Date fields — re-render on change (structural update needed)
  document.getElementById("editFrom")?.addEventListener("change", e => { state.editModal.from=e.target.value; render(); });
  document.getElementById("editTo")?.addEventListener("change", e => { state.editModal.to=e.target.value; render(); });
  document.getElementById("editBuffer")?.addEventListener("change", e => { state.editModal.bufferDays=parseInt(e.target.value)||0; render(); });

  // Actual day picker navigation
  document.getElementById("actualCalPrev")?.addEventListener("click", () => {
    const m = state.actualCalMonth || parseDate(state.editModal.from);
    state.actualCalMonth = new Date(m.getFullYear(), m.getMonth()-1, 1); render();
  });
  document.getElementById("actualCalNext")?.addEventListener("click", () => {
    const m = state.actualCalMonth || parseDate(state.editModal.from);
    state.actualCalMonth = new Date(m.getFullYear(), m.getMonth()+1, 1); render();
  });

  // Toggle individual day
  document.querySelectorAll("[data-actual-day]").forEach(cell => {
    cell.addEventListener("click", () => {
      const ds = cell.dataset.actualDay;
      const em = state.editModal;
      if (!em.actualDays) em.actualDays = [];
      const idx = em.actualDays.indexOf(ds);
      if (idx >= 0) em.actualDays.splice(idx, 1);
      else em.actualDays.push(ds);
      em.actualDays.sort();
      render();
    });
  });

  // Select all days in reservation range
  document.getElementById("actualSelectAll")?.addEventListener("click", () => {
    const em = state.editModal;
    const days = [];
    let d = parseDate(em.from);
    const end = parseDate(em.to);
    while (d < end) { days.push(toStr(d)); d = addDays(d, 1); }
    em.actualDays = days;
    render();
  });

  // Clear all
  document.getElementById("actualClearAll")?.addEventListener("click", () => {
    state.editModal.actualDays = [];
    render();
  });

  // Select fields — no re-render needed
  document.getElementById("editPayMethod")?.addEventListener("change", e => { state.editModal.payMethod=e.target.value; render(); });
  document.getElementById("editPayTiming")?.addEventListener("change", e => { state.editModal.payTiming=e.target.value; render(); });

  // Amount paid — input updates state, blur re-renders (żeby pokazać/ukryć warning bez "skakania" focusa)
  document.getElementById("editAmountPaid")?.addEventListener("input", e => { state.editModal.amountPaid=e.target.value; });
  document.getElementById("editAmountPaid")?.addEventListener("blur", () => { render(); });
  document.querySelectorAll("[data-edit-guest-mode]").forEach(sel => {
    sel.addEventListener("change", e => {
      const idx = parseInt(e.target.dataset.editGuestMode);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].billingMode = e.target.value;
      render();
    });
  });
  document.querySelectorAll("[data-edit-guest-rate]").forEach(inp => {
    inp.addEventListener("input", e => {
      const idx = parseInt(e.target.dataset.editGuestRate);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].dailyRate = e.target.value;
    });
  });
  document.querySelectorAll("[data-edit-guest-perm]").forEach(cb => {
    cb.addEventListener("change", e => {
      const idx = parseInt(e.target.dataset.editGuestPerm);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].isPermanent = e.target.checked;
      if (!e.target.checked) state.editModal.guests[idx].permanentEnd = null;
      render();
    });
  });
  document.querySelectorAll("[data-edit-guest-permend]").forEach(inp => {
    inp.addEventListener("change", e => {
      const idx = parseInt(e.target.dataset.editGuestPermend);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].permanentEnd = e.target.value || null;
    });
  });
  document.querySelectorAll("[data-edit-guest-permmonthly]").forEach(inp => {
    inp.addEventListener("input", e => {
      const idx = parseInt(e.target.dataset.editGuestPermmonthly);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].permanentMonthlyRate = e.target.value;
    });
    inp.addEventListener("change", () => render());
  });
  document.querySelectorAll("[data-edit-guest-actualnights]").forEach(inp => {
    inp.addEventListener("input", e => {
      const idx = parseInt(e.target.dataset.editGuestActualnights);
      if (!state.editModal.guests) state.editModal.guests = [];
      if (!state.editModal.guests[idx]) state.editModal.guests[idx] = {};
      state.editModal.guests[idx].actualNights = e.target.value;
    });
    inp.addEventListener("change", () => render());
  });
  document.getElementById("editIsPermanent")?.addEventListener("change", e => {
    state.editModal.isPermanent = e.target.checked;
    if (!e.target.checked) {
      state.editModal.permanentEnd = null;
      state.editModal.permanentMonthlyRate = "";
    }
    render();
  });
  document.getElementById("editPermanentEnd")?.addEventListener("change", e => {
    state.editModal.permanentEnd = e.target.value || null;
  });
  document.getElementById("editPermanentMonthlyRate")?.addEventListener("input", e => {
    state.editModal.permanentMonthlyRate = e.target.value;
  });
  document.getElementById("editPermanentMonthlyRate")?.addEventListener("change", () => render());
  document.getElementById("editCustomPrice")?.addEventListener("input", e => { state.editModal.customPrice = e.target.value; });
  // v3.37 — Edit VAT checkboxes
  document.querySelectorAll("[data-edit-vat]").forEach(cb => {
    cb.addEventListener("change", () => {
      state.editModal.vatRate = cb.dataset.editVat;
      render();
    });
  });

  // Paid months toggle dla stałego najemcy indywidualnego
  document.querySelectorAll(".paid-month-btn[data-paid-month]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault();
      const ym = btn.dataset.paidMonth;
      const em = state.editModal;
      const b = savedBookings.find(x => x.id === em.bookingId);
      // Initialize z istniejących paidMonths jeśli em jeszcze nie ma
      if (em.paidMonths === undefined) em.paidMonths = Array.isArray(b?.paidMonths) ? [...b.paidMonths] : [];
      const idx = em.paidMonths.indexOf(ym);
      if (idx >= 0) em.paidMonths.splice(idx, 1);
      else {
        em.paidMonths.push(ym);
        // v3.55 — pełna wpłata kasuje ewentualną częściową dla tego miesiąca
        if (em.partialPaid === undefined && b?.partialPaid) em.partialPaid = { ...b.partialPaid };
        if (em.partialPaid && em.partialPaid[ym] !== undefined) delete em.partialPaid[ym];
      }
      render();
    });
  });
  document.getElementById("paidMonthsAll")?.addEventListener("click", () => {
    const em = state.editModal;
    const b = savedBookings.find(x => x.id === em.bookingId);
    em.paidMonths = getPermanentActiveMonths(b, b.from, null, null);
    render();
  });
  document.getElementById("paidMonthsNone")?.addEventListener("click", () => {
    state.editModal.paidMonths = [];
    render();
  });
  // v3.51 — rozwiń grid o kolejny rok w przód (odhaczanie przedpłat na lata)
  document.getElementById("paidMonthsAddYear")?.addEventListener("click", () => {
    state.editModal.paidMonthsExtraYears = (state.editModal.paidMonthsExtraYears || 0) + 1;
    render();
  });
  // v3.55 — trasza: zapisz wpłatę CZĘŚCIOWĄ za miesiąc (mniej niż pełna stawka)
  document.getElementById("partialAddBtn")?.addEventListener("click", () => {
    const em = state.editModal;
    const b = savedBookings.find(x => x.id === em.bookingId);
    const ym = document.getElementById("partialMonthSel")?.value;
    const amt = parseFloat(document.getElementById("partialAmountInp")?.value);
    if (!ym || isNaN(amt) || amt <= 0) { showToast("Wybierz miesiąc i wpisz kwotę > 0"); return; }
    if (em.partialPaid === undefined) em.partialPaid = { ...(b?.partialPaid || {}) };
    em.partialPaid[ym] = amt;
    // częściowa wyklucza pełną — usuń ym z paidMonths jeśli był
    if (em.paidMonths === undefined) em.paidMonths = Array.isArray(b?.paidMonths) ? [...b.paidMonths] : [];
    em.paidMonths = em.paidMonths.filter(m => m !== ym);
    render();
  });
  document.querySelectorAll("[data-partial-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      const em = state.editModal;
      const b = savedBookings.find(x => x.id === em.bookingId);
      const ym = btn.dataset.partialRemove;
      if (em.partialPaid === undefined) em.partialPaid = { ...(b?.partialPaid || {}) };
      delete em.partialPaid[ym];
      render();
    });
  });
  // v3.56 — okresy rozliczeniowe: dodaj okres (granice w półmiesiącach)
  document.getElementById("bpAddBtn")?.addEventListener("click", () => {
    const em = state.editModal;
    const b = savedBookings.find(x => x.id === em.bookingId);
    const fm = document.getElementById("bpFromMonth")?.value;     // YYYY-MM
    const fh = document.getElementById("bpFromHalf")?.value;       // "01" | "16"
    const tm = document.getElementById("bpToMonth")?.value;        // YYYY-MM
    const th = document.getElementById("bpToHalf")?.value;         // "end" | "15"
    const amount = parseFloat(document.getElementById("bpAmount")?.value);
    const invoiceId = document.getElementById("bpInvoice")?.value || null;
    if (!isValidPeriod(fm) || !isValidPeriod(tm)) { showToast("Wybierz miesiąc Od i Do (RRRR-MM)"); return; }
    const from = `${fm}-${fh}`;
    const [ty, tmo] = tm.split("-").map(Number);
    const to = th === "end" ? `${tm}-${String(new Date(ty, tmo, 0).getDate()).padStart(2,"0")}` : `${tm}-15`;
    if (from > to) { showToast("Data Od jest późniejsza niż Do"); return; }
    if ((isNaN(amount) || amount <= 0) && !invoiceId) { showToast("Wpisz kwotę albo podepnij fakturę z kwotą"); return; }
    if (em.billingPeriods === undefined) em.billingPeriods = Array.isArray(b?.billingPeriods) ? b.billingPeriods.map(p=>({...p})) : [];
    em.billingPeriods.push({ id: "bp" + (em.billingPeriods.length + 1) + "_" + from + "_" + to, from, to, amount: isNaN(amount) ? 0 : amount, invoiceId });
    em.billingPeriods.sort((a, c) => (a.to || "").localeCompare(c.to || ""));
    render();
  });
  document.querySelectorAll("[data-bp-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      const em = state.editModal;
      const b = savedBookings.find(x => x.id === em.bookingId);
      if (em.billingPeriods === undefined) em.billingPeriods = Array.isArray(b?.billingPeriods) ? b.billingPeriods.map(p=>({...p})) : [];
      em.billingPeriods.splice(parseInt(btn.dataset.bpRemove), 1);
      render();
    });
  });

  document.getElementById("editSaveBtn")?.addEventListener("click", () => {
    if (API_CREDS) return;
    const em = state.editModal;
    if (!em.from||!em.to||em.from>=em.to) {
      document.getElementById("editConflict").textContent="Daty blokady są nieprawidłowe."; return;
    }
    const b = savedBookings.find(x=>x.id===em.bookingId);
    if (!b) return;
    // v3.57 — pojemność sprawdzamy tylko gdy zmieniają się daty (edycja metadanych nie rusza zajętości).
    if (em.from !== b.from || em.to !== b.to) {
      const free = getFreeBeds(b.roomId, em.from, em.to, em.bookingId);
      const need = bedsUsedByBooking(b);
      if (free < need) {
        if (!state.editModal._overcapAck && !confirm(
          `⚠️ Uwaga — przekroczona pojemność pokoju w nowym terminie.\n\nTa rezerwacja zajmuje ${need} ${nl(need)}, a wolne tylko ${free}.\n\nZapisać mimo to?`
        )) return;
        state.editModal._overcapAck = true;
      }
    }
    b.from = em.from; b.to = em.to; b.bufferDays = em.bufferDays;
    b.actualDays = em.actualDays && em.actualDays.length > 0 ? [...em.actualDays] : [];
    // PaidMonths dla stałego najemcy indywidualnego
    if (em.paidMonths !== undefined) {
      b.paidMonths = Array.isArray(em.paidMonths) ? [...em.paidMonths] : [];
    }
    // v3.55 — trasza: kwoty częściowe per miesiąc
    if (em.partialPaid !== undefined) {
      b.partialPaid = (em.partialPaid && typeof em.partialPaid === "object") ? { ...em.partialPaid } : {};
    }
    // v3.56 — okresy rozliczeniowe
    if (em.billingPeriods !== undefined) {
      b.billingPeriods = Array.isArray(em.billingPeriods) ? em.billingPeriods.map(p=>({...p})) : [];
    }
    // Clear legacy fields
    delete b.actualFrom; delete b.actualTo;
    b.payment = {
      method: em.payMethod || b.payment?.method,
      timing: em.payTiming || b.payment?.timing,
      amountPaid: em.amountPaid !== undefined ? em.amountPaid : b.payment?.amountPaid
    };
    // Per-pracownik billingMode, dailyRate, isPermanent: kopiujemy z em.guests do b.guests
    if (Array.isArray(em.guests) && Array.isArray(b.guests)) {
      em.guests.forEach((eg, idx) => {
        if (!b.guests[idx] || !eg) return;
        if (eg.billingMode) b.guests[idx].billingMode = eg.billingMode;
        if (eg.dailyRate !== undefined) {
          const n = eg.dailyRate === "" ? NaN : parseFloat(eg.dailyRate);
          if (!isNaN(n) && n >= 0) b.guests[idx].dailyRate = n;
          else delete b.guests[idx].dailyRate;
        }
        if (eg.isPermanent !== undefined) {
          if (eg.isPermanent) {
            b.guests[idx].isPermanent = true;
            b.guests[idx].permanentStart = b.guests[idx].permanentStart || b.from;
            if (eg.permanentEnd !== undefined) b.guests[idx].permanentEnd = eg.permanentEnd || null;
          } else {
            delete b.guests[idx].isPermanent;
            delete b.guests[idx].permanentStart;
            delete b.guests[idx].permanentEnd;
            delete b.guests[idx].permanentMonthlyRate;
          }
        }
        if (eg.permanentMonthlyRate !== undefined) {
          const m = eg.permanentMonthlyRate === "" ? NaN : parseFloat(eg.permanentMonthlyRate);
          if (!isNaN(m) && m > 0) b.guests[idx].permanentMonthlyRate = m;
          else delete b.guests[idx].permanentMonthlyRate;
        }
        if (eg.actualNights !== undefined) {
          const n = eg.actualNights === "" ? NaN : parseInt(eg.actualNights);
          if (!isNaN(n) && n >= 0) b.guests[idx].actualNights = n;
          else delete b.guests[idx].actualNights;
        }
      });
      // Booking-level isPermanent dla rezerwacji indywidualnej
      if (b.bookingType !== "company" && em.isPermanent !== undefined) {
        if (em.isPermanent) {
          b.isPermanent = true;
          b.permanentStart = b.permanentStart || b.from;
          b.permanentEnd = em.permanentEnd || null;
        } else {
          delete b.isPermanent;
          delete b.permanentStart;
          delete b.permanentEnd;
          delete b.permanentMonthlyRate;
        }
      }
      // Booking-level permanentMonthlyRate (rezerwacja indywidualna)
      if (b.bookingType !== "company" && em.permanentMonthlyRate !== undefined) {
        const m = em.permanentMonthlyRate === "" ? NaN : parseFloat(em.permanentMonthlyRate);
        if (!isNaN(m) && m > 0 && b.isPermanent) b.permanentMonthlyRate = m;
        else delete b.permanentMonthlyRate;
      }
      // Booking-level mode aktualizujemy heurystycznie (wszyscy w tym pokoju → "employee", inaczej "room")
      const inRoom = b.guests.filter(g => !g.assignedRoom || g.assignedRoom === b.roomId);
      b.billingMode = inRoom.length > 0 && inRoom.every(g => g.billingMode === "employee") ? "employee" : "room";
    }
    if (em.customPrice !== undefined) {
      const n = em.customPrice === "" ? NaN : parseFloat(em.customPrice);
      if (!isNaN(n) && n >= 0) b.customPrice = n;
      else delete b.customPrice;
    }
    if (em.vatRate !== undefined) b.vatRate = em.vatRate;  // v3.37 VAT save
    state.editModal = null; state.actualCalMonth = null;
    showToast("✅ Rezerwacja zaktualizowana");
    render();
  });

  document.getElementById("editDeleteBtn")?.addEventListener("click", () => {
    if (API_CREDS) return;
    const b = savedBookings.find(x => x.id === state.editModal.bookingId);
    if (!b) return;
    const who = b.bookingType === "company"
      ? b.companyName
      : (b.guests?.map(g => g.name).filter(Boolean).join(", ") || "rezerwacja");
    const loc = DATA.locations.find(l => l.id === b.locId);
    const room = loc?.rooms.find(r => r.id === b.roomId);
    const ctx = `${loc?.name || ""} · ${room?.name || ""} · ${b.from} → ${b.to}`;
    if (!confirm(`Usunąć rezerwację?\n\n${who}\n${ctx}\n\nTej operacji nie da się cofnąć.`)) return;
    savedBookings = savedBookings.filter(x=>x.id!==state.editModal.bookingId);
    state.editModal = null;
    showToast("🗑 Rezerwacja usunięta");
    render();
  });
}

// billingMode "employee" = "Za osobę" — domyślnie używamy pricePerEmployee z cennika.
// Pole jest zachowane w modelu dla backward compat z istniejącymi rezerwacjami,
// ale UI nie pokazuje już toggla (jest tylko "Cena / osobę / doba").
function newGuest() { return { name:"", phone:"", isAdult: true, billingMode: "employee", assignedRoom: "" }; }

// Multi-room company: rozdziel orphany (workers bez assignedRoom) między pokoje uwzględniając
// pojemność. Jeśli wszystkie pokoje pełne — orphany lądują w pierwszym (over-cap).
// Zwraca nowy array gości z wypełnionym assignedRoom.
function distributeOrphans(guests, selectedRooms, loc) {
  if (!Array.isArray(selectedRooms) || selectedRooms.length === 0) return guests;
  const counts = {};
  selectedRooms.forEach(rid => { counts[rid] = 0; });
  // Najpierw policz tych już przypisanych
  guests.forEach(g => {
    if (g.assignedRoom && counts[g.assignedRoom] !== undefined) counts[g.assignedRoom]++;
  });
  const roomCapacity = rid => {
    const r = loc?.rooms?.find(x => x.id === rid);
    return r?.capacity || 0;
  };
  // Round-robin orphans do pokoi które mają jeszcze miejsce
  return guests.map(g => {
    if (g.assignedRoom) return g;
    // Znajdź pokój z największą wolną pojemnością
    let bestRid = selectedRooms[0];
    let bestFree = -Infinity;
    for (const rid of selectedRooms) {
      const free = roomCapacity(rid) - counts[rid];
      if (free > bestFree) { bestFree = free; bestRid = rid; }
    }
    counts[bestRid]++;
    return { ...g, assignedRoom: bestRid };
  });
}

function confirmBooking() {
  bookingCounter++;
  const loc = DATA.locations.find(l => l.id === state.modal);
  const isCompany = state.bookingType === "company";
  const selectedRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);

  const customPriceNum = state.customPrice !== "" ? parseFloat(state.customPrice) : NaN;
  const hasCustom = !isNaN(customPriceNum) && customPriceNum >= 0;

  // Czy którykolwiek gość/booking ma status stałego najemcy?
  const indivPermanent = !isCompany && !!state.isPermanent;

  const makeLocalObj = (roomId) => {
    const room = loc.rooms.find(r => r.id === roomId);
    const priceAtBooking = room ? {
      basePrice: room.basePrice,
      extraPerAdult: room.extraPerAdult,
      extraPerChild: room.extraPerChild,
      pricePerEmployee: room.pricePerEmployee || 0,
    } : null;
    bookingCounter++;
    // Multi-room company: rozdziel orphans (workers bez assignedRoom) round-robin po pojemnościach.
    // Bez tego każdy z N booking-records liczyłby WSZYSTKICH workerów → N× over-count w raportach.
    let baseCopy = state.guests.map(g=>({...g})).filter(g => isCompany || g.name.trim());
    if (isCompany && selectedRooms.length > 1) {
      baseCopy = distributeOrphans(baseCopy, selectedRooms, loc);
    }
    const guestsCopy = baseCopy.map(g => {
      if (isCompany && g.isPermanent) {
        return { ...g, permanentStart: g.permanentStart || state.calStart, permanentEnd: null };
      }
      return g;
    });
    let bedsUsed;
    if (isCompany) {
      const assigned = guestsCopy.filter(g => g.assignedRoom === roomId).length;
      bedsUsed = assigned > 0
        ? assigned
        : Math.max(1, Math.ceil(guestsCopy.length / Math.max(1, selectedRooms.length)));
    } else {
      bedsUsed = Math.max(1, guestsCopy.length);
    }
    const inRoomGuests = isCompany ? guestsCopy.filter(g => g.assignedRoom === roomId) : guestsCopy;
    const billingMode = (isCompany && inRoomGuests.length > 0 && inRoomGuests.every(g => g.billingMode === "employee"))
      ? "employee" : "room";
    // Booking-level permanent: dla indyw. lub gdy wszyscy goście w pokoju są permanent
    const isPerm = indivPermanent || (isCompany && inRoomGuests.length > 0 && inRoomGuests.every(g => g.isPermanent));
    const permanentMonthly = indivPermanent ? parseFloat(state.permanentMonthlyRate) : NaN;
    const hasPermMonthly = !isNaN(permanentMonthly) && permanentMonthly > 0;
    return {
      id: "sb" + bookingCounter,
      locId: state.modal, roomId,
      from: state.calStart,
      to:   state.calEnd,
      bufferDays: state.bufferDays,
      bookingType: state.bookingType,
      companyName: isCompany ? state.companyName : null,
      guests: guestsCopy,
      bedsUsed,
      billingMode,
      ...(isPerm ? { isPermanent: true, permanentStart: state.calStart, permanentEnd: null } : {}),
      ...(hasPermMonthly ? { permanentMonthlyRate: permanentMonthly } : {}),
      ...(hasCustom ? { customPrice: customPriceNum } : {}),
      vatRate: state.vatRate || "8",   // v3.37 — stawka VAT (8/23%)
      payment: { ...state.payment },
      actualFrom: null, actualTo: null, priceAtBooking,
    };
  };

  if (isCompany && selectedRooms.length > 1) {
    selectedRooms.forEach(roomId => savedBookings.push(makeLocalObj(roomId)));
  } else {
    savedBookings.push(makeLocalObj(state.selectedRoom));
  }
  state.step = "success";
  render();
}

function generatePrintReport(fromDate, toDate) {
  // Filtruj rezerwacje aktywne w zakresie
  const overlaps = (b) => {
    if (b.isPermanent || b.guests?.some(g => g.isPermanent)) {
      const start = b.permanentStart || b.from;
      const end = b.permanentEnd || endOfCurrentMonthExclusive();
      return start <= toDate && end > fromDate;
    }
    return b.from <= toDate && b.to > fromDate;
  };
  const periodRange = { from: fromDate, to: toDate };
  const bookings = savedBookings.filter(overlaps);
  if (bookings.length === 0) return null;

  let totRevenue = 0, totPaid = 0, totMedia = 0;
  bookings.forEach(b => {
    const loc = DATA.locations.find(l => l.id === b.locId);
    const room = loc?.rooms.find(r => r.id === b.roomId);
    const t = calcBookingTotal(b, room, getActualNights(b), periodRange);
    const _factor = bookingNettoFactor(b);  // v3.42 — netto (spójnie z raportem na ekranie)
    totRevenue += t * _factor;
    const isPermPrint = b.isPermanent && b.bookingType !== "company";
    if (isPermPrint) {
      const bp = (b.priceAtBooking?.basePrice ?? room?.basePrice) || 0;
      totPaid += getPermanentPaidRevenue(b, bp, b.from, periodRange.from, periodRange.to, b.payment?.timing) * _factor;
    } else {
      const p = parseFloat(b.payment?.amountPaid);
      if (!isNaN(p)) totPaid += p * _factor;
    }
  });
  // Media w okresie (v3.39: filtr na valid loc IDs — pomija legacy room-keyed)
  const _validLocsP = new Set(DATA.locations.map(l => String(l.id)));
  Object.entries(roomMedia).forEach(([key, m]) => {
    const [keyId, period] = key.split("__");
    if (!_validLocsP.has(keyId)) return;
    if (periodOverlapsRange(period, fromDate, toDate)) totMedia += sumMediaObjNetto(m);   // v3.46 — raport druk/PDF netto
  });

  const totProfit = totRevenue - totMedia;
  const totRemaining = Math.max(0, totRevenue - totPaid);

  const byLoc = {};
  bookings.forEach(b => {
    const loc = DATA.locations.find(l => l.id === b.locId);
    if (!loc) return;
    if (!byLoc[loc.id]) byLoc[loc.id] = { loc, bookings: [], revenue: 0, paid: 0 };
    byLoc[loc.id].bookings.push(b);
    const room = loc.rooms.find(r => r.id === b.roomId);
    const t = calcBookingTotal(b, room, getActualNights(b), periodRange);
    const _factor = bookingNettoFactor(b);  // v3.42 — netto
    byLoc[loc.id].revenue += t * _factor;
    const isPermLoc = b.isPermanent && b.bookingType !== "company";
    if (isPermLoc) {
      const bp = (b.priceAtBooking?.basePrice ?? room?.basePrice) || 0;
      byLoc[loc.id].paid += getPermanentPaidRevenue(b, bp, b.from, periodRange.from, periodRange.to, b.payment?.timing) * _factor;

function exportCSV_DEAD() {
  if (savedBookings.length===0) { showToast("Brak rezerwacji do eksportu."); return; }
  const rows = [["#","Typ","Firma","Miasto","Obiekt","Pokój","Zab.Od","Zab.Do","Zab.Nocy","Bufor","Fakt.Nocy","Goście","Dorośli","Dzieci","Metoda","Termin","Wpłacono zł","Łącznie zł"]];
  savedBookings.forEach((b,i) => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    const reservedN = diffDays(b.from, b.to);
    const actualN = getActualNights(b);
    const adults = b.guests.filter(g=>g.isAdult).length;
    const children = b.guests.filter(g=>!g.isAdult).length;
    const gstr = b.bookingType==="company"
      ? b.guests.map((g,j)=>`${g.name||`Pracownik ${j+1}`}`).join("; ")
      : b.guests.map(g=>`${g.name}${g.isAdult?"":" (dz.)"}`).join("; ");
    const total = calcBookingTotal(b, room, actualN);
    // Print row: tylko explicit amountPaid liczy się jako zapłacone.
    const paid = b.payment?.amountPaid || 0;
    rows.push([
      i+1, b.bookingType==="company"?"Firmowa":"Indywidualna",
      b.companyName||"", loc?.city, loc?.name, room?.name,
      b.from, b.to, reservedN, b.bufferDays||0,
      actualN !== reservedN ? actualN : "",
      gstr, adults, children,
      {invoice:"Faktura",cash:"Gotówka",transfer:"Przelew"}[b.payment?.method]||"",
      {prepaid:"Przed pobytem",postpaid:"Po pobycie"}[b.payment?.timing]||"",
      paid, total
    ]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"}));
  a.download = "rezerwacje_eksport.csv";
  a.click();
  showToast("✅ Eksport CSV gotowy!");
}

let API_CREDS = null;

function apiHeaders() {
  if (!API_CREDS) return {};
  const encoded = btoa(API_CREDS.username + ':' + API_CREDS.password);
  return { "Authorization": "Basic " + encoded, "Content-Type": "application/json" };
}

async function apiGet(path) {
  const r = await fetch(path, { headers: apiHeaders() });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, { method:"POST", headers: apiHeaders(), body: JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function apiPut(path, body) {
  const r = await fetch(path, { method:"PUT", headers: apiHeaders(), body: JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function apiDelete(path) {
  const r = await fetch(path, { method:"DELETE", headers: apiHeaders() });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function apiUploadInvoice(formData) {

async function confirmBookingAPI() {
  const loc = DATA.locations.find(l => l.id === state.modal);
  const isCompany = state.bookingType === "company";
  const selectedRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);

  const customPriceNum = state.customPrice !== "" ? parseFloat(state.customPrice) : NaN;
  const hasCustom = !isNaN(customPriceNum) && customPriceNum >= 0;
  const indivPermanent = !isCompany && !!state.isPermanent;
  const makeObj = (roomId) => {
    const room = loc.rooms.find(r => r.id === roomId);
    const priceAtBooking = room ? {
      basePrice: room.basePrice,
      extraPerAdult: room.extraPerAdult,
      extraPerChild: room.extraPerChild,
      pricePerEmployee: room.pricePerEmployee || 0,
    } : null;
    // Multi-room company: rozdziel orphans round-robin po pojemnościach.
    let baseCopy = state.guests.map(g=>({...g})).filter(g => isCompany || g.name.trim());
    if (isCompany && selectedRooms.length > 1) {
      baseCopy = distributeOrphans(baseCopy, selectedRooms, loc);
    }
    const guestsCopy = baseCopy.map(g => {
      if (isCompany && g.isPermanent) {
        return { ...g, permanentStart: g.permanentStart || state.calStart, permanentEnd: null };
      }
      return g;
    });
    let bedsUsed;
    if (isCompany) {
      const assigned = guestsCopy.filter(g => g.assignedRoom === roomId).length;
      bedsUsed = assigned > 0
        ? assigned
        : Math.max(1, Math.ceil(guestsCopy.length / Math.max(1, selectedRooms.length)));
    } else {
      bedsUsed = Math.max(1, guestsCopy.length);
    }
    const inRoomGuests = isCompany ? guestsCopy.filter(g => g.assignedRoom === roomId) : guestsCopy;
    const billingMode = (isCompany && inRoomGuests.length > 0 && inRoomGuests.every(g => g.billingMode === "employee"))
      ? "employee" : "room";
    const isPerm = indivPermanent || (isCompany && inRoomGuests.length > 0 && inRoomGuests.every(g => g.isPermanent));
    const permanentMonthly = indivPermanent ? parseFloat(state.permanentMonthlyRate) : NaN;
    const hasPermMonthly = !isNaN(permanentMonthly) && permanentMonthly > 0;
    return {
      locId: state.modal, roomId,
      from: state.calStart, to: state.calEnd,
      bufferDays: state.bufferDays,
      bookingType: state.bookingType,
      companyName: isCompany ? state.companyName : null,
      guests: guestsCopy,
      bedsUsed,
      billingMode,
      ...(isPerm ? { isPermanent: true, permanentStart: state.calStart, permanentEnd: null } : {}),
      ...(hasPermMonthly ? { permanentMonthlyRate: permanentMonthly } : {}),
      ...(hasCustom ? { customPrice: customPriceNum } : {}),
      vatRate: state.vatRate || "8",   // v3.37 — stawka VAT
      payment: { ...state.payment },
      actualFrom: null, actualTo: null, priceAtBooking,
    };
  };

  try {
    if (isCompany && selectedRooms.length > 1) {
      for (const roomId of selectedRooms) {
        const b = await apiPost("/api/bookings", makeObj(roomId));
        savedBookings.push(b);
      }
    } else {
      const b = await apiPost("/api/bookings", makeObj(state.selectedRoom));
      savedBookings.push(b);
    }
    state.step = "success";
    showToast("✅ Rezerwacja zapisana!");
    render();
  } catch(e) {
    showToast("❌ Błąd zapisu: " + e.message);
  }
}

async function saveEditAPI() {
  const em = state.editModal;
  const b = savedBookings.find(x=>x.id===em.bookingId);
  if (!b) return;
  if (!em.from||!em.to||em.from>=em.to) {
    document.getElementById("editConflict").textContent="Daty blokady są nieprawidłowe."; return;
  }
  // v3.57 — sprawdzaj pojemność TYLKO gdy zmieniają się daty. Edycja metadanych
  // (kwota, płatność, paidMonths, okresy) nie rusza zajętości — rezerwacja już "siedzi"
  // w swoim terminie, więc blokowanie zapisu gdy pokój jest pełny to fałszywy alarm.
  if (em.from !== b.from || em.to !== b.to) {
    const free = getFreeBeds(b.roomId, em.from, em.to, em.bookingId);
    const need = bedsUsedByBooking(b);
    if (free < need) {
      // Soft confirm (też firmowe) — user może świadomie zapisać nadkomplet / przenosiny.
      if (!state.editModal._overcapAck && !confirm(
        `⚠️ Uwaga — przekroczona pojemność pokoju w nowym terminie.\n\nTa rezerwacja zajmuje ${need} ${nl(need)}, a wolne tylko ${free}.\n\nZapisać mimo to?`
      )) return;
      state.editModal._overcapAck = true;
    }
  }
  const updated = {
    ...b,
    from: em.from, to: em.to, bufferDays: em.bufferDays,
    actualDays: em.actualDays && em.actualDays.length > 0 ? [...em.actualDays] : [],
    payment: {
      method: em.payMethod || b.payment?.method,
      timing: em.payTiming || b.payment?.timing,
      amountPaid: em.amountPaid !== undefined ? em.amountPaid : b.payment?.amountPaid
    }
  };
  // Per-pracownik billingMode, dailyRate, isPermanent: kopiujemy z em.guests do updated.guests
  if (Array.isArray(em.guests) && Array.isArray(updated.guests)) {
    updated.guests = updated.guests.map((g, idx) => {
      const eg = em.guests[idx];
      if (!eg) return g;
      const merged = { ...g };
      if (eg.billingMode) merged.billingMode = eg.billingMode;
      if (eg.dailyRate !== undefined) {
        const n = eg.dailyRate === "" ? NaN : parseFloat(eg.dailyRate);
        if (!isNaN(n) && n >= 0) merged.dailyRate = n;
        else delete merged.dailyRate;
      }
      if (eg.isPermanent !== undefined) {
        if (eg.isPermanent) {
          merged.isPermanent = true;
          merged.permanentStart = merged.permanentStart || updated.from;
          if (eg.permanentEnd !== undefined) merged.permanentEnd = eg.permanentEnd || null;
        } else {
          delete merged.isPermanent;
          delete merged.permanentStart;
          delete merged.permanentEnd;
        }
      }
      return merged;
    });
    if (updated.bookingType !== "company" && em.isPermanent !== undefined) {
      if (em.isPermanent) {
        updated.isPermanent = true;
        updated.permanentStart = updated.permanentStart || updated.from;
        updated.permanentEnd = em.permanentEnd || null;
      } else {
        delete updated.isPermanent;
        delete updated.permanentStart;
        delete updated.permanentEnd;
      }
    }
    const inRoom = updated.guests.filter(g => !g.assignedRoom || g.assignedRoom === updated.roomId);
    updated.billingMode = inRoom.length > 0 && inRoom.every(g => g.billingMode === "employee") ? "employee" : "room";
  }
  if (em.customPrice !== undefined) {
    const n = em.customPrice === "" ? NaN : parseFloat(em.customPrice);
    if (!isNaN(n) && n >= 0) updated.customPrice = n;
    else delete updated.customPrice;
  }
  if (em.vatRate !== undefined) updated.vatRate = em.vatRate;  // v3.37 VAT
  // PaidMonths dla stałego najemcy indywidualnego
  if (em.paidMonths !== undefined) {
    updated.paidMonths = Array.isArray(em.paidMonths) ? [...em.paidMonths] : [];
  }
  // v3.55 — trasza: kwoty częściowe per miesiąc
  if (em.partialPaid !== undefined) {
    updated.partialPaid = (em.partialPaid && typeof em.partialPaid === "object") ? { ...em.partialPaid } : {};
  }
  // v3.56 — okresy rozliczeniowe
  if (em.billingPeriods !== undefined) {
    updated.billingPeriods = Array.isArray(em.billingPeriods) ? em.billingPeriods.map(p=>({...p})) : [];
  }
  // Także permanentMonthlyRate gdy edytowane
  if (em.permanentMonthlyRate !== undefined) {
    const m = em.permanentMonthlyRate === "" ? NaN : parseFloat(em.permanentMonthlyRate);
    if (!isNaN(m) && m > 0 && updated.isPermanent) updated.permanentMonthlyRate = m;
    else delete updated.permanentMonthlyRate;
  }
  delete updated.actualFrom; delete updated.actualTo;

  // Warning przed zapisem — postpaid + zaległość. Daje userowi szansę zaktualizować wpłatę.
  // Pomijamy tę osłonę gdy user już w obecnym save'ie potwierdził (state.editModal._warnAck).
  if (!state.editModal._warnAck) {
    const warn = getPaymentWarning(updated);
    if (warn) {
      const msg = `${warn.title}\n\n${warn.message}\n\nZapisać mimo to?\n(Anuluj = wróć i zaktualizuj wpłatę / odznacz "Po pobycie")`;
      if (!confirm(msg)) return;
      state.editModal._warnAck = true; // żeby drugi save nie pytał znowu w tej samej sesji modalu
    }
  }

  try {
    const saved = await apiPut("/api/bookings/" + b.id, updated);
    const idx = savedBookings.findIndex(x=>x.id===b.id);
    if (idx !== -1) savedBookings[idx] = saved;
    state.editModal = null; state.actualCalMonth = null;
    showToast("✅ Rezerwacja zaktualizowana");
    render();
  } catch(e) {
    const msg = e.message.includes("403") ? "Brak uprawnień — nie możesz edytować historycznych rezerwacji" : "❌ Błąd: " + e.message;
    document.getElementById("editConflict").textContent = msg;
  }
}

}

async function saveMediaAPI(roomId, period) {
  const rows = document.querySelectorAll('.media-inp[data-roomid="' + roomId + '"][data-period="' + period + '"]');
  // v3.46 — kwoty brutto + VAT per pozycja (domyślne PL: prąd/gaz 23%, woda 8%, inne 23%).
  const data = { electricity:0, gas:0, water:0, electricityVat:MEDIA_VAT_DEFAULTS.electricity, gasVat:MEDIA_VAT_DEFAULTS.gas, waterVat:MEDIA_VAT_DEFAULTS.water, others:[], note:"" };
  const othersMap = {};
  const ensureOther = idx => (othersMap[idx] ||= { label:`Inne ${idx+1}`, amount:0, vat:MEDIA_VAT_DEFAULTS.other });
  rows.forEach(inp => {
    const f = inp.dataset.field;
    if (f === "electricity" || f === "gas" || f === "water") {
      data[f] = parseFloat(inp.value)||0;
    } else if (f === "electricityVat" || f === "gasVat" || f === "waterVat") {
      if (inp.value !== "") data[f] = parseFloat(inp.value)||0;
    } else if (f === "note") {
      data.note = inp.value || "";
    } else if (f.startsWith("other_amount_")) {
      ensureOther(parseInt(f.replace("other_amount_",""))).amount = parseFloat(inp.value)||0;
    } else if (f.startsWith("other_vat_")) {
      const o = ensureOther(parseInt(f.replace("other_vat_",""))); if (inp.value !== "") o.vat = parseFloat(inp.value)||0;
    } else if (f.startsWith("other_label_")) {
      const idx = parseInt(f.replace("other_label_","")); ensureOther(idx).label = inp.value || `Inne ${idx+1}`;
    }
  });
  Object.keys(othersMap).sort((a,b)=>a-b).forEach(k => data.others.push(othersMap[k]));
  try {
    await apiPut("/api/media/" + roomId + "/" + period, data);
    roomMedia[roomId + "__" + period] = data;
    showToast("✅ Media zapisane!");
    render();
  } catch(e) {
    showToast("❌ Błąd zapisu mediów: " + e.message);
  }
}

// ============================================================
// FAKTURY — przez API
// ============================================================

async function saveInvoiceAPI() {
  const fileInp = document.getElementById("invAddFile");
  const file = fileInp?.files?.[0];
  const locId = document.getElementById("invAddLoc")?.value || null;
  const roomId = document.getElementById("invAddRoom")?.value || null;
  const period = document.getElementById("invAddPeriod")?.value || "";
  const amount = document.getElementById("invAddAmount")?.value || "";
  const note = document.getElementById("invAddNote")?.value || "";
  if (!file && !period) { showToast("⚠️ Dodaj plik lub wpisz okres"); return; }
  const fd = new FormData();
  if (file) fd.append("file", file);
  if (locId) fd.append("loc_id", locId);
  if (roomId) fd.append("room_id", roomId);
  fd.append("period", period);
  fd.append("amount", amount);
  fd.append("note", note);
  try {
    const inv = await apiUploadInvoice(fd);
    invoices.push(inv);
    state.showAddInvoice = false;
    showToast("✅ Faktura zapisana!");
    render();
  } catch(e) {
    showToast("❌ Błąd uploadu: " + e.message);
  }
}

async function deleteInvoiceAPI(invId) {
  try {
    await apiDelete("/api/invoices/" + invId);
    invoices = invoices.filter(i=>i.id!==invId);
    showToast("🗑 Faktura usunięta");
    render();
  } catch(e) {
    showToast(e.message.includes("403") ? "Brak uprawnień — tylko admin może usuwać faktury" : "❌ Błąd: " + e.message);
  }
}

// ============================================================
// DELEGACJA EVENTÓW — kliknięcia które wywołują API
// ============================================================

// v3.11 — ESC zamyka mobile drawer (przed login modal logic). Globalny listener,
// rejestrowany raz przy ładowaniu skryptu (nie w attachEvents bo to duplikuje).
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && state.mobileNavOpen) {
    state.mobileNavOpen = false;
    render();
  } else if (e.key === "Escape" && state.dayDetailModal) {   // v3.44 — zamknij modal dnia
    state.dayDetailModal = null;
    render();
  }
});

document.addEventListener("click", async (e) => {
  if (e.target.id === "loginBtn") return; // handled by attachEvents
  if (!API_CREDS) return;

  if (e.target.id === "confirmBtn") {
    e.stopImmediatePropagation();
    await confirmBookingAPI();
    return;
  }
  if (e.target.id === "editSaveBtn") {
    e.stopImmediatePropagation();
    await saveEditAPI();
    return;
  }
  if (e.target.id === "editDeleteBtn") {
    e.stopImmediatePropagation();
    const bookingId = state.editModal?.bookingId;
    if (!bookingId) return;
    const b = savedBookings.find(x => x.id === bookingId);
    if (b) {
      const who = b.bookingType === "company"
        ? b.companyName
        : (b.guests?.map(g => g.name).filter(Boolean).join(", ") || "rezerwacja");
      const loc = DATA.locations.find(l => l.id === b.locId);
      const room = loc?.rooms.find(r => r.id === b.roomId);
      const ctx = `${loc?.name || ""} · ${room?.name || ""} · ${b.from} → ${b.to}`;
      if (!confirm(`Usunąć rezerwację?\n\n${who}\n${ctx}\n\nTej operacji nie da się cofnąć.`)) return;
    }
    await deleteBookingAPI(bookingId);
    return;
  }
  if (e.target.id === "editAddNoteBtn") {
    e.stopImmediatePropagation();
    const ta = document.getElementById("editNewNote");
    const text = (ta?.value || "").trim();
    const bid = state.editModal?.bookingId;
    if (!text || !bid) { showToast("Pusta notatka — nic nie zapisano"); return; }
    const b = savedBookings.find(x => x.id === bid);
    try {
      const n = await apiPost("/api/notes", {
        type: "booking", bookingId: bid,
        roomId: b?.roomId || null, locId: b?.locId || null,
        text
      });
      notes.push(n);
      showToast("✅ Notatka dodana do rezerwacji");
      render();
    } catch(err) {
      showToast("❌ Błąd: " + err.message);
    }
    return;
  }
  if (e.target.id === "saveGeneralNoteBtn") {
    e.stopImmediatePropagation();
    const ta = document.getElementById("newGeneralNote");
    const text = (ta?.value || "").trim();
    if (!text) { showToast("Pusta notatka — nic nie zapisano"); return; }
    try {
      const n = await apiPost("/api/notes", { type: "general", text });
      notes.push(n);
      showToast("✅ Notatka ogólna zapisana");
      render();
    } catch(err) {
      showToast("❌ Błąd zapisu notatki: " + err.message);
    }
    return;
  }
  if (e.target.dataset.editNote) {
    e.stopImmediatePropagation();
    const id = e.target.dataset.editNote;
    const n = notes.find(x => x.id === id);
    if (!n) return;
    const newText = prompt("Edytuj notatkę:", n.text || "");
    if (newText == null) return;
    const trimmed = newText.trim();
    if (!trimmed) { showToast("Pusta — nie zapisano"); return; }
    try {
      const updated = await apiPut("/api/notes/" + id, { text: trimmed });
      const idx = notes.findIndex(x => x.id === id);
      if (idx !== -1) notes[idx] = updated;
      showToast("✅ Notatka zaktualizowana");
      render();
    } catch(err) {
      showToast("❌ Błąd: " + err.message);
    }
    return;
  }
  if (e.target.dataset.deleteNote) {
    e.stopImmediatePropagation();
    const id = e.target.dataset.deleteNote;
    if (!confirm("Usunąć tę notatkę? Tej operacji nie da się cofnąć (kasowanie wymaga admina).")) return;
    try {
      await apiDelete("/api/notes/" + id);
      notes = notes.filter(x => x.id !== id);
      showToast("🗑 Notatka usunięta");
      render();
    } catch(err) {
      showToast("❌ Błąd: " + err.message);
    }
    return;
  }
  if (e.target.dataset.openEdit) {
    e.preventDefault();
    e.stopImmediatePropagation();
    const bid = e.target.dataset.openEdit;
    const b = savedBookings.find(x => x.id === bid);
    if (!b) { showToast("Rezerwacja już nie istnieje"); return; }
    let actualDays = [];
    if (b.actualDays?.length > 0) actualDays = [...b.actualDays];
    state.editModal = {
      bookingId: b.id,
      from: b.from, to: b.to, bufferDays: b.bufferDays||0,
      actualDays,
      payMethod: b.payment?.method||"", payTiming: b.payment?.timing||"",
      amountPaid: b.payment?.amountPaid||"",
      billingMode: b.billingMode || "room",
      customPrice: b.customPrice != null ? String(b.customPrice) : "",
      isPermanent: !!b.isPermanent,
      permanentEnd: b.permanentEnd || null,
      guests: b.guests.map(g=>({...g}))
    };
    state.editCalMonth = parseDate(b.from);
    state.actualCalMonth = parseDate(b.from);
    render();
    return;
  }
  if (e.target.id === "saveInvoiceBtn") {
    e.stopImmediatePropagation();
    await saveInvoiceAPI();
    return;
  }
  if (e.target.dataset.delInv) {
    e.stopImmediatePropagation();
    await deleteInvoiceAPI(e.target.dataset.delInv);
    return;
  }
  const mediaBtn = e.target.closest("[data-media-save]");
  if (mediaBtn) {
    e.stopImmediatePropagation();
    await saveMediaAPI(mediaBtn.dataset.mediaSave, mediaBtn.dataset.period);
    return;
  }
  if (e.target.id === "logoutBtn") {
    API_CREDS = null;
    savedBookings = [];
    roomMedia = {};
    invoices = [];
    notes = [];
    render();
    return;
  }
});

// ============================================================
// Media invoice upload — triggered when user picks a file via 📎 button
// ============================================================

document.addEventListener("change", async (e) => {
  const inp = e.target;
  if (!inp.dataset.miRoom) return;
  const file = inp.files?.[0];
  if (!file) return;

  // Read the corresponding amount from the matching media input
  const field = inp.dataset.miField;
  let amount = "";
  if (field && !field.startsWith("other_")) {
    const amtInp = document.querySelector(
      `.media-inp[data-roomid="${inp.dataset.miRoom}"][data-period="${inp.dataset.miPeriod}"][data-field="${field}"]`
    );
    if (amtInp?.value) amount = amtInp.value;
  } else if (field && field.startsWith("other_")) {
    const idx = field.split("_")[1];
    const amtInp = document.querySelector(
      `.media-inp[data-roomid="${inp.dataset.miRoom}"][data-period="${inp.dataset.miPeriod}"][data-field="other_amount_${idx}"]`
    );
    if (amtInp?.value) amount = amtInp.value;
  }

  const fd = new FormData();
  fd.append("file", file);
  if (inp.dataset.miLoc) fd.append("loc_id", inp.dataset.miLoc);
  fd.append("room_id", inp.dataset.miRoom);
  fd.append("period", inp.dataset.miPeriod || "");
  fd.append("note", inp.dataset.miType || "");
  if (amount) fd.append("amount", amount);

  inp.value = ""; // reset so same file can be re-selected

  try {
    const inv = await apiUploadInvoice(fd);
    invoices.push(inv);
    showToast("✅ Faktura dołączona!");
    render();
  } catch(err) {
    showToast("❌ Błąd uploadu: " + err.message);
  }
});

  return buildAppCore();

// ============================================================
// PATCH attachEvents — logowanie
// ============================================================

// Login obsługiwany przez globalną funkcję wywoływaną z onclick
async function doLogin() {
  // Odczytaj wartości PRZED jakimkolwiek render() który niszczy DOM
  const username = (document.getElementById("loginUser")?.value || "").trim();
  const password = document.getElementById("loginPass")?.value || "";
  if (!username || !password) { state.loginError = "Wpisz użytkownika i hasło"; render(); return; }
  // Zapisz do state i pokaż loading — ale nie re-renderuj jeszcze
  state.loginLoading = true; state.loginError = null;
  try {
    const encoded = btoa(username + ":" + password);
    const r = await fetch("/api/me", { headers: { "Authorization": "Basic " + encoded } });
    if (!r.ok) throw new Error("401");
    const me = await r.json();
    API_CREDS = { username, password, role: me.role };
    state.loginLoading = false;
    state.loginUsername = username;
    await loadAllData();
    render();
  } catch(e) {
    API_CREDS = null;
    state.loginLoading = false;
    state.loginError = "Nieprawidłowy użytkownik lub hasło";
    render();
  }
}

// ============================================================
// INIT
// ============================================================

state.loginError = null;
state.loginLoading = false;
state.loginUsername = "";

render();
