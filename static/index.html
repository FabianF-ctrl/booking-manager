function buildCalendar(loc) {
  const vm = state.viewMonth;
  const year = vm.getFullYear(), month = vm.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = todayStr();

  let cells = "";
  for (let i=0; i<firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const blocked = state.selectedRoom ? isDayBlocked(ds, state.selectedRoom) : false;
    const inRange = state.calStart && state.calEnd && ds > state.calStart && ds < state.calEnd;
    const isStart = state.calStart && ds === state.calStart;
    const isEnd = state.calEnd && ds === state.calEnd;
    let cls = "cal-day";
    if (blocked && !isStart && !isEnd) cls += " blocked-day";
    if (ds === today) cls += " today";
    if (isStart) cls += " range-start";
    if (isEnd) cls += " range-end";
    if (inRange) cls += " in-range";
    cells += `<button class="${cls}" data-date="${ds}">${d}</button>`;
  }

  const nights = state.calStart && state.calEnd ? diffDays(state.calStart, state.calEnd) : 0;
  let hint = "Kliknij datę przyjazdu (termin blokady)";
  if (state.calStart && !state.calEnd) hint = `Przyjazd: ${fmtDate(state.calStart)} — wybierz datę wyjazdu`;
  if (state.calStart && state.calEnd) {
    hint = `${fmtDate(state.calStart)} → ${fmtDate(state.calEnd)} · ${nights} ${nw(nights)} (blokada)`;
  }

  let availHtml = "";
  if (state.availResult) {
    const av = state.availResult;
    const isCompany = state.bookingType === "company";
    if (av.ok) {
      // For company: multi-select checkboxes; for individual: single select buttons
      const selectedRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);
      // Suma WOLNYCH łóżek w wybranych pokojach (nie capacity — bo łóżka mogą być częściowo zajęte przez inne rezerwacje)
      const totalFreeBeds = selectedRooms.reduce((sum, rid) => {
        const r = av.available.find(x => x.id === rid);
        return sum + (r?.freeBeds || 0);
      }, 0);
      const guestCount = state.guests?.length || 1;
      const overCapacity = isCompany && selectedRooms.length > 0 && guestCount > totalFreeBeds;

      const renderOccupants = (occ) => {
        if (!occ || occ.length === 0) return "";
        const txt = occ.map(o => `${esc(o.who)} (${o.beds} ${nl(o.beds)})`).join(", ");
        return `<div class="room-meta" style="color:var(--orange);margin-top:2px">⚠️ Już w pokoju: ${txt}</div>`;
      };

      availHtml = `
        <div class="avail-section" id="availSection">
          <p class="avail-ok-lbl">${av.available.length} ${av.available.length===1?"pokój dostępny":"pokoje dostępne"} — ${isCompany?"zaznacz pokoje (można wybrać kilka)":"wybierz pokój"}:</p>
          ${av.available.map(r => {
            const isSelected = selectedRooms.includes(r.id);
            const bedsLine = `🛏 ${r.freeBeds}/${r.capacity} wolnych · ${esc(r.beds)} · zł${r.basePrice}/noc`;
            if (isCompany) {
              return `
                <label class="room-option ${isSelected?"sel":""}" style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
                  <input type="checkbox" data-room-cb="${r.id}" ${isSelected?"checked":""} style="margin-top:3px;accent-color:var(--blue);width:14px;height:14px;flex-shrink:0" />
                  <div style="flex:1">
                    <div>${esc(r.name)}</div>
                    <div class="room-meta">${bedsLine}</div>
                    ${renderOccupants(r.occupants)}
                  </div>
                </label>`;
            } else {
              return `
                <button class="room-option ${state.selectedRoom===r.id?"sel":""}" data-room="${r.id}" style="text-align:left">
                  <div>${esc(r.name)}</div>
                  <div class="room-meta">${bedsLine}</div>
                  ${renderOccupants(r.occupants)}
                </button>`;
            }
          }).join("")}
          ${isCompany && selectedRooms.length > 0 ? `
            <div style="font-size:12px;padding:8px 12px;border-radius:var(--radius);margin-top:4px;
              background:${overCapacity?"var(--orange-light)":"var(--green-light)"};
              color:${overCapacity?"var(--orange)":"var(--green)"};
              border:1px solid ${overCapacity?"var(--orange-border)":"var(--green-mid)"}">
              ${selectedRooms.length} ${selectedRooms.length===1?"pokój":"pokoje"} · wolnych łóżek razem: <strong>${totalFreeBeds}</strong>
              ${overCapacity ? ` ⚠️ Liczba gości (${guestCount}) przekracza dostępne łóżka — wróć i dodaj pokój lub kontynuuj.` : ""}
            </div>` : ""}
          ${(isCompany ? selectedRooms.length > 0 : state.selectedRoom) ? `<button class="continue-btn" id="continueBtn">Przejdź do formularza →</button>` : ""}
        </div>`;
    } else {
      let alts = av.earliestFull.slice(0,3).map(e =>
        `<div class="alt-line"><strong>${esc(e.room.name)}:</strong> wolny od ${fmtDate(e.from)} do ${fmtDate(e.to)}</div>`
      ).join("");
      availHtml = `
        <div class="avail-section" id="availSection">
          <div class="no-avail-box">
            <div class="no-avail-title">⚠️ Brak wolnych pokoi w tym terminie</div>
            ${alts || `<div style="font-size:12px;color:var(--text2)">Brak alternatyw w ciągu 6 miesięcy.</div>`}
          </div>
        </div>`;
    }
  }

  // Indywidualna rezerwacja może być od razu stała — wtedy nie ma sensu wybierać
  // daty wyjazdu, kalendarz to overkill. Pokazujemy prosty wybór startu zamiast siatki.
  const isIndividual = state.bookingType === "individual";
  const permPickerActive = isIndividual && !!state.isPermanent;

  return `
    <div style="font-size:12px;margin-bottom:10px;padding:8px 10px;background:var(--yellow-light);border:1px solid var(--yellow-border);border-radius:var(--radius);color:var(--yellow)">
      <span style="display:inline-flex;align-items:center;gap:5px;vertical-align:-2px">${ICONS.bed(13)}</span> Wybierasz <strong>termin blokady pokoju</strong>. Faktyczny pobyt wpiszesz osobno w Raportach.
    </div>

    ${isIndividual ? `
      <label class="checkbox-row" style="margin-bottom:12px;padding:10px 12px;background:${permPickerActive?"var(--green-light)":"var(--surface2)"};border:1px solid ${permPickerActive?"var(--green-mid)":"var(--border)"};border-radius:var(--radius);cursor:pointer">
        <input type="checkbox" id="calIsPermanent" ${permPickerActive?"checked":""} />
        <span style="display:inline-flex;align-items:center;gap:5px;vertical-align:-2px">${ICONS.house(14)}</span> Stały najemca — rezerwacja otwarta (bez daty końca, ustawisz tylko start)
      </label>
    ` : ""}

    ${permPickerActive ? `
      <div style="padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Data rozpoczęcia (od kiedy najemca mieszka)</label>
        <input type="date" id="permStartInput" value="${esc(state.calStart || todayStr())}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:14px;color:var(--text);font-variant-numeric:tabular-nums;outline:none" />
        <div style="font-size:11px;color:var(--text3);margin-top:6px;font-style:italic">Rezerwacja jest otwarta — kończysz ją ręcznie w Raportach. Termin "do" nie jest tu potrzebny.</div>
      </div>
      <button class="check-btn" id="checkAvailBtn" style="margin-top:12px" ${!state.calStart?"disabled":""}>Sprawdź dostępność</button>
    ` : `
      <div class="cal-nav">
        <button class="cal-nav-btn" id="prevMonth">‹</button>
        <span class="cal-month">${MONTHS[month]} ${year}</span>
        <button class="cal-nav-btn" id="nextMonth">›</button>
      </div>
      <div class="cal-legend">
        <span><span class="legend-dot" style="background:var(--red-light);border:1px solid var(--red-border)"></span>Zajęty</span>
      </div>
      <div class="cal-grid">
        ${DAYS_S.map(d=>`<div class="cal-dow">${d}</div>`).join("")}
        ${cells}
      </div>
      <p class="cal-hint">${hint}</p>
      <button class="check-btn" id="checkAvailBtn" ${!(state.calStart&&state.calEnd)?"disabled":""}>Sprawdź dostępność</button>
    `}
    ${availHtml}`;
}

function buildBookingForm(loc) {
  const nights = diffDays(state.calStart, state.calEnd);
  const room = loc.rooms.find(r=>r.id===state.selectedRoom);
  const isCompany = state.bookingType==="company";
  const p = state.payment;
  const guestCount = state.guests.length;
  const selectedRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);

  // v3.10 — Auto-przypisanie dla firmowej z 1 pokojem.
  // Gdy jest tylko 1 pokój, "przypisanie" jest implicit (wszyscy idą do tego pokoju).
  // Bez tego: dropdown ma 1 opcję, user musi klikać manualnie, a inline badge / footer warning
  // nigdy nie odpalał (warunek selectedRooms.length > 1) → niespójność: 4/5/6 pracownik bez
  // przypisania, ale brak sygnału. Z auto-assign: wszyscy mają assignedRoom, over-cap nadal
  // sygnalizuje gdy guests > beds. Multi-room (2+) pozostawia manualne przypisanie.
  if (isCompany && selectedRooms.length === 1) {
    const onlyRoom = selectedRooms[0];
    state.guests.forEach(g => { if (!g.assignedRoom) g.assignedRoom = onlyRoom; });
  }

  // Szacunkowa cena: dla firmowej sumujemy per pracownik
  const customPriceNum = state.customPrice !== "" ? parseFloat(state.customPrice) : NaN;
  const hasCustom = !isNaN(customPriceNum) && customPriceNum >= 0;
  // Indywidualna per-guest: ktokolwiek z gości ma explicit dailyRate
  const hasGuestRatesIndiv = !isCompany && !state.isPermanent
    && state.guests.some(g => g.dailyRate != null && g.dailyRate !== "" && !isNaN(parseFloat(g.dailyRate)));
  let total;
  if (hasCustom) {
    total = customPriceNum * Math.max(1, selectedRooms.length);
  } else if (hasGuestRatesIndiv) {
    // Per-gość: brak fallbacku, puste = 0
    total = 0;
    for (const g of state.guests) {
      const custom = parseFloat(g.dailyRate);
      const rate = (!isNaN(custom) && custom >= 0) ? custom : 0;
      total += rate * nights;
    }
  } else if (isCompany) {
    // Per-pracownik "Za osobę": rate = g.dailyRate (jeśli ustawiona) albo pricePerEmployee z cennika pokoju.
    // billingMode="room" zostawiamy jako legacy fallback do basePrice dla starych rezerwacji.
    total = selectedRooms.reduce((sum, rid) => {
      const r = loc.rooms.find(x=>x.id===rid);
      if (!r) return sum;
      const assigned = state.guests.filter(g => g.assignedRoom === rid);
      const orphans = (rid === selectedRooms[0]) ? state.guests.filter(g => !g.assignedRoom) : [];
      const inRoom = [...assigned, ...orphans];
      let perDay = 0;
      for (const g of inRoom) {
        const custom = parseFloat(g.dailyRate);
        if (!isNaN(custom) && custom >= 0) { perDay += custom; continue; }
        const defaultRate = (g.billingMode === "room") ? (r.basePrice || 0) : (r.pricePerEmployee || 0);
        perDay += defaultRate;
      }
      return sum + perDay * nights;
    }, 0);
  } else {
    total = calcTotal(room, nights, state.guests);
  }
  // Krótki opis przeliczenia
  let breakdownTxt = "";
  if (hasCustom) {
    breakdownTxt = selectedRooms.length > 1 ? `zł${customPriceNum} × ${selectedRooms.length} pokoi (cena nadpisana per pokój)` : `cena nadpisana: zł${customPriceNum}`;
  } else if (hasGuestRatesIndiv) {
    breakdownTxt = `Per-gość: ${state.guests.length} ${state.guests.length===1?"osoba":"osób"} × ${nights} ${nw(nights)} (każdy gość rozliczany osobno)`;
  } else if (isCompany) {
    const roomCount = state.guests.filter(g => g.billingMode !== "employee").length;
    const empCount  = state.guests.filter(g => g.billingMode === "employee").length;
    const parts = [];
    if (roomCount > 0) parts.push(`${roomCount}× zł${room?.basePrice||0}/doba (za pokój)`);
    if (empCount > 0)  parts.push(`${empCount}× zł${room?.pricePerEmployee||0}/doba (za pracownika)`);
    breakdownTxt = (parts.join(" + ") || "—") + ` × ${nights} ${nw(nights)}`;
  } else {
    breakdownTxt = buildBreakdown(room, nights, state.guests);
  }

  return `
    <div class="price-box">
      <div>
        <div class="price-lbl">
          ${isCompany ? `<span style="background:var(--blue);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px;margin-right:6px;font-weight:600">${ICONS.building(11)} ${esc(state.companyName)}</span>` : ""}
          ${room?esc(room.name):""}${isCompany && selectedRooms.length > 1 ? ` <span style="color:var(--text3);font-weight:500">+${selectedRooms.length-1} ${selectedRooms.length-1===1?"pokój":selectedRooms.length-1<5?"pokoje":"pokoi"}</span>` : ""} · ${fmtDate(state.calStart)} → ${fmtDate(state.calEnd)}
        </div>
        <div class="price-breakdown">${breakdownTxt}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px;font-style:italic">Cena wstępna — przeliczana po wpisaniu faktycznego pobytu w Raportach</div>
      </div>
      <div class="price-val">zł${total.toLocaleString()}</div>
    </div>

    <div class="buffer-field">
      <label>Nadpisz cenę finalną (opcjonalne)</label>
      <input type="number" id="customPriceInput" min="0" step="0.01" value="${esc(state.customPrice)}" placeholder="np. 1200 — zostaw puste żeby liczyć z cennika" />
      <div class="buffer-hint">${isCompany && selectedRooms.length > 1 ? "Wartość zapisze się dla każdego z wybranych pokoi (jako cena finalna per pokój)." : "Jeśli wypełnisz, zostanie zapisana jako finalna cena rezerwacji."} Edytowalne potem w Raportach. <strong>Stawka VAT wybrana niżej zostanie zaaplikowana</strong>.</div>
    </div>

    <div class="buffer-field">
      <label>Dni blokady po wyjeździe (sprzątanie)</label>
      <input type="number" id="bufferInput" min="0" max="30" value="${state.bufferDays}" placeholder="0" />
      <div class="buffer-hint" id="bufferHint">Pokój zablokowany przez dodatkowe ${state.bufferDays||0} dni po wyjeździe.</div>
    </div>

    ${!isCompany ? `
    <div style="margin-bottom:14px;padding:10px 12px;background:${state.isPermanent?"var(--green-light)":"var(--surface2)"};border:1px solid ${state.isPermanent?"var(--green-mid)":"var(--border)"};border-radius:var(--radius)">
      <label class="checkbox-row" style="margin:0;cursor:pointer">
        <input type="checkbox" id="isPermanentInput" ${state.isPermanent?"checked":""} />
        <span style="display:inline-flex;align-items:center;gap:5px;vertical-align:-2px">${ICONS.house(14)}</span> Stały najemca — rezerwacja otwarta (bez konkretnej daty końca). Kończysz ręcznie z zakładki Raporty, system doliczy faktyczny okres.
      </label>
      ${state.isPermanent ? `
        <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--green-mid);display:flex;flex-direction:column;gap:6px">
          <label style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px">Tryb rozliczenia stałego najemcy</label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <label style="font-size:12px;color:var(--text);white-space:nowrap">Cena miesięczna (zł):</label>
            <input type="number" id="permanentMonthlyRateInput" min="0" step="0.01"
              value="${esc(state.permanentMonthlyRate)}"
              placeholder="np. 2500"
              style="width:130px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;outline:none" />
          </div>
          <div style="font-size:10px;color:var(--text3);font-style:italic">
            ${parseFloat(state.permanentMonthlyRate) > 0
              ? `Każdy kolejny miesiąc liczy się jako zł${parseFloat(state.permanentMonthlyRate)} (28/29/30/31 dni — bez różnicy). Stawka dodaje się do raportu na koniec każdego miesiąca.`
              : `Zostaw puste żeby liczyć za dobę z cennika pokoju. Wpisz kwotę żeby naliczać stałą stawkę miesięczną.`}
          </div>
        </div>` : ""}
    </div>` : ""}

    <div class="payment-section">
      <div class="payment-sec-title" style="display:flex;align-items:center;gap:6px">${ICONS.banknote(14)} Forma płatności</div>
      <div style="font-size:10px;color:var(--text2);margin-bottom:6px;">Metoda</div>
      <div class="pm-grid">
        <button class="pm-btn ${p.method==="invoice"?"sel":""}" data-method="invoice"><span class="pmi">${ICONS.receipt(14)}</span>Faktura</button>
        <button class="pm-btn ${p.method==="cash"?"sel":""}" data-method="cash"><span class="pmi">${ICONS.banknote(14)}</span>Gotówka</button>
        <button class="pm-btn ${p.method==="transfer"?"sel":""}" data-method="transfer"><span class="pmi">${ICONS.landmark(14)}</span>Przelew</button>
      </div>
      ${p.method ? `
        <div style="font-size:10px;color:var(--text2);margin-bottom:6px;">Termin płatności</div>
        <div class="timing-grid">
          <button class="timing-btn ${p.timing==="prepaid"?"sel":""}" data-timing="prepaid">Przed pobytem</button>
          <button class="timing-btn ${p.timing==="postpaid"?"sel":""}" data-timing="postpaid">Po pobycie</button>
        </div>` : ""}
      <p class="pay-info-note">💡 Faktyczną kwotę wpłaty wprowadzisz w zakładce Raporty po zameldowaniu gościa.</p>
    </div>

    ${isCompany && selectedRooms.length > 0 ? `
    <div style="margin-bottom:10px;padding:8px 12px;background:var(--blue-light);border-radius:var(--radius);font-size:11px;color:var(--blue);display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      <strong>Wybrane pokoje:</strong>
      ${selectedRooms.map(rid => {
        const r = loc.rooms.find(r=>r.id===rid);
        return r ? `<span style="font-variant-numeric:tabular-nums;background:var(--surface);padding:2px 7px;border-radius:99px;border:1px solid var(--blue-mid)">${esc(r.name)} (${r.beds})</span>` : '';
      }).join('')}
    </div>` : ""}

    <div class="guests-hdr">
      <span class="guests-lbl">${isCompany?"Pracownicy":"Goście"}</span>
      ${(() => {
        // Inline indykator obok nagłówka — żeby user widział status od razu przy edycji
        // listy gości (nie musi scrollować do footer banner'a).
        if (isCompany) {
          // Firmowa: pokaż "X nieprzypisanych" jeśli są tacy
          if (selectedRooms.length > 1) {
            const unassigned = state.guests.filter(g => !g.assignedRoom).length;
            if (unassigned > 0) {
              return `<span style="font-size:11px;color:var(--orange);background:var(--orange-light);border:1px solid var(--orange-border);padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:600">⚠️ ${unassigned} bez przypisania</span>`;
            }
          }
          return `<span style="font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:99px;margin-left:8px">${state.guests.length} ${state.guests.length===1?"prac.":"prac."}</span>`;
        }
        // Indywidualna: pokaż kapacytet vs liczba osób
        if (!room) return "";
        const physCap = room.capacity || 0;
        const need = state.guests.length;
        if (need <= physCap) {
          return `<span style="font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:99px;margin-left:8px">${need}/${physCap} ${need===1?"osoba":need<5?"osoby":"osób"}</span>`;
        }
        const over = need - physCap;
        return `<span style="font-size:11px;color:var(--orange);background:var(--orange-light);border:1px solid var(--orange-border);padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:600">⚠️ ${need}/${physCap} — o ${over} za dużo</span>`;
      })()}
      <button class="add-guest-btn" id="addGuestBtn">+ Dodaj ${isCompany?"pracownika":"gościa"}</button>
    </div>

    ${state.guests.map((g,i) => `
      <div class="guest-card">
        <div class="guest-card-hdr">
          <span class="guest-num">${isCompany?`Pracownik ${i+1}`:`Gość ${i+1}`}</span>
          ${i>0?`<button class="remove-btn" data-remove="${i}">🗑 Usuń</button>`:""}
        </div>
    ${isCompany ? `
      <div class="field-row">
        <div class="field-wrap"><label>Imię i nazwisko</label><input type="text" data-guest="${i}" data-field="name" value="${esc(g.name)}" placeholder="Imię i nazwisko" autocomplete="off" /></div>
        <div class="field-wrap"><label>Telefon</label><input type="tel" data-guest="${i}" data-field="phone" value="${esc(g.phone)}" placeholder="+48 …" /></div>
      </div>
      ${(() => {
        const assignedR = loc.rooms.find(r => r.id === g.assignedRoom);
        const ppe = assignedR?.pricePerEmployee || 0;
        // "Za osobę": rozliczenie zawsze per pracownik. Default rate = pricePerEmployee z cennika.
        const defaultRate = ppe;
        const noPriceWarning = assignedR && defaultRate === 0 && (g.dailyRate == null || g.dailyRate === "");
        return `
        <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:6px;margin-top:8px;align-items:end">
          <div class="field-wrap">
            <label>Pokój</label>
            <select data-guest="${i}" data-field="assignedRoom" style="padding:7px 9px;border:1px solid ${!g.assignedRoom ? "var(--orange-border)" : "var(--border)"};border-radius:var(--radius);background:${!g.assignedRoom ? "var(--orange-light)" : "var(--surface2)"};font-size:12px;color:var(--text);font-family:inherit;outline:none;width:100%">
              <option value="">— wybierz —</option>
              ${(state.selectedRooms||[]).map(rid => {
                const r = loc.rooms.find(r=>r.id===rid);
                if (!r) return '';
                // Ile pracowników jest już przypisanych do tego pokoju (BEZ obecnego)
                const assignedToThis = state.guests.filter((og, oi) => oi !== i && og.assignedRoom === rid).length;
                const isFull = assignedToThis >= r.capacity;
                const isCurrent = g.assignedRoom === rid;
                // Disable opcji gdy pokój pełny i nie jest to aktualnie wybrana opcja
                const dis = isFull && !isCurrent ? 'disabled' : '';
                const occ = `${assignedToThis + (isCurrent ? 1 : 0)}/${r.capacity}`;
                const label = `${esc(r.name)} · ${r.beds} · ${occ}${isFull && !isCurrent ? ' (pełny)' : ''}`;
                return `<option value="${rid}" ${isCurrent?"selected":""} ${dis}>${label}</option>`;
              }).join('')}
            </select>
          </div>
          <div class="field-wrap">
            <label>Cena / osobę / doba (zł)</label>
            <input type="number" data-guest="${i}" data-field="dailyRate" min="0" step="0.01"
              value="${g.dailyRate != null && g.dailyRate !== "" ? esc(g.dailyRate) : ""}"
              placeholder="${defaultRate || "0"}"
              style="padding:7px 9px;border:1px solid ${noPriceWarning?"var(--orange-border)":"var(--border)"};border-radius:var(--radius);background:${noPriceWarning?"var(--orange-light)":"var(--surface2)"};font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;outline:none;width:100%" />
          </div>
        </div>
        <div style="font-size:10px;color:${noPriceWarning?"var(--orange)":"var(--text3)"};font-style:italic;margin-top:4px">
          ${g.dailyRate != null && g.dailyRate !== ""
            ? `Stawka nadpisana indywidualnie: zł${esc(g.dailyRate)} × dni za tego pracownika.`
            : noPriceWarning
              ? `⚠️ Brak ceny "za osobę" w cenniku pokoju — uzupełnij w Ustawieniach albo wpisz stawkę ręcznie.`
              : assignedR
                ? `Domyślnie zł${defaultRate}/osobę/dobę (z cennika pokoju). Wpisz inną kwotę żeby nadpisać per pracownik.`
                : `Wybierz pokój żeby zobaczyć cennik`}
        </div>`;
      })()}
      <label class="checkbox-row" style="margin-top:8px;padding:8px 10px;background:${g.isPermanent?"var(--green-light)":"var(--surface2)"};border:1px solid ${g.isPermanent?"var(--green-mid)":"var(--border)"};border-radius:var(--radius);cursor:pointer">
        <input type="checkbox" data-guest="${i}" data-field="isPermanent" ${g.isPermanent?"checked":""} />
        <span style="display:inline-flex;align-items:center;gap:5px;vertical-align:-2px">${ICONS.house(14)}</span> Stały najemca — otwarta rezerwacja, kończysz ręcznie z raportów
      </label>
    ` : `
          <div class="field-row">
            <div class="field-wrap"><label>Imię i nazwisko *</label><input type="text" data-guest="${i}" data-field="name" value="${esc(g.name)}" placeholder="Imię i nazwisko" autocomplete="off" /></div>
            <div class="field-wrap"><label>Telefon</label><input type="tel" data-guest="${i}" data-field="phone" value="${esc(g.phone)}" placeholder="+48 …" /></div>
          </div>
          <label class="checkbox-row">
            <input type="checkbox" data-guest="${i}" data-field="isAdult" ${g.isAdult?"checked":""} />
            Dorosły (3 lata+)
          </label>
          ${(() => {
            const isChild = !g.isAdult;
            const defaultRate = isChild ? (room?.extraPerChild || 0) : (room?.basePrice || 0);
            const hasRate = g.dailyRate != null && g.dailyRate !== "" && !isNaN(parseFloat(g.dailyRate));
            // Sprawdź czy inni goście mają wpisane — jeśli tak, jesteśmy w per-gość mode
            const anyOtherHasRate = state.guests.some((og, oi) => oi !== i && og.dailyRate != null && og.dailyRate !== "" && !isNaN(parseFloat(og.dailyRate)));
            const inPerGuestMode = hasRate || anyOtherHasRate;
            return `
            <div class="field-wrap" style="margin-top:8px">
              <label>Cena / osobę / doba (zł) — opcjonalne</label>
              <input type="number" data-guest="${i}" data-field="dailyRate" min="0" step="0.01"
                value="${hasRate ? esc(g.dailyRate) : ""}"
                placeholder="np. ${defaultRate || 50}"
                style="padding:7px 9px;border:1px solid ${inPerGuestMode && !hasRate ? "var(--red)" : "var(--border)"};border-radius:var(--radius);background:${inPerGuestMode && !hasRate ? "var(--red-light, #fee)" : "var(--surface2)"};font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;outline:none;width:100%" />
              <div style="font-size:10px;color:${inPerGuestMode && !hasRate ? "var(--red)" : (isChild && hasRate ? "var(--orange)" : "var(--text3)")};font-style:italic;margin-top:4px">
                ${hasRate
                  ? (isChild
                    ? `⚠️ Stawka ręczna dla <strong>dziecka</strong>: zł${esc(g.dailyRate)}/doba × ${nights} ${nw(nights)} = zł${(parseFloat(g.dailyRate)*nights).toLocaleString()}. Nadpisuje cennik dziecięcy.`
                    : `Stawka ręczna: zł${esc(g.dailyRate)}/doba × ${nights} ${nw(nights)} = zł${(parseFloat(g.dailyRate)*nights).toLocaleString()}.`)
                  : (inPerGuestMode
                    ? `❌ <strong>UWAGA</strong>: inny gość ma wpisaną stawkę → cała rezerwacja w trybie per-gość. Ten gość bez wpisanej stawki liczy się jako <strong>0 zł</strong>. Wpisz stawkę albo wyczyść pola innym gościom.`
                    : `Puste = liczone z cennika (basePrice + extraPerAdult/Child). Wpisanie kwoty <strong>komukolwiek</strong> przełącza całą rezerwację na tryb per-gość — wtedy puste pola = 0 zł.`)}
              </div>
            </div>`;
          })()}
        `}
      </div>`).join("")}
    ${(() => {
      // v3.51 — blok wyboru VAT przeniesiony na DÓŁ formularza (przed zatwierdzeniem).
      const vRate = state.vatRate || "8";
      const vRateNum = parseInt(vRate);
      const netto = total > 0 ? total / (1 + vRateNum/100) : 0;
      const vatAmt = total - netto;
      return `
      <div class="buffer-field" style="background:var(--blue-light);border-color:var(--blue-mid)">
        <label>Stawka VAT</label>
        <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
          <label class="checkbox-row" style="margin:0;cursor:pointer">
            <input type="checkbox" id="vat8" ${vRate==="8"?"checked":""} data-vat="8" />
            <strong>8% VAT</strong> (krótkoterminowe zakwaterowanie)
          </label>
          <label class="checkbox-row" style="margin:0;cursor:pointer">
            <input type="checkbox" id="vat23" ${vRate==="23"?"checked":""} data-vat="23" />
            <strong>23% VAT</strong> (najem długoterminowy / inne usługi)
          </label>
        </div>
        ${total > 0 ? `<div style="font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;padding-top:6px;border-top:1px dashed var(--blue-mid)">
          Brutto: <strong>zł${total.toLocaleString()}</strong> &nbsp;·&nbsp;
          Netto: <strong>zł${netto.toFixed(2)}</strong> &nbsp;·&nbsp;
          VAT ${vRate}%: <strong>zł${vatAmt.toFixed(2)}</strong>
        </div>` : ""}
      </div>`;
    })()}`;
}

function buildFooter() {
  const isCompany = state.bookingType==="company";
  const selectedRooms = (state.selectedRooms && state.selectedRooms.length > 0) ? state.selectedRooms : (state.selectedRoom ? [state.selectedRoom] : []);
  const hasName = isCompany ? state.guests.length > 0 : state.guests.some(g=>g.name.trim().length>0);
  // Walidacja firmy multi-room: każdy pracownik musi mieć assignedRoom
  // (single-room: nie wymagamy — wiadomo gdzie idzie)
  let assignmentError = "";
  let allAssigned = true;
  if (isCompany && selectedRooms.length > 1) {
    // Gość jest "nieprzypisany" jeśli: a) brak assignedRoom, ALBO
    // b) assignedRoom wskazuje na pokój spoza selectedRooms (stale po backBtn
    //    + zmianie wyboru pokoi). Dropdown listuje tylko aktualne — więc
    //    stary assignedRoom = "101" przy nowych selectedRooms ["103","104"]
    //    nie pokazuje się jako wybór, ale w danych zostaje.
    const unassigned = state.guests
      .map((g, i) => ({ g, i }))
      .filter(({ g }) => !g.assignedRoom || !selectedRooms.includes(g.assignedRoom));
    if (unassigned.length > 0) {
      allAssigned = false;
      const names = unassigned.map(({ g, i }) => g.name.trim() || `Pracownik ${i+1}`).join(", ");
      // Sprawdź czy fizycznie da się przypisać — czy jest miejsce
      const totalFreeBeds = state.calStart && state.calEnd
        ? selectedRooms.reduce((s, rid) => s + getFreeBeds(rid, state.calStart, state.calEnd), 0)
        : selectedRooms.reduce((s, rid) => {
            const loc = DATA.locations.find(l => l.rooms.some(r => r.id === rid));
            const r = loc?.rooms.find(x => x.id === rid);
            return s + (r?.capacity || 0);
          }, 0);
      const totalGuests = state.guests.length;
      const noSpace = totalGuests > totalFreeBeds;
      // Pokaż OBA komunikaty gdy oba aktualne — "za mało miejsc" (jeśli nie ma) + lista
      // konkretnych nieprzypisanych. Tak user wie ile brakuje i kogo dotyczy.
      if (noSpace) {
        const over = totalGuests - totalFreeBeds;
        assignmentError = `<div style="font-size:12px;color:var(--red);padding:10px 12px;background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--radius);margin-bottom:8px;display:flex;gap:8px;align-items:flex-start">
          <span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(15)}</span>
          <div><strong>Za mało miejsc w wybranych pokojach.</strong><br>
          Pracowników: <strong>${totalGuests}</strong>, dostępnych łóżek (suma): <strong>${totalFreeBeds}</strong>. Brakuje miejsca dla <strong>${over}</strong> ${over===1?"osoby":over<5?"osób":"osób"}.<br>
          <span style="color:var(--text2);font-style:italic">Wróć i dodaj kolejny pokój albo usuń ${over} ${over===1?"pracownika":"pracowników"}.</span></div>
        </div>
        <div style="font-size:11px;color:var(--orange);padding:6px 10px;background:var(--orange-light);border:1px solid var(--orange-border);border-radius:var(--radius);margin-bottom:8px">⚠️ Nieprzypisani: <strong>${esc(names)}</strong></div>`;
      } else {
        assignmentError = `<div style="font-size:11px;color:var(--orange);padding:6px 10px;background:var(--orange-light);border:1px solid var(--orange-border);border-radius:var(--radius);margin-bottom:8px">⚠️ Przypisz do pokoju: <strong>${esc(names)}</strong></div>`;
      }
    }
  }

  // KAPACYTET — sprawdź wolne łóżka w wybranym okresie:
  // - Firmowa: blokuje (czerwony banner, disable confirm)
  // - Indywidualna (też stały najemca): tylko ostrzega (pomarańczowy banner, nadal można
  //   rezerwować — rodzina może być większa niż "oficjalna" capacity pokoju)
  let capacityWarning = "";
  let withinCapacity = true;  // tylko firmowa blokuje
  // Dla permanent calEnd to placeholder (calStart+1) — używamy go jako fallback range,
  // ale dodatkowo zawsze porównujemy do room.capacity (fizyczny limit pokoju).
  if (state.calStart && selectedRooms.length > 0) {
    if (!isCompany) {
      // Indywidualna (zwykła + stały najemca) — soft warning na dole
      const roomId = selectedRooms[0];
      const loc = DATA.locations.find(l => l.rooms.some(r => r.id === roomId));
      const r = loc?.rooms.find(x => x.id === roomId);
      const physCap = r?.capacity || 0;
      // Free beds w wybranym okresie (jeśli calEnd nieustawiony, użyj calStart+1 jako placeholder).
      const endForCheck = state.calEnd || toStr(addDays(parseDate(state.calStart), 1));
      const freeInPeriod = getFreeBeds(roomId, state.calStart, endForCheck);
      // Effective free = min z period-check i fizycznej pojemności (capacity to twardy limit
      // niezależnie od dat). Dla NEW booking bez konfliktów free=capacity zwykle.
      const free = Math.min(freeInPeriod, physCap);
      const need = state.guests.length;
      if (need > free) {
        const isPermFlow = !!state.isPermanent;
        capacityWarning = `<div style="font-size:12px;color:var(--orange);padding:10px 12px;background:var(--orange-light);border:1.5px solid var(--orange-border);border-radius:var(--radius);margin-bottom:10px;display:flex;gap:8px;align-items:flex-start">
          <span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(15)}</span>
          <div>
            <strong>Uwaga — przekroczona pojemność pokoju${isPermFlow ? " (stały najemca)" : ""}.</strong><br>
            Wpisanych ${isPermFlow ? "najemców" : "gości"}: <strong>${need}</strong>, wolnych łóżek: <strong>${free}</strong> (fizyczna pojemność pokoju: ${physCap}).
            ${need - free === 1 ? ` Jest o ${need-free} osobę za dużo` : ` Jest o ${need-free} osoby za dużo`}.<br>
            <span style="color:var(--text2);font-style:italic">Możesz kontynuować mimo to (np. rodzina śpi razem w jednym łóżku) — system tylko ostrzega. Później możesz to edytować w Raportach.</span>
          </div>
        </div>`;
      }
    } else if (state.calEnd) {
      // Firmowa — wymaga calEnd (zawsze ustawione w firmowym flow)
      if (selectedRooms.length > 1) {
        // Multi-room — per pokój
        const perRoom = {};
        state.guests.forEach(g => {
          if (g.assignedRoom) perRoom[g.assignedRoom] = (perRoom[g.assignedRoom] || 0) + 1;
        });
        const overRooms = [];
        for (const rid of selectedRooms) {
          const free = getFreeBeds(rid, state.calStart, state.calEnd);
          const assigned = perRoom[rid] || 0;
          if (assigned > free) {
            const loc = DATA.locations.find(l => l.rooms.some(r => r.id === rid));
            const r = loc?.rooms.find(x => x.id === rid);
            overRooms.push({ name: r?.name || rid, assigned, free });
          }
        }
        if (overRooms.length > 0) {
          withinCapacity = false;
          capacityWarning = `<div style="font-size:12px;color:var(--red);padding:10px 12px;background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--radius);margin-bottom:10px;display:flex;gap:8px;align-items:flex-start">
            <span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(15)}</span>
            <div><strong>Brak miejsc w pokojach:</strong> ${overRooms.map(o => `${esc(o.name)} (${o.assigned} prac., ${o.free} wolnych)`).join(", ")}. Przenieś pracowników albo wybierz inny pokój.</div>
          </div>`;
        }
      } else {
        // Firmowa single-room
        const roomId = selectedRooms[0];
        const free = getFreeBeds(roomId, state.calStart, state.calEnd);
        if (state.guests.length > free) {
          withinCapacity = false;
          capacityWarning = `<div style="font-size:12px;color:var(--red);padding:10px 12px;background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--radius);margin-bottom:10px;display:flex;gap:8px;align-items:flex-start">
            <span style="flex-shrink:0;margin-top:1px">${ICONS.alertTriangle(15)}</span>
            <div><strong>Brak miejsc w pokoju:</strong> ${state.guests.length} pracowników, ${free} ${free===1?"wolne łóżko":free<5?"wolne łóżka":"wolnych łóżek"}. Wybierz większy pokój albo wróć i dodaj kolejny.</div>
          </div>`;
        }
      }
    }
  }

  const canConfirm = hasName && allAssigned && withinCapacity;
  return `
    ${assignmentError}
    ${capacityWarning}
    <div class="modal-footer">
      <button class="btn-back" id="backBtn">← Wróć</button>
      <button class="btn-confirm" id="confirmBtn" ${!canConfirm?"disabled":""}>Potwierdź rezerwację</button>
    </div>`;
}

function buildSuccess(loc) {
  const last = savedBookings[savedBookings.length-1];
  if (!last) return "";
  const nights = diffDays(last.from, last.to);
  const room = loc.rooms.find(r=>r.id===last.roomId);
  const isCompany = last.bookingType==="company";
  // v3.58 — firmowa multi-pokój tworzy N rekordów (po jednym na pokój). Podsumowanie liczymy
  // ZA CAŁĄ FIRMĘ (suma wszystkich nowych pokoi), a nie tylko za ostatni pokój.
  const isCompanyMulti = isCompany && state.selectedRooms?.length > 1;
  const newBookings = isCompanyMulti ? savedBookings.slice(-state.selectedRooms.length) : [last];
  // v3.58 — wartość per pokój: cena nadpisana (customPrice) jeśli ustawiona, inaczej wyliczona.
  // customPrice zapisuje się PER POKÓJ (patrz buildConfirm: customPrice × liczba pokoi), więc
  // suma per-pokój daje poprawne podsumowanie za całą firmę — spójne z ekranem potwierdzenia.
  const total = newBookings.reduce((s, bk) => {
    const rm = loc.rooms.find(r => r.id === bk.roomId);
    const cp = parseFloat(bk.customPrice);
    return s + ((!isNaN(cp) && cp > 0) ? cp : calcBookingTotal(bk, rm, diffDays(bk.from, bk.to)));
  }, 0);
  const who = isCompany
    ? `${last.companyName} (${last.guests.length} os.${isCompanyMulti ? `, ${newBookings.length} pokoi` : ""})`
    : (last.guests.find(g=>g.name.trim())?.name || "—");
  const pmLabels = { invoice:"Faktura", cash:"Gotówka", transfer:"Przelew" };
  const timLabels = { prepaid:"Przed pobytem", postpaid:"Po pobycie" };

  // v3.54 — info dla stałego najemcy: rozliczenie miesięczne, brak daty końca ("do odwołania"),
  // wstępna wartość (custom price albo stawka miesięczna).
  const isPerm = last.isPermanent && last.bookingType !== "company";
  const permMonthly = parseFloat(last.permanentMonthlyRate);
  const hasPermMonthly = isPerm && !isNaN(permMonthly) && permMonthly > 0;
  const permStart = last.permanentStart || last.from;
  const customPriceVal = parseFloat(last.customPrice);
  const hasCustomPrice = !isNaN(customPriceVal) && customPriceVal > 0;

  // For multi-room company bookings, show all booked rooms
  const allNewRooms = isCompany && state.selectedRooms?.length > 1
    ? state.selectedRooms.map(rid => loc.rooms.find(r=>r.id===rid)).filter(Boolean)
    : null;

  return `
    <div class="success-box">
      <div class="success-icon" style="display:inline-flex;color:var(--green)">${ICONS.checkCircle(48)}</div>
      <h2>${allNewRooms ? `${allNewRooms.length} pokoje zarezerwowane!` : "Pokój zarezerwowany!"}</h2>
      <p>Blokada zapisana. Faktyczny pobyt i wpłaty wprowadź w Raportach.</p>
      <div class="success-detail">
        <div class="success-row"><span>Obiekt</span><span>${esc(loc.name)}, ${esc(loc.city)}</span></div>
        ${allNewRooms
          ? `<div class="success-row"><span>Pokoje</span><span>${allNewRooms.map(r=>esc(r.name)).join(", ")}</span></div>`
          : `<div class="success-row"><span>Pokój</span><span>${room?esc(room.name):""}</span></div>`}
        ${isPerm
          ? `<div class="success-row"><span>Najem od</span><span>${fmtDate(permStart)}</span></div>
             <div class="success-row"><span>Najem do</span><span>${last.permanentEnd ? fmtDate(last.permanentEnd) : `<strong style="color:var(--green)">do odwołania</strong>`}</span></div>
             <div class="success-row"><span>Rozliczenie</span><span style="display:inline-flex;align-items:center;gap:5px">${ICONS.house(13)} ${hasPermMonthly ? `Miesięczne · <strong>zł${permMonthly}/mies.</strong>` : "Za dobę (wg cennika)"}</span></div>`
          : `<div class="success-row"><span>Blokada od</span><span>${fmtDate(last.from)}</span></div>
             <div class="success-row"><span>Blokada do</span><span>${fmtDate(last.to)}</span></div>
             <div class="success-row"><span>Nocy</span><span>${nights} ${nw(nights)}</span></div>
             ${last.bufferDays>0?`<div class="success-row"><span>Bufor</span><span>+${last.bufferDays} dni</span></div>`:""}`}
        <div class="success-row"><span>Typ</span><span style="display:inline-flex;align-items:center;gap:5px">${isPerm?ICONS.house(13):isCompany?ICONS.building(13):ICONS.user(13)} ${isPerm?"Stały najemca":isCompany?"Firmowa":"Indywidualna"}</span></div>
        <div class="success-row"><span>${isCompany?"Firma":"Gość"}</span><span>${esc(who)}</span></div>
        ${last.payment?.method?`<div class="success-row"><span>Płatność</span><span>${pmLabels[last.payment.method]||"—"} · ${timLabels[last.payment.timing]||"—"}</span></div>`:""}
        <div class="success-row"><span>Wstępna wartość</span><span>${isCompanyMulti ? `zł${total.toLocaleString()}` : (hasCustomPrice ? `zł${customPriceVal.toLocaleString()}` : (hasPermMonthly ? `zł${permMonthly.toLocaleString()}/mies.` : `zł${total.toLocaleString()}`))}</span></div>
      </div>
      <button class="done-btn" id="doneBtn">Gotowe</button>
    </div>`;
}

// Mini calendar for edit modal — shows booked days highlighted
function buildMiniCalForRoom(roomId, currentFrom, currentTo, excludeId) {
  const today = todayStr();
  const vm = state.editCalMonth || new Date();
  const year = vm.getFullYear(), month = vm.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const em = state.editModal;
  const actualSet = new Set(em?.actualDays || []);
  const hasActual = actualSet.size > 0;

  let cells = "";
  for (let i=0; i<firstDay; i++) cells += `<div style="aspect-ratio:1"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const inCurrent = currentFrom && currentTo && ds >= currentFrom && ds < currentTo;
    const inActual = actualSet.has(ds);
    const isBlocked = isDayBlocked(ds, roomId) && !inCurrent;
    const isToday = ds === today;

    let bg = "transparent", color = "var(--text)", fw = "400", border = "none", title = "";

    if (isBlocked) { bg="var(--red-light)"; color="var(--red)"; }

    if (inCurrent && !hasActual) {
      bg = "var(--blue-mid)"; color = "var(--text)";
    } else if (inCurrent && inActual) {
      bg = "var(--green-light)"; color = "var(--green)"; fw = "600";
      title = "Zarezerwowane i faktyczne";
    } else if (inCurrent && !inActual) {
      bg = "var(--blue-mid)"; color = "var(--text2)"; title = "Zarezerwowane (bez faktycznego)";
    } else if (inActual && !inCurrent) {
      bg = "var(--orange-light)"; color = "var(--orange)"; fw = "600"; border = "1px solid var(--orange-border)";
      title = "Poza rezerwacją (pobyt przedłużony)";
    }

    if (ds === currentFrom) { bg="var(--blue)"; color="#fff"; fw="700"; border="2px solid var(--blue-dark)"; }
    if (isToday && !inCurrent && !isBlocked && !inActual) { fw="700"; color="var(--blue)"; bg="transparent"; }

    cells += `<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:4px;background:${bg};color:${color};font-weight:${fw};border:${border};cursor:default" title="${title}">${d}</div>`;
  }

  // Legend
  let legendItems = `
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--blue);margin-right:3px"></span>Blokada</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--red-light);border:1px solid var(--red-border);margin-right:3px"></span>Inna rez.</span>`;
  if (hasActual) {
    legendItems += `
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green-light);border:1px solid var(--green-mid);margin-right:3px"></span>Pokrycie</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--orange-light);border:1px solid var(--orange-border);margin-right:3px"></span>Poza rez.</span>`;
  }

  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <button class="cal-nav-btn" id="editCalPrev" style="padding:3px 8px;font-size:12px">‹</button>
        <span style="font-size:12px;font-weight:700">${MONTHS[month]} ${year}</span>
        <button class="cal-nav-btn" id="editCalNext" style="padding:3px 8px;font-size:12px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px">
        ${DAYS_S.map(d=>`<div style="font-size:9px;color:var(--text3);text-align:center;padding:2px 0;font-weight:600">${d}</div>`).join("")}
        ${cells}
      </div>
      <div style="display:flex;gap:10px;font-size:10px;color:var(--text3);flex-wrap:wrap">
        ${legendItems}
      </div>
    </div>`;
}

// ─── ACTUAL DAY PICKER ───────────────────────────────────────
function buildActualDayPicker(em) {
  const actualSet = new Set(em.actualDays || []);
  const calMonth = state.actualCalMonth || parseDate(em.from);
  const year = calMonth.getFullYear(), month = calMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  let cells = "";
  for (let i = 0; i < firstDay; i++) cells += `<div style="aspect-ratio:1"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    // Bez limitu — każdy dzień od początku rezerwacji w przód jest klikalny.
    // Dni przed datą rezerwacji pozostają nieklikalne.
    const inRange = ds >= em.from;
    const inReservation = ds >= em.from && ds < em.to;
    const isSelected = actualSet.has(ds);

    let bg, color, fw = "400", border = "none", cursor = "default";
    if (!inRange) {
      bg = "transparent"; color = "var(--text4,var(--text3))";
    } else if (isSelected && inReservation) {
      bg = "var(--green)"; color = "#fff"; fw = "700"; cursor = "pointer";
    } else if (isSelected) {
      bg = "var(--orange)"; color = "#fff"; fw = "700"; border = "1px solid var(--orange-border)"; cursor = "pointer";
    } else if (inReservation) {
      bg = "var(--blue-mid)"; color = "var(--text2)"; cursor = "pointer";
    } else {
      bg = "var(--surface)"; color = "var(--text3)"; cursor = "pointer";
    }

    cells += `<div data-actual-day="${ds}" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:4px;background:${bg};color:${color};font-weight:${fw};border:${border};cursor:${cursor}">${d}</div>`;
  }

  return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <button class="cal-nav-btn" id="actualCalPrev" style="padding:3px 8px;font-size:12px">‹</button>
      <span style="font-size:12px;font-weight:700">${MONTHS[month]} ${year}</span>
      <button class="cal-nav-btn" id="actualCalNext" style="padding:3px 8px;font-size:12px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
      ${DAYS_S.map(d=>`<div style="font-size:9px;color:var(--text3);text-align:center;padding:2px 0;font-weight:600">${d}</div>`).join("")}
      ${cells}
    </div>
    <div style="display:flex;gap:8px;font-size:10px;color:var(--text3);flex-wrap:wrap">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green);margin-right:3px"></span>Zaznaczony</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--blue-mid);margin-right:3px"></span>W rezerwacji</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--orange);margin-right:3px"></span>Poza rezerwacją</span>
    </div>
  </div>`;
}

// ─── EDIT MODAL ──────────────────────────────────────────────
function buildEditModal() {
  const em = state.editModal;
  const b = savedBookings.find(x=>x.id===em.bookingId);
  if (!b) return "";
  const loc = DATA.locations.find(l=>l.id===b.locId);
  const room = loc?.rooms.find(r=>r.id===b.roomId);
  const reservedNights = diffDays(em.from, em.to);
  const actualDays = em.actualDays || [];
  const actualNights = actualDays.length;
  const hasExtended = actualDays.some(d => d >= em.to);
  const guestList = em.guests || b.guests;

  return `
    <div class="edit-overlay" id="editOverlay">
      <div class="edit-modal">
        <div class="edit-modal-hdr">
          <h3 style="display:flex;align-items:center;gap:8px">${ICONS.pencil(18)} Edytuj rezerwację</h3>
          <button class="close-btn" id="editCloseBtn">${ICONS.x(16)}</button>
        </div>
        <div class="edit-modal-body">
          <div style="font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px">${loc ? locIcon(loc, 14) : ""} ${esc(loc?.name)} · ${esc(room?.name)}</div>

          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px">${ICONS.calendar(13)} Termin blokady</div>
          ${buildMiniCalForRoom(b.roomId, em.from, em.to, em.bookingId)}
          <div class="field-row" style="margin-bottom:12px">
            <div class="edit-field">
              <label>Blokada od</label>
              <input type="date" id="editFrom" value="${em.from}" />
            </div>
            <div class="edit-field">
              <label>Blokada do</label>
              <input type="date" id="editTo" value="${em.to}" />
            </div>
          </div>
          <div class="edit-field">
            <label>Dni blokady po wyjeździe</label>
            <input type="number" id="editBuffer" min="0" max="30" value="${em.bufferDays||0}" />
          </div>

          ${(() => {
            // Sekcja "Faktyczny pobyt" jest sensowna TYLKO dla pracowników/rezerwacji bez statusu stałego najemcy.
            // Dla bookingu firmowego: sprawdzamy ilu pracowników w tym pokoju NIE jest permanent.
            // Dla indywidualnego: sprawdzamy czy sam booking jest permanent.
            const isIndivPerm = b.bookingType !== "company" && (em.isPermanent ?? b.isPermanent);
            let regularGuests = [];
            let permanentGuests = [];
            if (b.bookingType === "company") {
              const inRoom = (em.guests || b.guests || []).filter(g => !g.assignedRoom || g.assignedRoom === b.roomId);
              regularGuests = inRoom.filter(g => !g.isPermanent);
              permanentGuests = inRoom.filter(g => g.isPermanent);
            }
            const hideActualSection = isIndivPerm || (b.bookingType === "company" && regularGuests.length === 0 && permanentGuests.length > 0);

            if (hideActualSection) {
              // Dla indywidualnego stałego — pokaż picker miesięcy zapłaty.
              if (isIndivPerm) {
                const monthly = parseFloat(em.permanentMonthlyRate ?? b.permanentMonthlyRate);
                const hasMonthly = !isNaN(monthly) && monthly > 0;
                const rateDesc = hasMonthly ? `zł${monthly}/mies.` : `wg cennika za dobę`;
                const activeMonths = getPermanentActiveMonths(b, b.from, null, null);
                const paidMonths = new Set(em.paidMonths !== undefined
                  ? (em.paidMonths || [])
                  : (b.paidMonths || []));
                // v3.55 — trasza: kwoty częściowe per miesiąc { "YYYY-MM": kwota }
                const partialMap = (em.partialPaid !== undefined ? em.partialPaid : (b.partialPaid || {})) || {};
                const now = new Date();
                const currentYm = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
                // Pro-rata context — używamy edytowanych dat (em.permanentEnd etc.)
                const previewPStart = b.permanentStart || em.from || b.from;
                const previewPEndRaw = (em.permanentEnd !== undefined ? em.permanentEnd : b.permanentEnd);
                const isOpenEnded = !previewPEndRaw;  // najemca "do odwołania"
                // v3.51 — miesiące do POKAZANIA w gridzie: od startu najmu do horyzontu.
                // Zamknięty najemca: do daty końca. Otwarty: do końca (bieżący rok + Dodaj rok).
                // Pozwala odhaczyć przyszłe miesiące (płatność z góry, też na lata).
                const extraYears = state.editModal.paidMonthsExtraYears || 0;
                const startYm = previewPStart.slice(0,7);
                let endYm = isOpenEnded ? `${now.getFullYear() + extraYears}-12` : previewPEndRaw.slice(0,7);
                // v3.52 — auto-rozszerz horyzont do najpóźniejszego ODHACZONEGO miesiąca, żeby
                // przedpłaty na przyszłość były zawsze widoczne (bez ręcznego "Dodaj rok" po ponownym
                // wejściu w edycję) i wliczane do "Suma zaznaczonych wpłat".
                const _paidSorted = [...paidMonths].filter(Boolean).sort();
                const _latestPaid = _paidSorted.length ? _paidSorted[_paidSorted.length - 1] : null;
                if (_latestPaid && _latestPaid > endYm) endYm = _latestPaid;
                // pEnd do PRO-RATY: otwarty → koniec zakresu wyświetlania (przyszłe miesiące = pełna
                // stawka, nie 0); zamknięty → faktyczna data końca.
                const [_ey, _em] = endYm.split("-").map(Number);
                const previewPEnd = previewPEndRaw || (_em === 12 ? `${_ey + 1}-01-01` : `${_ey}-${String(_em + 1).padStart(2, "0")}-01`);
                const displayMonths = [];
                { let yy = parseInt(startYm.slice(0,4)), mm = parseInt(startYm.slice(5,7));
                  const ey = parseInt(endYm.slice(0,4)), emo = parseInt(endYm.slice(5,7));
                  let guard = 0;
                  while ((yy < ey || (yy === ey && mm <= emo)) && guard++ < 600) {
                    displayMonths.push(`${yy}-${String(mm).padStart(2,"0")}`);
                    mm++; if (mm > 12) { mm = 1; yy++; }
                  }
                }
                // v3.59 — POKRYCIE KUMULACYJNE w pickerze (te same zasady co raporty): pełne
                // zaznaczenia (paidMonths) są zablokowane, wpłaty częściowe tworzą wspólną pulę
                // rozdzielaną FIFO (najstarsze najpierw), nadpłata spływa na kolejne miesiące.
                // Override amountPaid = cała kwota jako jedna pula (zaznaczenia ignorowane).
                const _ap = parseFloat(em.amountPaid !== undefined ? em.amountPaid : (b.payment?.amountPaid));
                const hasOverride = !isNaN(_ap) && _ap > 0;
                const previewDaily = (() => { const cd = parseFloat(em.dailyRate !== undefined ? em.dailyRate : b.dailyRate); return (!isNaN(cd) && cd >= 0) ? cd : (b.priceAtBooking?.basePrice ?? 0); })();
                const dueOfPv = (ym) => {
                  if (hasMonthly) return prorataMonthPrice(monthly, ym, previewPStart, previewPEnd);
                  const [yy, mm] = ym.split('-').map(Number);
                  const ms = toStr(new Date(yy, mm-1, 1)), me = toStr(new Date(yy, mm, 1));
                  const ds = ms > previewPStart ? ms : previewPStart, de = me < previewPEnd ? me : previewPEnd;
                  return ds < de ? previewDaily * diffDays(ds, de) : 0;
                };
                // v3.60 — TAG-THEN-SPILL (jak w raportach): każda wpłata pokrywa najpierw SWÓJ miesiąc,
                // nadwyżka spływa FIFO na pozostałe. Pula = override ALBO suma NADWYŻEK wpłat częściowych.
                let _pool = hasOverride ? _ap : displayMonths.reduce((s, ym) => {
                  if (paidMonths.has(ym)) return s;
                  const pa = parseFloat(partialMap[ym]); if (pa > 0) { const d = dueOfPv(ym); if (pa > d) return s + (pa - d); }
                  return s;
                }, 0);
                const receivedTotal = hasOverride ? _ap : displayMonths.reduce((s, ym) => {
                  if (paidMonths.has(ym)) return s + dueOfPv(ym);
                  const pa = parseFloat(partialMap[ym]); return s + (pa > 0 ? pa : 0);
                }, 0);
                // PASS 1 — każdy miesiąc pokrywa sam siebie (pełne zaznaczenie albo wpłata częściowa do należności).
                const _sorted = [...displayMonths].sort();
                const coverage = {};
                let coveredSum = 0, dueSum = 0;
                _sorted.forEach(ym => {
                  const due = dueOfPv(ym);
                  dueSum += due;
                  let covered = 0;
                  if (!hasOverride) {
                    if (paidMonths.has(ym)) covered = due;
                    else { const pa = parseFloat(partialMap[ym]); if (pa > 0) covered = Math.min(pa, due); }
                  }
                  coverage[ym] = { due, covered };
                });
                // PASS 2 — pula nadwyżek/override pokrywa pozostałe niedopłacone miesiące, FIFO od najstarszego.
                for (const ym of _sorted) {
                  if (_pool <= 0.0001) break;
                  const c = coverage[ym];
                  if (c.covered >= c.due - 0.01) continue;
                  const take = Math.min(_pool, c.due - c.covered);
                  c.covered += take; _pool -= take;
                }
                // Rozliczenie "do bież. miesiąca" — żeby otwarty najemca nie pokazywał ogromnej należności z przyszłości.
                let coveredToDate = 0, dueToDate = 0, pastDue = 0, pastCovered = 0;
                _sorted.forEach(ym => {
                  const c = coverage[ym]; c.fullyCovered = c.due <= 0.01 ? true : c.covered >= c.due - 0.01; coveredSum += c.covered;
                  if (ym <= currentYm) { coveredToDate += c.covered; dueToDate += c.due; }
                  if (ym < currentYm)  { pastDue += c.due; pastCovered += c.covered; }   // tylko przeszłe = realna zaległość (bieżący jeszcze trwa)
                });
                const leftover = _pool;   // nadpłata ponad wszystkie wyświetlone miesiące (zaliczka)
                const overdueAmt = Math.max(0, Math.round(pastDue) - Math.round(pastCovered));   // zaległość = niedopłata za PRZESZŁE miesiące
                const advanceAmt = Math.max(0, Math.round(receivedTotal) - Math.round(coveredToDate));  // wpłacone ponad należność do teraz = zaliczka na przyszłość
                // Zaległość = przeszły miesiąc niepokryty KUMULACYJNIE (item 4 — nierówne raty pokrywające łącznie należność nie liczą się jako zaległe).
                const overdue = displayMonths.filter(ym => ym < currentYm && !coverage[ym].fullyCovered);
                const byYear = {};
                displayMonths.forEach(ym => {
                  const [y, m] = ym.split("-");
                  if (!byYear[y]) byYear[y] = [];
                  byYear[y].push({ ym, m: parseInt(m) });
                });
                const monthGrid = Object.entries(byYear).map(([y, months]) => `
                  <div style="margin-bottom:10px">
                    <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">${y}</div>
                    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">
                      ${months.map(({ ym, m }) => {
                        const cov = coverage[ym];
                        const explicitFull = !hasOverride && paidMonths.has(ym);
                        const isCovered = cov.fullyCovered;              // pełne pokrycie (wprost lub kumulacyjnie z rat)
                        const isPartialCov = !isCovered && cov.covered > 0.01;
                        const isOverdue = ym < currentYm && !isCovered;
                        const isFuture = ym > currentYm;
                        const bg = isCovered ? "var(--green)" : (isPartialCov ? "var(--orange)" : (isOverdue ? "var(--red)" : (isFuture ? "var(--surface2)" : "var(--surface3)")));
                        const color = (isCovered || isOverdue || isPartialCov) ? "#fff" : "var(--text2)";
                        const info = prorataMonthInfo(ym, previewPStart, previewPEnd);
                        const subLabel = !hasMonthly
                          ? (isCovered ? "✓" : (isPartialCov ? `zł${Math.round(cov.covered)}` : ""))
                          : (isCovered ? `zł${Math.round(cov.due)}`
                            : (isPartialCov ? `zł${Math.round(cov.covered)}/${Math.round(cov.due)}`
                              : (info.isPartial ? `${info.daysUsed}/${info.daysInMonth}d · zł${Math.round(cov.due)}` : `zł${Math.round(cov.due)}`)));
                        const mark = (explicitFull || isCovered) ? ' ✓' : (isPartialCov ? ' ½' : (isOverdue ? ' !' : ''));
                        const title = explicitFull ? 'Zapłacone (pełna wpłata) — kliknij by cofnąć'
                          : isCovered ? 'Pokryte z wpłat (kumulacyjnie) — kliknij by oznaczyć pełną wpłatę wprost'
                          : isPartialCov ? `Częściowo pokryte zł${Math.round(cov.covered)} z zł${Math.round(cov.due)} — kliknij by oznaczyć pełną wpłatę`
                          : isOverdue ? 'ZALEGŁOŚĆ — brak pokrycia, kliknij gdy opłacone'
                          : isFuture ? 'Przyszły miesiąc — kliknij by zaznaczyć przedpłatę' : 'Bieżący — kliknij gdy opłacone';
                        return `<button class="paid-month-btn" data-paid-month="${ym}"
                          style="padding:8px 4px;font-size:11px;font-weight:700;border:1px solid var(--border);border-radius:var(--radius);background:${bg};color:${color};cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px"
                          title="${title}${hasMonthly && info.isPartial ? ` · pro-rata ${info.daysUsed}/${info.daysInMonth} dni` : ''}">
                          <span>${MONTHS[m-1].slice(0,3)}${mark}</span>
                          ${subLabel ? `<span style="font-size:9px;font-weight:500;opacity:0.85;font-variant-numeric:tabular-nums">${subLabel}</span>` : ""}
                        </button>`;
                      }).join("")}
                    </div>
                  </div>
                `).join("");

                // Lista miesięcy z wpłatą częściową (do edytora poniżej gridu)
                const partialList = Object.keys(partialMap).filter(ym => parseFloat(partialMap[ym]) > 0 && !paidMonths.has(ym)).sort();

                return `

function attachEditBtn(btn) {
  btn.addEventListener("click", () => {
    const b = savedBookings.find(x=>x.id===btn.dataset.edit);
    if (!b) return;
    // Initialize actualDays from existing data or range
    let actualDays = [];
    if (b.actualDays && b.actualDays.length > 0) {
      actualDays = [...b.actualDays];
    } else if (b.actualFrom && b.actualTo) {
      let d = parseDate(b.actualFrom);
      const end = parseDate(b.actualTo);
      while (d < end) { actualDays.push(toStr(d)); d = addDays(d, 1); }
    }
    state.editModal = {
      bookingId: b.id,
      from: b.from, to: b.to, bufferDays: b.bufferDays||0,
      actualDays,
      payMethod: b.payment?.method||"", payTiming: b.payment?.timing||"",
      amountPaid: b.payment?.amountPaid||"",
      billingMode: b.billingMode || "room",
      customPrice: b.customPrice != null ? String(b.customPrice) : "",
      isPermanent: !!b.isPermanent,
      permanentEnd: b.permanentEnd || null,
      guests: b.guests.map(g=>({...g}))
    };
    state.editCalMonth = parseDate(b.from);
    state.actualCalMonth = parseDate(b.from);
    render();
  });
}

function attachReportsEvents() {
  document.querySelectorAll("[data-edit]").forEach(btn => attachEditBtn(btn));
  document.querySelectorAll("[data-add-other]").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomId = btn.dataset.addOther;
      const period = btn.dataset.period;
      const key = getRoomMediaKey(roomId, period);
      if (!roomMedia[key]) roomMedia[key] = { electricity:0, gas:0, water:0, others:[], note:"" };
      if (!roomMedia[key].others) roomMedia[key].others = [];
      roomMedia[key].others.push({ label: `Inne ${roomMedia[key].others.length+1}`, amount: 0 });
      render();
    });
  });
  document.querySelectorAll("[data-remove-other]").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomId = btn.dataset.removeOther;
      const period = btn.dataset.period;
      const idx = parseInt(btn.dataset.otherIdx);
      const key = getRoomMediaKey(roomId, period);
      if (roomMedia[key]?.others) {
        roomMedia[key].others.splice(idx, 1);
        render();
      }
    });
  });
}

// ============================================================
// EVENTS — refactored to NOT call render() on text input
// ============================================================
function attachEvents() {
  // v3.11 — Mobile drawer: hamburger, close button, backdrop click, ESC, auto-close na nav-btn.
  // Body scroll lock żeby user nie scrolował tła gdy drawer otwarty.
  document.body.style.overflow = state.mobileNavOpen ? "hidden" : "";
  document.getElementById("hamburgerBtn")?.addEventListener("click", () => {
    state.mobileNavOpen = true; render();
  });
  document.getElementById("sidebarCloseBtn")?.addEventListener("click", () => {
    state.mobileNavOpen = false; render();
  });
  document.getElementById("mobileBackdrop")?.addEventListener("click", () => {
    state.mobileNavOpen = false; render();
  });

  // Tabs — auto-close drawer po wyborze (mobile UX)
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.dataset.tab) {
        state.activeTab = btn.dataset.tab;
        state.statusDetailLocId = null;
      }
      state.mobileNavOpen = false;  // zamknij drawer przy zmianie zakładki
      render();
    });
  });

  // Header search — live filter WITHOUT full re-render (patch only loc-grid)
  const si = document.getElementById("searchInput");
  if (si) {
    si.addEventListener("input", e => {
      state.search = e.target.value;
      // Patch just the locations pane content
      const pane = document.getElementById("pane-locations");
      if (pane) pane.innerHTML = buildLocations();
      // Re-attach loc card events
      document.querySelectorAll(".loc-card").forEach(card => {
        card.addEventListener("click", () => openModal(parseInt(card.dataset.locid)));
      });
    });
  }

  document.getElementById("themeToggle")?.addEventListener("click", toggleTheme);
  document.getElementById("printReportBtn")?.addEventListener("click", () => {
    state.printReport = { from: "", to: "" };
    render();
  });

  // Print report modal handlers
  document.getElementById("printReportCloseBtn")?.addEventListener("click", () => { state.printReport = null; render(); });
  document.getElementById("printReportCancelBtn")?.addEventListener("click", () => { state.printReport = null; render(); });
  document.getElementById("printReportGenerateBtn")?.addEventListener("click", () => {
    const fromEl = document.getElementById("printReportFrom");
    const toEl = document.getElementById("printReportTo");
    const errEl = document.getElementById("printReportError");
    const from = fromEl?.value, to = toEl?.value;
    if (!from || !to) {
      if (errEl) { errEl.textContent = "Uzupełnij obie daty."; errEl.style.display = "block"; }
      return;
    }
    if (from > to) {
      if (errEl) { errEl.textContent = "Data 'Od' musi być wcześniejsza lub równa dacie 'Do'."; errEl.style.display = "block"; }
      return;
    }
    // Date "to" inclusive od user perspective → exclusive end = to + 1 day
    const toExclusive = new Date(to); toExclusive.setDate(toExclusive.getDate() + 1);
    const html = generatePrintReport(from, toStr(toExclusive));
    if (!html) {
      if (errEl) { errEl.textContent = "Brak rezerwacji w wybranym zakresie."; errEl.style.display = "block"; }
      return;
    }
    state.printReport = null;
    state.printReportHtml = html;
    render();
    // Trigger systemowy print dialog po krótkiej pauzie żeby DOM się wyrenderował
    setTimeout(() => window.print(), 100);
  });

  // Print actions (na widoku raportu)
  document.getElementById("printReportClose")?.addEventListener("click", () => { state.printReportHtml = null; render(); });
  document.getElementById("printReportDo")?.addEventListener("click", () => window.print());

  // Loc cards
  document.querySelectorAll(".loc-card").forEach(card => {
    card.addEventListener("click", () => openModal(parseInt(card.dataset.locid)));
  });

  // Settings — no re-render on change, only on save
  document.querySelectorAll(".price-inp").forEach(inp => {
    inp.addEventListener("change", () => {
      DATA.locations.forEach(loc => {
        const room = loc.rooms.find(r=>r.id===inp.dataset.room);
        if (room) room[inp.dataset.field] = parseFloat(inp.value)||0;
      });
    });
  });
  document.getElementById("notesSearch")?.addEventListener("input", e => {
    state.notesSearch = e.target.value;
    render();
  });
  document.getElementById("notesFilter")?.addEventListener("change", e => {
    state.notesFilter = e.target.value;
    render();
  });

  // Search w Ustawieniach — full render
  document.getElementById("settingsSearch")?.addEventListener("input", e => {
    state.settingsSearch = e.target.value;
    render();
  });

  // Toggle collapse per obiekt
  document.querySelectorAll("[data-settings-toggle]").forEach(el => {
    el.addEventListener("click", () => {
      const locId = parseInt(el.dataset.settingsToggle);
      state.settingsCollapsed[locId] = !state.settingsCollapsed[locId];
      render();
    });
  });
  // Rozwiń/Zwiń wszystkie
  document.getElementById("settingsExpandAll")?.addEventListener("click", () => {
    state.settingsCollapsed = {};
    render();
  });
  document.getElementById("settingsCollapseAll")?.addEventListener("click", () => {
    DATA.locations.forEach(loc => { state.settingsCollapsed[loc.id] = true; });
    render();
  });
  // Filtr "tylko bez ceny"
  document.getElementById("settingsOnlyMissing")?.addEventListener("change", e => {
    state.settingsOnlyMissing = e.target.checked;
    render();
  });

  // Inputy cen — zapis do DATA (bez render, żeby nie tracić focusu)
  document.querySelectorAll(".price-inp").forEach(inp => {
    inp.addEventListener("change", () => {
      const roomId = inp.dataset.room;
      const field = inp.dataset.field;
      DATA.locations.forEach(loc => {
        const room = loc.rooms.find(r => r.id === roomId);
        if (room) room[field] = parseFloat(inp.value) || 0;
      });
    });
  });

      const reader = new FileReader();
      reader.onload = () => {
        state.imageCropModal = { locId, file, dataUrl: reader.result };
        render();
      };
      reader.readAsDataURL(file);
      // Reset input value żeby ten sam plik mógł być wybrany ponownie
      e.target.value = "";
    });
  });

  document.getElementById("imageCropCancelBtn")?.addEventListener("click", () => {
    state.imageCropModal = null;
    render();
  });
  document.getElementById("imageCropCloseBtn")?.addEventListener("click", () => {
    state.imageCropModal = null;
    render();
  });
  document.getElementById("imageCropConfirmBtn")?.addEventListener("click", async () => {
    const m = state.imageCropModal;
    if (!m) return;
    const fd = new FormData();
    fd.append("file", m.file);
    try {
      const result = await apiUploadFile("/api/locations/" + m.locId + "/image", fd);
      locImages[m.locId] = result.filename;
      state.imageCropModal = null;
      showToast("✅ Zdjęcie wgrane");
      render();
    } catch(err) {
      showToast("❌ Błąd uploadu: " + err.message);

  });
  // Usuń zdjęcie obiektu
  document.querySelectorAll("[data-loc-image-delete]").forEach(btn => {

        // Fallback: previous month from earliest
        const periods = getRoomMediaPeriods(roomId);
        const cp = currentPeriod();
        const existing = periods.includes(cp) ? periods : [cp, ...periods];
