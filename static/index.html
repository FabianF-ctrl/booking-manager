// Mapowanie typu obiektu (loc.icon emoji) → klucz w ICONS
const LOC_ICON_MAP = { '🏢': 'building', '🏠': 'house' };
function locIcon(loc, size) {
  const key = LOC_ICON_MAP[loc.icon] || 'building';
  return ICONS[key](size || 16);
}

// Strip emoji z stringa (dla legacy invoice.note typu "⚡ Prąd" - migracja w runtime)
function stripEmoji(s) {
  return (s || "").replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}]/gu, "").trim();
}

const MONTHS = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const MONTHS_S = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];
// Dopełniacz — używaj w datach typu "22 maja 2026" (gdy nazwa miesiąca stoi po dniu w prozie)
const MONTHS_GEN = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];
const DAYS_S = ["Nd","Pn","Wt","Śr","Cz","Pt","So"];

function parseDate(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function toStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function diffDays(a, b) { return Math.round((parseDate(b)-parseDate(a))/86400000); }
function fmtDate(s) { const d = parseDate(s); return `${d.getDate()} ${MONTHS_S[d.getMonth()]} ${d.getFullYear()}`; }
// Pełna forma PL dopełniacz: "22 maja 2026" — używaj w datach w prozie / sub-tekstach
function fmtDateLong(s) { const d = parseDate(s); return `${d.getDate()} ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}`; }
function addMonthsClamped(dateStr, n) {
  const d = parseDate(dateStr);
  const target = new Date(d.getFullYear(), d.getMonth() + n, d.getDate());
  // If day overflowed (e.g. Jan 31 + 1 month → Feb 28), clamp to last day of target month
  const expectedMonth = ((d.getMonth() + n) % 12 + 12) % 12;
  if (target.getMonth() !== expectedMonth) target.setDate(0);
  return toStr(target);
}
function todayStr() { return toStr(new Date()); }
function esc(v) { return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nw(n) { return n===1 ? "noc" : n<5 ? "noce" : "nocy"; }
function npokoi(n) { return n===1 ? "pokój" : n<5 ? "pokoje" : "pokoi"; }
function nrez(n) { return n===1 ? "rezerwacja" : n<5 ? "rezerwacje" : "rezerwacji"; }
function nl(n) { return n===1 ? "łóżko" : (n%10>=2 && n%10<=4 && (n%100<10 || n%100>=20)) ? "łóżka" : "łóżek"; }
function nm(n) { return n===1 ? "miesiąc" : (n%10>=2 && n%10<=4 && (n%100<10 || n%100>=20)) ? "miesiące" : "miesięcy"; }
function currentPeriod() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; }

// v3.41 — Walidacja + parsowanie okresu mediów (format RRRR-MM, miesiąc 01–12).
// JEDNO źródło prawdy, używane wszędzie gdzie media wchodzą do raportów. Wcześniej
// było 4× skopiowane `period.split("-").map(Number)` + ręczne porównanie stringów —
// nieprawidłowy okres (np. "2026-0600" wpisany ręcznie na Firefoksie/Safari, gdzie
// <input type=month> degraduje do pola tekstowego) psuł filtrowanie po okresie
// (raz wliczony, raz nie, zależnie od miesiąca). Teraz: zły okres → odrzucony.
function isValidPeriod(period) {
  return typeof period === "string" && /^\d{4}-(0[1-9]|1[0-2])$/.test(period);
}
// Zwraca {start, endExcl} jako "RRRR-MM-DD" (koniec wykluczony) albo null gdy zły format.
function periodToRange(period) {
  if (!isValidPeriod(period)) return null;
  const [y, mn] = period.split("-").map(Number);
  const start = `${y}-${String(mn).padStart(2, "0")}-01`;
  const endExcl = mn === 12 ? `${y + 1}-01-01` : `${y}-${String(mn + 1).padStart(2, "0")}-01`;
  return { start, endExcl };
}
// Czy okres (RRRR-MM) nakłada się z zakresem [rangeFrom, rangeTo) ("RRRR-MM-DD", koniec
// wykluczony)? Brak zakresu (null/null) = bez filtra = true. Zły okres = false.
function periodOverlapsRange(period, rangeFrom, rangeTo) {
  const r = periodToRange(period);
  if (!r) return false;
  if (!rangeFrom || !rangeTo) return true;
  return r.start < rangeTo && r.endExcl > rangeFrom;
}

// Format zakresu dla rezerwacji — uwzględnia stałego najemcę z otwartym końcem.
// Stały najemca z permanentEnd=null → "od X · stały najemca"
// Stały najemca zakończony → "od X · do Y (zakończony)"
// Zwykła rezerwacja → "X → Y"
function fmtBookingPeriod(b) {
  if (!b) return "—";
  const isPerm = b.isPermanent && b.bookingType !== "company";
  if (isPerm) {
    const start = b.permanentStart || b.from;
    if (b.permanentEnd) {
      return `od ${fmtDate(start)} · do ${fmtDate(b.permanentEnd)} (zakończony)`;
    }
    return `od ${fmtDate(start)} · do odwołania`;
  }
  return `${fmtDate(b.from)} → ${fmtDate(b.to)}`;
}

// "Zab: X → Y" / "Stały najemca: od X · do odwołania" — używaj w raportach i room detail.
function fmtBookingPeriodLabeled(b) {
  if (!b) return "—";
  const isPerm = b.isPermanent && b.bookingType !== "company";
  if (isPerm) {
    const start = b.permanentStart || b.from;
    if (b.permanentEnd) {
      return `Stały najemca: od ${fmtDate(start)} · do ${fmtDate(b.permanentEnd)}`;
    }
    return `Stały najemca: od ${fmtDate(start)} · do odwołania`;
  }
  return `Zab: ${fmtDate(b.from)} → ${fmtDate(b.to)}`;
}

// ============================================================
// BOOKING HELPERS
// ============================================================
// Czy booking jest "permanent active" — dla firmy patrzy TYLKO na gości przypisanych do tego pokoju
// (bo guests są kopiowani do każdego bookingu w multi-room, więc bez filtra wszystkie pokoje
// firmy zostałyby błędnie oznaczone jako "stały" gdy choćby jeden pracownik jest permanent).
function isBookingPermanentActive(b) {
  if (b.isPermanent && !b.permanentEnd) return true;
  if (b.bookingType === "company" && Array.isArray(b.guests)) {
    const hasAssignments = b.guests.some(g => g.assignedRoom);
    const inRoom = hasAssignments
      ? b.guests.filter(g => g.assignedRoom === b.roomId)
      : b.guests;
    return inRoom.some(g => g.isPermanent && !g.permanentEnd);
  }
  return false;
}

function getEffectiveTo(b) {
  // Stały najemca aktywny → pokój zablokowany "w nieskończoność" (5 lat w przód).
  if (isBookingPermanentActive(b)) {
    return toStr(addDays(parseDate(b.from), 365 * 5));
  }
  // Stały najemca zakończony — blokujemy do daty zakończenia (max z b.to i permanentEnd).
  if (b.isPermanent && b.permanentEnd) {
    const reserved = toStr(addDays(parseDate(b.to), b.bufferDays || 0));
    return b.permanentEnd > reserved ? b.permanentEnd : reserved;
  }
  return toStr(addDays(parseDate(b.to), b.bufferDays || 0));
}

// Ile łóżek zajmuje pojedyncza rezerwacja w swoim pokoju.
// - Nowe rezerwacje zapisują explicit `bedsUsed` (patrz confirmBooking).
// - Legacy fallback: dla firmowej rezerwacji liczymy gości z assignedRoom===roomId,
//   a jeśli przypisań brak — 1 łóżko (taki był domyślny scenariusz wcześniej).
//   Dla indywidualnej — liczba gości.
function bedsUsedByBooking(b) {
  if (typeof b.bedsUsed === "number" && b.bedsUsed > 0) return b.bedsUsed;
  if (b.bookingType === "company") {
    const assigned = (b.guests || []).filter(g => g.assignedRoom === b.roomId).length;
    return assigned > 0 ? assigned : 1;
  }
  return Math.max(1, (b.guests || []).length);
}

function getRoomCapacity(roomId) {
  for (const loc of DATA.locations) {
    const r = loc.rooms.find(x => x.id === roomId);
    if (r) return r.capacity || 0;
  }
  return 0;
}

// Zwraca tablicę rezerwacji nakładających się na okres [from, to) w danym pokoju.
function getOverlappingBookings(roomId, fromStr, toStr2, excludeId) {
  const from = parseDate(fromStr), to = parseDate(toStr2);
  return savedBookings.filter(b => {
    if (b.roomId !== roomId) return false;
    if (excludeId && b.id === excludeId) return false;
    const bs = parseDate(b.from);
    const reservedEnd = parseDate(getEffectiveTo(b));
    const ae = getActualEnd(b);
    const be = ae && parseDate(ae) > reservedEnd ? parseDate(ae) : reservedEnd;
    return !(to <= bs || from >= be);
  });
}

// Suma zajętych łóżek w okresie. Uwzględnia ile łóżek każda overlapping rezerwacja zajmuje.
function getOccupiedBeds(roomId, fromStr, toStr2, excludeId) {
  return getOverlappingBookings(roomId, fromStr, toStr2, excludeId)
    .reduce((s, b) => s + bedsUsedByBooking(b), 0);
}

// Wolne łóżka w okresie (capacity - zajęte). Klamrowane do >= 0.
function getFreeBeds(roomId, fromStr, toStr2, excludeId) {
  return Math.max(0, getRoomCapacity(roomId) - getOccupiedBeds(roomId, fromStr, toStr2, excludeId));
}

// Pokój "zajęty" = 100% łóżek zajętych w okresie. Stara nazwa zachowana dla zgodności.
function roomOccupied(roomId, fromStr, toStr2, excludeId) {
  return getFreeBeds(roomId, fromStr, toStr2, excludeId) <= 0;
}

// Pokój zablokowany w danym dniu = wszystkie łóżka zajęte tego dnia.
function isDayBlocked(ds, roomId) {
  if (!roomId) return false;
  const cap = getRoomCapacity(roomId);
  if (cap === 0) return false;
  const d = parseDate(ds);
  let occupied = 0;
  savedBookings.forEach(b => {
    if (b.roomId !== roomId) return;
    const bs = parseDate(b.from);
    const reservedEnd = parseDate(getEffectiveTo(b));
    const ae = getActualEnd(b);
    const be = ae && parseDate(ae) > reservedEnd ? parseDate(ae) : reservedEnd;
    if (d >= bs && d < be) occupied += bedsUsedByBooking(b);
  });
  return occupied >= cap;
}

// Lista osób w pokoju w danym okresie (do wyświetlenia w UI dostępności)
function getRoomOccupants(roomId, fromStr, toStr2, excludeId) {
  return getOverlappingBookings(roomId, fromStr, toStr2, excludeId).map(b => {
    const who = b.bookingType === "company"
      ? (b.companyName || "Firma")
      : (b.guests?.[0]?.name || "Gość");
    return { who, beds: bedsUsedByBooking(b), type: b.bookingType, bookingId: b.id };
  });
}

function checkAvailability(locId, fromStr, toStr2) {
  const loc = DATA.locations.find(l => l.id === locId);
  const nights = diffDays(fromStr, toStr2);
  // Pokój dostępny gdy ma przynajmniej 1 wolne łóżko w okresie.
  const available = loc.rooms
    .map(r => {
      const free = getFreeBeds(r.id, fromStr, toStr2);
      return { ...r, freeBeds: free, occupiedBeds: r.capacity - free,
               occupants: getRoomOccupants(r.id, fromStr, toStr2) };
    })
    .filter(r => r.freeBeds > 0);
  if (available.length > 0) return { ok: true, available, nights };
  const earliestFull = [];
  loc.rooms.forEach(r => {
    let check = parseDate(toStr2);
    const limit = addDays(check, 180);
    while (check < limit) {
      const end = addDays(check, nights);
      if (getFreeBeds(r.id, toStr(check), toStr(end)) > 0) {
        earliestFull.push({ room: r, from: toStr(check), to: toStr(end) }); break;
      }
      check = addDays(check, 1);
    }
  });
  return { ok: false, nights, earliestFull };
}

// ============================================================
// STATUS LOGIC
// ============================================================
function getRoomStatusForRange(roomId, fromStr, toStr2) {
  const from = parseDate(fromStr), to = parseDate(toStr2);
  const overlapping = savedBookings.filter(b => {
    if (b.roomId !== roomId) return false;
    const bs = parseDate(b.from);
    const reservedEnd = parseDate(getEffectiveTo(b));
    const ae = getActualEnd(b);
    const be = ae && parseDate(ae) > reservedEnd ? parseDate(ae) : reservedEnd;
    return !(to <= bs || from >= be);
  });
  if (overlapping.length === 0) return null;
  return overlapping;
}

function getRoomStatusToday(roomId) {
  const today = todayStr();
  const active = savedBookings.find(b => {
    if (b.roomId !== roomId) return false;
    const bs = parseDate(b.from);
    const reservedEnd = parseDate(getEffectiveTo(b));
    const ae = getActualEnd(b);
    const be = ae && parseDate(ae) > reservedEnd ? parseDate(ae) : reservedEnd;
    const d = parseDate(today);
    return d >= bs && d < be;
  });
  if (!active) return { status: "free" };
  const todayD = parseDate(today);
  const reservedEnd = parseDate(active.to);
  if (todayD >= reservedEnd && active.bufferDays > 0) {
    return { status: "blocked", until: getEffectiveTo(active) };
  }
  const who = active.bookingType === "company"
    ? active.companyName
    : (active.guests[0]?.name || "—");
  const ae = getActualEnd(active);
  const isExtended = ae && parseDate(ae) > parseDate(active.to);
  const isPermanent = isBookingPermanentActive(active);
  return { status: "occupied", who, until: ae || active.to, isExtended, isPermanent, booking: active };
}

// ============================================================
// PRICE CALC
// ============================================================
// calcTotal accepts optional priceSnapshot (priceAtBooking) so historical
// reports always use the price that was in effect at booking time.
// Booking-aware variant: calcBookingTotal(b, room, nights) — uwzględnia
// b.billingMode ("room"|"employee"), b.customPrice (nadpisanie ceny finalnej),
// oraz snapshot z b.priceAtBooking.
function calcTotal(room, nights, guests, priceSnapshot) {
  if (!room || !nights) return 0;
  const prices = priceSnapshot || room; // fall back to current room prices
  const adults = guests.filter(g => g.isAdult).length;
  const children = guests.filter(g => !g.isAdult).length;
  const extra = Math.max(0, adults - 1);
  return (prices.basePrice * nights) + (extra * prices.extraPerAdult * nights) + (children * prices.extraPerChild * nights);
}

// Liczy łączną kwotę dla rezerwacji uwzględniając tryb rozliczenia i custom price.
// Per-pracownik dla firm: każdy guest ma g.billingMode ("room"|"employee"),
// "room" → basePrice/dobę za tego pracownika, "employee" → ppe/dobę za tego pracownika.
// Filtrujemy gości przypisanych do tego pokoju (b.roomId === g.assignedRoom).
// Legacy fallback: stare booking-i z b.billingMode === "employee" liczą ppe × bedsUsed.
// Liczba nocy rezerwacji [b.from, b.to) wpadająca w zakres okresu [rangeFrom, rangeTo).
// Zwraca null jeśli brak zakresu (caller używa pełnej liczby).
function getNightsInPeriod(b, rangeFrom, rangeTo) {
  if (!rangeFrom || !rangeTo || !b?.from || !b?.to) return null;
  const startClip = b.from > rangeFrom ? b.from : rangeFrom;
  const endClip = b.to < rangeTo ? b.to : rangeTo;
  if (startClip >= endClip) return 0;
  return diffDays(startClip, endClip);
}

// calcBookingTotal — przychód z rezerwacji.
// periodRange (opcjonalne): { from: "YYYY-MM-DD", to: "YYYY-MM-DD" exclusive }
//   - Stały najemca: clipuje wartość do okresu (każdy miesiąc dostaje swoją część).
//   - Nie-stała rezerwacja: też clipuje przez liczbę nocy które wpadają w okres.
//   - customPrice: skalowane proporcjonalnie do liczby nocy w okresie / całości.
// v3.56 — OKRESY ROZLICZENIOWE (billing periods): firma/indywidualna mogą mieć listę okresów
// { id, from, to, amount, invoiceId }. Granice = półmiesiące (1./16./15./koniec). Przychód okresu
// liczy się do MIESIĄCA daty "to". Gdy zdefiniowane → ZASTĘPUJĄ liczenie z nocy/dat.
function bookingHasBillingPeriods(b) {
  return Array.isArray(b?.billingPeriods) && b.billingPeriods.length > 0;
}
function billingPeriodAmount(b, bp) {
  // Kwota z podpiętej faktury (jeśli ma kwotę), inaczej ręczna kwota okresu. Zawsze BRUTTO.
  if (bp?.invoiceId) {
    const inv = (typeof invoices !== "undefined" ? invoices : []).find(i => i.id === bp.invoiceId);
    const ia = inv ? parseFloat(inv.amount) : NaN;
    if (!isNaN(ia) && ia > 0) return ia;
  }
  const a = parseFloat(bp?.amount);
  return isNaN(a) ? 0 : a;
}
// Suma BRUTTO okresów, których MIESIĄC KOŃCOWY (data "to") nakłada się na zakres raportu.
function bookingBillingRevenueBrutto(b, rangeFrom, rangeTo) {
  if (!bookingHasBillingPeriods(b)) return 0;
  return b.billingPeriods.reduce((s, bp) => {
    const endMonth = (bp.to || "").slice(0, 7);
    if (!endMonth) return s;
    if (rangeFrom && rangeTo && !periodOverlapsRange(endMonth, rangeFrom, rangeTo)) return s;
    return s + billingPeriodAmount(b, bp);
  }, 0);
}
// Czy rezerwacja z okresami "należy" do zakresu raportu — po MIESIĄCU KOŃCOWYM okresu (nie po datach pobytu).
function billingMatchesRange(b, rFrom, rTo) {
  if (!bookingHasBillingPeriods(b)) return false;
  if (!rFrom || !rTo) return true;
  return b.billingPeriods.some(bp => { const em = (bp.to || "").slice(0, 7); return em && periodOverlapsRange(em, rFrom, rTo); });
}

function calcBookingTotal(b, room, nights, periodRange) {
  const rFrom = periodRange?.from || null;
  const rTo   = periodRange?.to   || null;

  // v3.56 — okresy rozliczeniowe zastępują liczenie z nocy/dat (gdy zdefiniowane). Zwraca BRUTTO.
  if (bookingHasBillingPeriods(b)) return bookingBillingRevenueBrutto(b, rFrom, rTo);

  if (typeof b?.customPrice === "number" && b.customPrice >= 0) {
    // Pro-rate customPrice do okresu (jeśli podany) dla rezerwacji nie-stałych
    if (rFrom && rTo && !b.isPermanent && b.from && b.to) {
      const totalN = diffDays(b.from, b.to);
      const clippedN = getNightsInPeriod(b, rFrom, rTo);
      if (totalN > 0 && clippedN !== null) return b.customPrice * (clippedN / totalN);
    }
    return b.customPrice;
  }
  if (!room) return 0;
  const prices = b?.priceAtBooking || room;
  const basePrice = (prices.basePrice != null ? prices.basePrice : room.basePrice) || 0;
  const ppe       = (prices.pricePerEmployee != null ? prices.pricePerEmployee : room.pricePerEmployee) || 0;

  // Indywidualna rezerwacja — stały najemca obsługujemy osobnym helperem.
  if (b?.bookingType !== "company" && b.isPermanent) {
    return getPermanentRevenue(b, basePrice, b.from, rFrom, rTo);
  }

  // Clip liczbę nocy do okresu raportu (jeśli podany) dla rezerwacji nie-stałych
  if (rFrom && rTo) {
    const clipped = getNightsInPeriod(b, rFrom, rTo);
    if (clipped !== null) nights = clipped;
  }

  if (!nights) return 0;

  // Firmowa rezerwacja — sumujemy per pracownik w tym pokoju
  if (b?.bookingType === "company" && Array.isArray(b.guests) && b.guests.length > 0) {
    const hasAssignments = b.guests.some(g => g.assignedRoom);

    // LEGACY multi-room bug detection: jeśli b nie ma assignedRoom na żadnym guest,
    // ale istnieją bookingi-siblingi tej samej firmy/dat (= multi-room batch sprzed fixu),
    // to każdy record z osobna naliczałby wszystkich 6 → over-count. Dzielimy przez
    // liczbę siblings+1 żeby total batcha wyszedł poprawnie.
    let legacyShareDivisor = 1;
    if (!hasAssignments && Array.isArray(savedBookings)) {
      const siblings = savedBookings.filter(x =>
        x.id !== b.id &&
        x.bookingType === "company" &&
        x.companyName === b.companyName &&
        x.from === b.from && x.to === b.to &&
        Array.isArray(x.guests) && !x.guests.some(g => g.assignedRoom)
      );
      if (siblings.length > 0) legacyShareDivisor = siblings.length + 1;
    }

    const inRoom = hasAssignments
      ? b.guests.filter(g => g.assignedRoom === b.roomId)
      : b.guests;
    const hasPerGuestMode = inRoom.some(g => g.billingMode || g.dailyRate || g.isPermanent);
    if (hasPerGuestMode) {
      // Nowy model — sumujemy stawkę × dni (lub miesiące dla stałego) per pracownik.
      // Per-pracownik: jeśli g.actualNights ustawione (manual override w raportach), użyj go zamiast nights z bookingu.
      let total = 0;
      for (const g of inRoom) {
        const mode = g.billingMode || b.billingMode || "room";
        const defaultRate = (mode === "employee") ? ppe : basePrice;
        const custom = parseFloat(g.dailyRate);
        const rate = (!isNaN(custom) && custom >= 0) ? custom : defaultRate;
        if (g.isPermanent) {
          total += getPermanentRevenue(g, rate, b.from, rFrom, rTo);
        } else {
          const gNights = (typeof g.actualNights === "number" && g.actualNights >= 0) ? g.actualNights : nights;
          total += rate * gNights;
        }
      }
      return total / legacyShareDivisor;
    }
    // Legacy: tryb na poziomie bookingu
    if (b.billingMode === "employee") {
      return (ppe * bedsUsedByBooking(b) * nights) / legacyShareDivisor;
    }
    return calcTotal(room, nights, b.guests, prices) / legacyShareDivisor;
  }

  // Indywidualna (nie-stały najemca)
  // Per-guest mode — jeśli choć jeden gość ma explicit dailyRate, sumujemy per osoba.
  // Brak fallbacku z cennika: gość bez wpisanej stawki = 0 (force explicit, no hidden math).
  const guestsList = b?.guests || [];
  const hasGuestRates = guestsList.some(g => g.dailyRate != null && g.dailyRate !== "" && !isNaN(parseFloat(g.dailyRate)));
  if (hasGuestRates) {
    let total = 0;
    for (const g of guestsList) {
      const custom = parseFloat(g.dailyRate);
      const rate = (!isNaN(custom) && custom >= 0) ? custom : 0;
      total += rate * nights;
    }
    return total;
  }
  if (b?.billingMode === "employee") {
    return ppe * bedsUsedByBooking(b) * nights;
  }
  return calcTotal(room, nights, b?.guests || [], prices);
}

function buildBreakdown(room, nights, guests, priceSnapshot) {
  if (!room || !nights) return "";
  const prices = priceSnapshot || room;
  const adults = guests.filter(g => g.isAdult).length;
  const children = guests.filter(g => !g.isAdult).length;
  const extra = Math.max(0, adults-1);
  const parts = [`zł${prices.basePrice} baza`];
  if (extra > 0 && prices.extraPerAdult > 0) parts.push(`+zł${prices.extraPerAdult}×${extra} dod.`);
  if (children > 0 && prices.extraPerChild > 0) parts.push(`+zł${prices.extraPerChild}×${children} dz.`);
  parts.push(`× ${nights} ${nw(nights)}`);
  return parts.join(" ");
}

function buildBookingBreakdown(b, room, nights) {
  if (typeof b?.customPrice === "number" && b.customPrice >= 0) {
    return `cena nadpisana: zł${b.customPrice}`;
  }
  if (b?.billingMode === "employee") {
    const prices = b?.priceAtBooking || room || {};
    const ppe = (prices.pricePerEmployee != null ? prices.pricePerEmployee : room?.pricePerEmployee) || 0;
    const beds = bedsUsedByBooking(b);
    return `zł${ppe} × ${beds} ${nl(beds)} × ${nights} ${nw(nights)}`;
  }
  return buildBreakdown(room, nights, b?.guests || [], b?.priceAtBooking);
}

// ============================================================
// MEDIA helpers (per room, per period)
// ============================================================
function getRoomMediaKey(roomId, period) { return `${roomId}__${period}`; }
// v3.46 — domyślne stawki VAT mediów (PL): prąd/gaz 23%, woda/ścieki 8%, inne 23%.
const MEDIA_VAT_DEFAULTS = { electricity: 23, gas: 23, water: 8, other: 23 };
function getRoomMedia(roomId, period) {
  const m = roomMedia[getRoomMediaKey(roomId, period)];
  if (!m) return { electricity: 0, gas: 0, water: 0, electricityVat: 23, gasVat: 23, waterVat: 8, others: [], note: "" };
  // backward compat: migrate 'repairs' to others
  if (!m.others) m.others = (parseFloat(m.repairs) > 0) ? [{ label: "Naprawy", amount: parseFloat(m.repairs) }] : [];
  if (m.gas === undefined) m.gas = 0;
  // v3.46 — VAT per pozycja (kwoty wpisywane BRUTTO). Legacy bez VAT → stawki domyślne.
  if (m.electricityVat === undefined) m.electricityVat = MEDIA_VAT_DEFAULTS.electricity;
  if (m.gasVat === undefined) m.gasVat = MEDIA_VAT_DEFAULTS.gas;
  if (m.waterVat === undefined) m.waterVat = MEDIA_VAT_DEFAULTS.water;
  m.others.forEach(o => { if (o.vat === undefined) o.vat = MEDIA_VAT_DEFAULTS.other; });
  return m;
}
function saveRoomMedia(roomId, period, data) {
  roomMedia[getRoomMediaKey(roomId, period)] = data;
}
// Suma BRUTTO (kwoty tak jak wpisane / z faktury).
function sumMediaObj(m) {
  if (!m) return 0;
  let s = (parseFloat(m.electricity)||0) + (parseFloat(m.gas)||0) + (parseFloat(m.water)||0);
  if (m.others) m.others.forEach(o => { s += parseFloat(o.amount)||0; });
  else if (m.repairs) s += parseFloat(m.repairs)||0; // legacy
  return s;
}
function sumRoomMedia(roomId, period) {
  return sumMediaObj(getRoomMedia(roomId, period));
}
// v3.46 — NETTO: kwoty media są brutto, więc netto = brutto / (1 + VAT/100) per pozycja.
function mediaItemNetto(amount, vat) {
  const a = parseFloat(amount) || 0;
  const v = parseFloat(vat);
  return a / (1 + (isNaN(v) ? 0 : v) / 100);
}
// v3.58 — media wpisywane WPROST jako NETTO (VAT usunięty; VAT liczony ręcznie poza systemem).
// Netto == suma kwot (brutto i netto są tym samym, bo nie ma VAT-u).
function sumMediaObjNetto(m) { return sumMediaObj(m); }
function sumRoomMediaNetto(roomId, period) {
  return sumMediaObjNetto(getRoomMedia(roomId, period));
}

// ============================================================
// ACTUAL NIGHTS helper — uses actualDays[] if present, else actualFrom/To range
// ============================================================
// Pierwszy dzień następnego miesiąca (exclusive end dla diffDays).
// Używane do rozliczania stałego najemcy: doliczamy pełne dni do końca bieżącego miesiąca.
function endOfCurrentMonthExclusive() {
  const now = new Date();
  return toStr(new Date(now.getFullYear(), now.getMonth() + 1, 1));
}
// Ile dni rozliczać dla bookingu/pracownika ze statusem stałego najemcy:
// - jeśli wyłączono status (permanentEnd != null) → od permanentStart/from do permanentEnd
// - jeśli aktywny → od permanentStart/from do końca bieżącego miesiąca (exclusive)
// rangeFrom/rangeTo (opcjonalne, exclusive end) — clipuje wynik do danego okresu raportu.
function getPermanentNights(entity, fallbackFrom, rangeFrom, rangeTo) {
  const pStart = entity.permanentStart || fallbackFrom;
  const pEnd = entity.permanentEnd || endOfCurrentMonthExclusive();
  const start = rangeFrom && rangeFrom > pStart ? rangeFrom : pStart;
  const end   = rangeTo   && rangeTo   < pEnd   ? rangeTo   : pEnd;
  return Math.max(0, diffDays(start, end));
}

// Liczba odrębnych miesięcy kalendarzowych przeciętych przez [start, endExclusive).
// 2026-05-15 → 2026-08-10 = 4 miesiące (V, VI, VII, VIII).
// 2026-05-15 → 2026-06-01 = 1 miesiąc (V).
function countCalendarMonths(start, endExclusive) {
  if (!start || !endExclusive || start >= endExclusive) return 0;
  const s = new Date(start);
  const lastDay = new Date(new Date(endExclusive).getTime() - 86400000);
  return Math.max(0, (lastDay.getFullYear() - s.getFullYear()) * 12 + (lastDay.getMonth() - s.getMonth()) + 1);
}

// Pro-rata cena za jeden konkretny miesiąc YYYY-MM przy najemie ze stawką miesięczną.
// Jeśli najemca obejmuje cały miesiąc kalendarzowy → pełna stawka.
// Jeśli częściowy (zaczął/zakończył w środku miesiąca) → monthlyRate × dni_użyte / dni_w_miesiącu.
// Wynik zaokrąglony do 2 miejsc po przecinku (PLN/grosze).
//
// pStartStr inclusive (YYYY-MM-DD), pEndStr exclusive (YYYY-MM-DD).
// Dla aktywnego najemcy pEnd = endOfCurrentMonthExclusive() → bieżący miesiąc liczy się
// jako pełny (rent płaci się za cały miesiąc, nie pro-rata na dziś).
// v3.28: PEŁEN MIESIĄC ZAWSZE (no pro-rata).
// User decyzja: stały najemca który przychodzi w środku miesiąca PŁACI FULL stawkę
// za ten miesiąc. Jeśli wyprowadza się wcześniej — też FULL za ostatni miesiąc.
// Funkcja nadal zwraca 0 gdy nie ma overlap (najemca nie był aktywny w tym miesiącu).
function prorataMonthPrice(monthlyRate, ym, pStartStr, pEndStr) {
  if (!monthlyRate || monthlyRate <= 0 || !ym || !pStartStr || !pEndStr) return 0;
  const [y, m] = ym.split("-").map(Number);
  const monthStart = toStr(new Date(y, m - 1, 1));
  const monthEndExcl = toStr(new Date(y, m, 1));
  const usedStart = pStartStr > monthStart ? pStartStr : monthStart;
  const usedEnd = pEndStr < monthEndExcl ? pEndStr : monthEndExcl;
  if (usedStart >= usedEnd) return 0;
  return monthlyRate;
}

// v3.28: helper dla open-ended najemcy (brak permanentEnd).
// Gdy filtr/range sięga w przyszłość, używamy rangeTo zamiast endOfCurrentMonthExclusive.
// Bez tego: Raporty/Wykresy z filtrem na np. lipiec nie pokazywałyby najemcy bo
// pEnd byłby clamp'owany do bieżącego miesiąca.
function effectivePermanentEnd(entity, rangeTo) {
  if (entity.permanentEnd) return entity.permanentEnd;
  const defaultEnd = endOfCurrentMonthExclusive();
  return (rangeTo && rangeTo > defaultEnd) ? rangeTo : defaultEnd;
}

// Helper: zwraca [usedDays, daysInMonth] dla danego YYYY-MM oraz zakresu [pStart, pEnd).
// Używane w UI do pokazania szczegółów typu "15/30 dni".
function prorataMonthInfo(ym, pStartStr, pEndStr) {
  const [y, m] = ym.split("-").map(Number);
  const monthStart = toStr(new Date(y, m - 1, 1));
  const monthEndExcl = toStr(new Date(y, m, 1));
  const daysInMonth = diffDays(monthStart, monthEndExcl);
  const usedStart = pStartStr > monthStart ? pStartStr : monthStart;
  const usedEnd = pEndStr < monthEndExcl ? pEndStr : monthEndExcl;
  const daysUsed = usedStart < usedEnd ? diffDays(usedStart, usedEnd) : 0;
  return { daysUsed, daysInMonth, isPartial: daysUsed > 0 && daysUsed < daysInMonth };
}

// Ile miesięcy stałego najemcy mieści się w [rangeFrom, rangeTo) (opcjonalne).
// Bez range — pełna liczba miesięcy od permanentStart do permanentEnd (lub end-of-current-month).
function getPermanentMonths(entity, fallbackFrom, rangeFrom, rangeTo) {
  const pStart = entity.permanentStart || fallbackFrom;
  const pEnd = entity.permanentEnd || endOfCurrentMonthExclusive();
  const from = rangeFrom && rangeFrom > pStart ? rangeFrom : pStart;
  const to   = rangeTo   && rangeTo   < pEnd   ? rangeTo   : pEnd;
  return countCalendarMonths(from, to);
}

// Lista miesięcy "YYYY-MM" w których stały najemca był aktywny, opcjonalnie clipped do okresu.
function getPermanentActiveMonths(entity, fallbackFrom, rangeFrom, rangeTo) {
  const pStart = entity.permanentStart || fallbackFrom;
  const pEnd = effectivePermanentEnd(entity, rangeTo);
  const from = rangeFrom && rangeFrom > pStart ? rangeFrom : pStart;
  const to   = rangeTo   && rangeTo   < pEnd   ? rangeTo   : pEnd;
  if (!from || !to || from >= to) return [];
  const months = [];
  // BUG FIX: używamy parseDate (local midnight) nie new Date(string) który parsuje UTC.
  // W TZ != UTC: new Date("2026-04-01") to lokalnie "2026-04-01 02:00",
  // ale `new Date(2026, 4, 1)` to lokalna północ. Niezgodność powoduje ghost-iterację
  // (np. May 1 0:00 UTC < May 1 0:00 lokalnie = TRUE w Polsce → fałszywy maj).
  let curr = parseDate(from);
  const endD = parseDate(to);
  while (curr < endD) {
    months.push(`${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}`);
    curr = new Date(curr.getFullYear(), curr.getMonth()+1, 1);
  }
  return months;
}

// ============================================================
// POKRYCIE KUMULACYJNE (v3.59) — model raty: suma wpłat vs suma należności.
// ============================================================
// Pojedyncze źródło prawdy dla "ile pokryto" u stałego najemcy. Wpłaty traktujemy
// KUMULACYJNIE: pełne miesiące (paidMonths) są zaliczone wprost, a wpłaty częściowe
// (partialPaid) tworzą wspólną pulę „rat" rozdzielaną na pozostałe miesiące od
// NAJSTARSZEGO (FIFO). Dzięki temu nierówne raty (np. luty 2000, marzec 1000, kwiecień
// 1000, maj 4000) NIE generują fałszywych zaległości, jeśli suma wpłat pokrywa sumę
// należności (item 4). Każdy miesiąc pokrywany jest max do swojej należności, więc
// nadpłata jednego miesiąca pokrywa zaległości innych zamiast zawyżać Przychód (item 5).
//
// Override amountPaid: gdy wpisana kwota > 0, całość traktujemy jako jedną pulę
// (ignorujemy zaznaczenia per-miesiąc — spójnie z UI) rozdzielaną FIFO.
//
// Zwraca: { months:[{ym, due, covered, fullyCovered, isPast}], pool, totalDue,
//           totalCovered, overdueMonths, leftover }. Miesiące chronologicznie.
function getPermanentCoverage(entity, defaultDailyRate, fallbackFrom) {
  const activeMonths = getPermanentActiveMonths(entity, fallbackFrom, null, null);
  if (activeMonths.length === 0) return { months: [], pool: 0, totalDue: 0, totalCovered: 0, overdueMonths: [], leftover: 0 };

  const monthlyRate = parseFloat(entity.permanentMonthlyRate);
  const hasMonthly = !isNaN(monthlyRate) && monthlyRate > 0;
  const pStart = entity.permanentStart || fallbackFrom;
  const pEnd = entity.permanentEnd || endOfCurrentMonthExclusive();
  const customDaily = parseFloat(entity.dailyRate);
  const dailyRate = (!isNaN(customDaily) && customDaily >= 0) ? customDaily : defaultDailyRate;
  const dueOf = (ym) => {
    if (hasMonthly) return prorataMonthPrice(monthlyRate, ym, pStart, pEnd);
    const [y, m] = ym.split('-').map(Number);
    const ms = toStr(new Date(y, m - 1, 1)), me = toStr(new Date(y, m, 1));
    const ds = ms > pStart ? ms : pStart, de = me < pEnd ? me : pEnd;
    return ds < de ? dailyRate * diffDays(ds, de) : 0;
  };

  const explicit = parseFloat(entity?.payment?.amountPaid);
  const hasOverride = !isNaN(explicit) && explicit > 0;
  const paidSet = hasOverride ? new Set() : new Set(Array.isArray(entity.paidMonths) ? entity.paidMonths : []);
  const partial = (!hasOverride && entity.partialPaid && typeof entity.partialPaid === "object") ? entity.partialPaid : {};

  // v3.60 — TAG-THEN-SPILL: każda wpłata pokrywa NAJPIERW swój własny miesiąc, dopiero
  // NADWYŻKA spływa na pozostałe niedopłacone miesiące (FIFO od najstarszego). Dzięki temu
  // wpłata przypisana do maja faktycznie zalicza maj (zamiast „uciekać" na starsze miesiące),
  // a jednocześnie nadpłata nadal pokrywa zaległości innych miesięcy (item 4 + 5).
  // Pula = override (cała kwota, bez tagu miesiąca) ALBO suma NADWYŻEK wpłat częściowych.
  let pool;
  if (hasOverride) {
    pool = explicit;
  } else {
    pool = 0;
    for (const ym of Object.keys(partial)) {
      if (paidSet.has(ym)) continue;
      const pa = parseFloat(partial[ym]);
      if (pa > 0) { const d = dueOf(ym); if (pa > d) pool += (pa - d); }   // tylko nadwyżka ponad własny miesiąc
    }
  }
  const poolStart = pool;

  const now = new Date();
  const currentYm = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  // PASS 1 — każdy miesiąc pokrywa SAM SIEBIE: pełne zaznaczenie (paidMonths) albo wpłata częściowa do wys. należności.
  const months = activeMonths.map(ym => {
    const due = dueOf(ym);
    let covered = 0;
    if (!hasOverride) {
      if (paidSet.has(ym)) covered = due;
      else { const pa = parseFloat(partial[ym]); if (pa > 0) covered = Math.min(pa, due); }
    }
    return { ym, due, covered, isPast: ym < currentYm };
  });
  // PASS 2 — pula nadwyżek (lub override) pokrywa pozostałe niedopłacone miesiące, FIFO od najstarszego.
  for (const m of months) {
    if (pool <= 0.0001) break;
    if (m.covered >= m.due - 0.01) continue;
    const need = m.due - m.covered;
    const take = Math.min(pool, need);
    m.covered += take; pool -= take;
  }
  let totalDue = 0, totalCovered = 0;
  months.forEach(m => { m.fullyCovered = m.due <= 0.01 ? true : m.covered >= m.due - 0.01; totalDue += m.due; totalCovered += m.covered; });
  const overdueMonths = months.filter(m => m.isPast && !m.fullyCovered).map(m => m.ym);
  return { months, pool: poolStart, totalDue, totalCovered, overdueMonths, leftover: pool };
}

// Kwota zapłacona (Wpłacono) przypisana do okresu [rangeFrom, rangeTo) — z modelu kumulacyjnego.
// Każdy miesiąc liczy się max do swojej należności (item 5: nadpłata nie zawyża Przychodu,
// spływa FIFO na inne miesiące). Bez range = suma pokrycia za cały okres najmu.
function getPermanentPaidRevenue(entity, defaultDailyRate, fallbackFrom, rangeFrom, rangeTo, payTiming) {
  const cov = getPermanentCoverage(entity, defaultDailyRate, fallbackFrom);
  if (cov.months.length === 0) return 0;
  if (!rangeFrom && !rangeTo) return cov.totalCovered;
  const inRange = new Set(getPermanentActiveMonths(entity, fallbackFrom, rangeFrom, rangeTo));
  return cov.months.reduce((s, m) => s + (inRange.has(m.ym) ? m.covered : 0), 0);
}

// Miesiące zaległe — model KUMULACYJNY (v3.59): przeszły miesiąc jest zaległy TYLKO gdy
// suma wpłat (raty + pełne + override) nie pokrywa skumulowanej należności aż do tego
// miesiąca (FIFO). Nierówne raty pokrywające łącznie należność NIE generują zaległości
// (item 4). Bieżący miesiąc nie liczy się jako zaległy (jeszcze trwa).
function getPermanentOverdueMonths(entity, fallbackFrom, payTiming) {
  const bp = (entity.priceAtBooking?.basePrice) || 0;
  return getPermanentCoverage(entity, bp, fallbackFrom).overdueMonths;
}

// Przychód stałego najemcy — ujednolicony wybór trybu:
// - jeśli entity.permanentMonthlyRate > 0 → liczba miesięcy × stawka miesięczna
// - inaczej → liczba dni × stawka dzienna (custom dailyRate albo defaultDailyRate)
// rangeFrom/rangeTo — opcjonalny clip do okresu raportu (oba "YYYY-MM-DD", to exclusive).
function getPermanentRevenue(entity, defaultDailyRate, fallbackFrom, rangeFrom, rangeTo) {
  const monthly = parseFloat(entity.permanentMonthlyRate);
  if (!isNaN(monthly) && monthly > 0) {
    // Pro-rata: dla każdego miesiąca aktywności (w okresie raportu) zlicz proporcjonalnie
    // do faktycznej liczby dni mieszkania. Pierwszy/ostatni miesiąc często są częściowe.
    const activeMonths = getPermanentActiveMonths(entity, fallbackFrom, rangeFrom, rangeTo);
    if (activeMonths.length === 0) return 0;
    const pStart = entity.permanentStart || fallbackFrom;
    const pEnd = entity.permanentEnd || endOfCurrentMonthExclusive();
    return activeMonths.reduce((sum, ym) => sum + prorataMonthPrice(monthly, ym, pStart, pEnd), 0);
  }
  const customDaily = parseFloat(entity.dailyRate);
  const rate = (!isNaN(customDaily) && customDaily >= 0) ? customDaily : defaultDailyRate;
  return rate * getPermanentNights(entity, fallbackFrom, rangeFrom, rangeTo);
}

// ============================================================
// VAT — netto factor (v3.38). Przychód (raporty/dashboard/wykresy) = netto.
// Customer płaci brutto (calcBookingTotal zwraca brutto), ale dla księgowych
// raportów Przychód = netto = brutto / (1 + vat/100).
// ============================================================
function bookingNettoFactor(b) {
  const vat = parseFloat(b?.vatRate) || 8;
  return 1 / (1 + vat / 100);
}

// ============================================================
// PAID IN RANGE — wpłacono za rezerwację clip'owane do okresu
// ============================================================
// Zwraca kwotę zapłaconą za booking PRZYPISANĄ do okresu [rangeFrom, rangeTo).
// - Permanent: deleguje do getPermanentPaidRevenue (clipuje przez paidMonths).
// - Zwykła: pro-rata × (overlap_nights / total_nights). Bez tego booking
//   Apr→Jun opłacony 5880 zł pokazywał 5880 wpłacone w MAJU (cały) — czyli
//   Wpłacono > Przychód_clipped, co psuło Przychód zrealizowany na Dashboard.
// Bez range = no clip (zwraca pełną kwotę — dla all-time view w Raportach).
function bookingPaidInRange(b, room, rangeFrom, rangeTo) {
  const isPerm = b.isPermanent && b.bookingType !== "company";
  if (isPerm) {
    const bp = (b.priceAtBooking?.basePrice ?? room?.basePrice) || 0;
    return getPermanentPaidRevenue(b, bp, b.from, rangeFrom, rangeTo, b.payment?.timing);
  }
  // v3.56 — billing periods: wpłatę przypisz proporcjonalnie do przychodu okresów w zakresie raportu.
  if (bookingHasBillingPeriods(b)) {
    const tp = parseFloat(b.payment?.amountPaid);
    if (isNaN(tp) || tp === 0) return 0;
    const totalRev = bookingBillingRevenueBrutto(b, null, null);
    if (totalRev <= 0) return 0;
    if (!rangeFrom || !rangeTo) return tp;
    return tp * Math.min(1, bookingBillingRevenueBrutto(b, rangeFrom, rangeTo) / totalRev);
  }
  const totalPaid = parseFloat(b.payment?.amountPaid);
  if (isNaN(totalPaid) || totalPaid === 0) return 0;
  if (!rangeFrom || !rangeTo) return totalPaid;
  const totalNights = diffDays(b.from, b.to);
  if (totalNights <= 0) return totalPaid;
  const overlapFrom = b.from > rangeFrom ? b.from : rangeFrom;
  const overlapTo = b.to < rangeTo ? b.to : rangeTo;
  const overlapNights = diffDays(overlapFrom, overlapTo);
  if (overlapNights <= 0) return 0;
  return totalPaid * (overlapNights / totalNights);
}

// ============================================================
// PAYMENT WARNING — wykryj zaległości "po pobycie" do podświetlenia w UI / confirm-dialogu
// ============================================================
// Zwraca null jeśli wszystko OK, lub { level: "warning"|"danger", title, message, owed, paid, total }.
// Wykrywa dwa scenariusze:
// 1) Stały najemca indywidualny + postpaid: są miesiące przeszłe nieopłacone, LUB
//    najemca zakończony (permanentEnd) i nie wszystkie miesiące są oznaczone jako zapłacone.
// 2) Zwykła rezerwacja + postpaid: pobyt już się zakończył (b.to <= today) i amountPaid < total.
function getPaymentWarning(b) {
  if (!b) return null;
  if (b.payment?.timing !== "postpaid") return null;

  const isPerm = b.isPermanent && b.bookingType !== "company";
  if (isPerm) {
    // Manual override z amountPaid ma najwyższy priorytet — jeśli user typnął
    // konkretną kwotę, sprawdzamy ją vs total expected.
    const totalExpected = getPermanentRevenue(b, (b.priceAtBooking?.basePrice ?? 0), b.from, null, null);
    const explicit = parseFloat(b?.payment?.amountPaid);
    if (!isNaN(explicit) && explicit > 0) {
      if (totalExpected <= 0 || explicit >= totalExpected - 0.01) return null; // fully paid
      const owed = totalExpected - explicit;
      return {
        level: explicit > 0 ? "warning" : "danger",
        title: "Niepełna wpłata stałego najemcy",
        message: `Wpłacono zł${explicit.toLocaleString()} z zł${totalExpected.toLocaleString()}. Brakuje: zł${owed.toLocaleString()}.`,
        owed, paid: explicit, total: totalExpected, isPermanent: true
      };
    }

    // v3.59 — model KUMULACYJNY: zaległość liczona z pokrycia (raty + pełne + override),
    // nie z samych pełnych zaznaczeń. Nierówne raty pokrywające łącznie należność = brak zaległości.
    const bp = (b.priceAtBooking?.basePrice ?? 0);
    const cov = getPermanentCoverage(b, bp, b.from);
    const activeMonths = cov.months.map(m => m.ym);
    const isEnded = !!b.permanentEnd;
    // Zakończony → WSZYSTKIE niepokryte miesiące; aktywny → tylko przeszłe niepokryte (bieżący jeszcze trwa).
    const missingRows = isEnded ? cov.months.filter(m => !m.fullyCovered) : cov.months.filter(m => m.isPast && !m.fullyCovered);
    const missing = missingRows.map(m => m.ym);
    if (missing.length === 0) return null;

    // Brakująca kwota = należność minus to, co już pokryte (raty częściowe wliczone).
    const owed = missingRows.reduce((s, m) => s + (m.due - m.covered), 0);
    const monthsLabel = missing.slice(0, 6).join(", ") + (missing.length > 6 ? `, … (+${missing.length - 6})` : "");
    return {
      level: missing.length > activeMonths.length / 2 ? "danger" : "warning",
      title: isEnded ? "Najemca zakończony — są zaległe miesiące" : "Zaległe miesiące",
      message: `Niepełne pokrycie za ${missing.length} ${nm(missing.length)}: ${monthsLabel}.${owed > 0.5 ? ` Do zapłaty: zł${Math.round(owed).toLocaleString()}.` : ""}`,
      owed: Math.round(owed),
      paid: Math.round(cov.totalCovered),
      total: Math.round(cov.totalDue),
      missingMonths: missing,
      isPermanent: true
    };
  }

  // Zwykła rezerwacja postpaid
  const today = todayStr();
  const bookingEnded = b.to && b.to <= today;
  if (!bookingEnded) return null;

  const loc = DATA.locations.find(l => l.id === b.locId);
  const room = loc?.rooms.find(r => r.id === b.roomId);
  const total = calcBookingTotal(b, room, getActualNights(b));
  if (total <= 0) return null;
  const p = parseFloat(b.payment?.amountPaid);
  const paid = !isNaN(p) ? p : 0;
  const owed = total - paid;
  if (owed <= 0.01) return null;

  return {
    level: paid > 0 ? "warning" : "danger",
    title: paid === 0 ? "Pobyt zakończony, brak wpłaty" : "Pobyt zakończony, niepełna wpłata",
    message: paid === 0
      ? `Pobyt zakończył się ${fmtDate(b.to)} — nie odnotowano żadnej wpłaty. Do zapłaty: zł${total.toLocaleString()}.`
      : `Pobyt zakończył się ${fmtDate(b.to)}. Wpłacono zł${paid.toLocaleString()} z zł${total.toLocaleString()}. Brakuje: zł${owed.toLocaleString()}.`,
    owed,
    paid,
    total,
    isPermanent: false
  };
}
function getActualNights(b) {
  if (b.isPermanent) return getPermanentNights(b, b.from);
  if (b.actualDays && b.actualDays.length > 0) return b.actualDays.length;
  if (b.actualFrom && b.actualTo) return diffDays(b.actualFrom, b.actualTo);
  return diffDays(b.from, b.to);
}
// Returns actual end date string if stay extends beyond reservation (for calendar blocking), null otherwise
function getActualEnd(b) {
  if (b.actualDays && b.actualDays.length > 0) {
    const maxDay = b.actualDays.reduce((a, c) => c > a ? c : a, "");
    if (maxDay >= b.to) return toStr(addDays(parseDate(maxDay), 1));
    return null;
  }
  return b.actualTo || null;
}
// Get all periods for a room that have media entries
function getRoomMediaPeriods(roomId) {
  return Object.keys(roomMedia)
    .filter(k => k.startsWith(roomId + "__"))
    .map(k => k.split("__")[1])
    .sort().reverse();
}

// PATCH-ONLY RENDER SYSTEM
// Instead of full re-render on every keystroke, we manage state
// without re-rendering for text inputs, only re-render on structural changes.
// ============================================================

// Full render — only called for structural changes (step changes, button clicks, etc.)
function render() {
  // Save scroll position of main area and any open modal
  const mainEl = document.querySelector(".main");
  const modalEl = document.getElementById("modalBox");
  const editEl = document.querySelector(".edit-modal");
  const savedMainScroll = mainEl ? mainEl.scrollTop : (document.documentElement.scrollTop || document.body.scrollTop);
  const savedModalScroll = modalEl ? modalEl.scrollTop : 0;
  const savedEditScroll = editEl ? editEl.scrollTop : 0;

  const app = document.getElementById("app");
  app.innerHTML = buildApp();   // buildApp = patched version (shows login if needed)
  attachEvents();

  // Restore scroll positions
  const newMain = document.querySelector(".main");
  if (newMain) newMain.scrollTop = savedMainScroll;
  else { document.documentElement.scrollTop = savedMainScroll; document.body.scrollTop = savedMainScroll; }
  const newModal = document.getElementById("modalBox");
  if (newModal && savedModalScroll > 0) newModal.scrollTop = savedModalScroll;
  const newEdit = document.querySelector(".edit-modal");
  if (newEdit && savedEditScroll > 0) newEdit.scrollTop = savedEditScroll;
}

// Partial update helpers — update specific DOM nodes without destroying focus
function patchText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function patchHTML(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val; }
function patchClass(id, cls, on) { const el = document.getElementById(id); if (el) el.classList.toggle(cls, on); }
function patchAttr(id, attr, val) { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); }
function patchDisabled(id, val) { const el = document.getElementById(id); if (el) el.disabled = val; }

// ─── DASHBOARD ───────────────────────────────────────────────
function buildDashboard() {
  const today = todayStr();
  const now = new Date();
  const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
  const monthEnd = toStr(new Date(now.getFullYear(), now.getMonth()+1, 0));
  const prevMonthStart = toStr(new Date(now.getFullYear(), now.getMonth()-1, 1));
  const prevMonthEnd = toStr(new Date(now.getFullYear(), now.getMonth(), 0));

  // KPIs
  const totalRooms = DATA.locations.reduce((s, l) => s + l.rooms.length, 0);
  const occupiedToday = DATA.locations.reduce((s, l) =>
    s + l.rooms.filter(r => getRoomStatusToday(r.id).status === "occupied").length, 0);
  const occupancyPct = totalRooms > 0 ? Math.round(occupiedToday / totalRooms * 100) : 0;

  // Overlap test + clipping do okresu (jak w Raportach):
  // - permanent: aktywny w [monthStart, monthEnd+1) gdy permanentStart < end AND (permanentEnd || endOfCurrentMonth) > start
  // - zwykła rezerwacja: b.from < end AND b.to > start
  // calcBookingTotal z periodRange klipuje nights/miesiące do tego okresu.
  const monthStartExcl = monthStart; // YYYY-MM-01 inclusive
  const monthEndExcl = toStr(addDays(parseDate(monthEnd), 1)); // first of next month exclusive
  const prevMonthEndExcl = toStr(addDays(parseDate(prevMonthEnd), 1));
  const thisMonthBookings = savedBookings.filter(b => {
    if (bookingHasBillingPeriods(b)) return billingMatchesRange(b, monthStartExcl, monthEndExcl);  // v3.56
    if (b.isPermanent && b.bookingType !== "company") {
      const ps = b.permanentStart || b.from;
      const pe = b.permanentEnd || endOfCurrentMonthExclusive();
      return ps < monthEndExcl && pe > monthStartExcl;
    }
    return b.from < monthEndExcl && b.to > monthStartExcl;
  });
  const thisMonthRevenue = thisMonthBookings.reduce((s, b) => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    return s + calcBookingTotal(b, room, diffDays(b.from,b.to), { from: monthStartExcl, to: monthEndExcl }) * bookingNettoFactor(b);
  }, 0);
  // v3.55 — Przychód (brutto) bieżącego miesiąca (bez netto factor)
  const thisMonthRevenueBrutto = thisMonthBookings.reduce((s, b) => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    return s + calcBookingTotal(b, room, diffDays(b.from,b.to), { from: monthStartExcl, to: monthEndExcl });
  }, 0);

  const prevMonthBookings = savedBookings.filter(b => {
    if (bookingHasBillingPeriods(b)) return billingMatchesRange(b, prevMonthStart, prevMonthEndExcl);  // v3.56
    if (b.isPermanent && b.bookingType !== "company") {
      const ps = b.permanentStart || b.from;
      const pe = b.permanentEnd || endOfCurrentMonthExclusive();
      return ps < prevMonthEndExcl && pe > prevMonthStart;
    }
    return b.from < prevMonthEndExcl && b.to > prevMonthStart;
  });
  const prevMonthRevenue = prevMonthBookings.reduce((s, b) => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    return s + calcBookingTotal(b, room, diffDays(b.from,b.to), { from: prevMonthStart, to: prevMonthEndExcl }) * bookingNettoFactor(b);
  }, 0);

  // v3.19 — używa bookingPaidInRange helper'a, który pro-rata clipuje
  // amountPaid zwykłych rezerwacji do okresu (permanent ma własny clip via paidMonths).
  // Wcześniej non-perm sumował PEŁNĄ kwotę → Wpłacono > Przychód_clipped, psuło Przychód zrealizowany.
  const thisMonthPaid = thisMonthBookings.reduce((s, b) => {
    const loc = DATA.locations.find(l=>l.id===b.locId);
    const room = loc?.rooms.find(r=>r.id===b.roomId);
    return s + bookingPaidInRange(b, room, monthStartExcl, monthEndExcl) * bookingNettoFactor(b);
  }, 0);
  // Media w bieżącym miesiącu — wpisy z period == YYYY-MM tego miesiąca.
  // v3.39: media kluczowane po loc.id (per-location), nie per-room. Filtr na
  // valid loc IDs odrzuca legacy room-keyed entries jeśli takie zostały.
  const monthPeriod = monthStart.slice(0, 7);
  const prevMonthPeriod = prevMonthStart.slice(0, 7);
  const validLocIds = new Set(DATA.locations.map(l => String(l.id)));
  let thisMonthMedia = 0, prevMonthMedia = 0;
  Object.entries(roomMedia).forEach(([key, m]) => {
    const [keyId, period] = key.split("__");
    if (!validLocIds.has(keyId)) return;  // skip legacy room-keyed entries
    if (period === monthPeriod) thisMonthMedia += sumMediaObjNetto(m);     // v3.46 — netto (dashboard netto)
    if (period === prevMonthPeriod) prevMonthMedia += sumMediaObjNetto(m);
  });
  const thisMonthProfit = thisMonthRevenue - thisMonthMedia;       // memoriał
  const thisMonthProfitRealized = thisMonthPaid - thisMonthMedia;  // kasa
  const prevMonthProfit = prevMonthRevenue - prevMonthMedia;       // do delty MoM
  const profitDelta = prevMonthProfit > 0 ? ((thisMonthProfit - prevMonthProfit) / prevMonthProfit * 100).toFixed(1) : null;
  const profitDeltaHtml = profitDelta !== null
    ? `<span style="font-size:11px;font-weight:600;color:${profitDelta>=0?"var(--green)":"var(--red)"};margin-left:6px">${profitDelta>=0?"▲":"▼"}${Math.abs(profitDelta)}% vs poprzedni miesiąc</span>`
    : "";
  const realizedPct = thisMonthProfit > 0 ? Math.round((thisMonthProfitRealized / thisMonthProfit) * 100) : 0;

  // "Zaległości po pobycie" — rezerwacje postpaid zakończone z brakiem / niepełną wpłatą.
  // Używamy tej samej logiki co warning system w edit modalu (getPaymentWarning).
  const unpaid = savedBookings.filter(b => getPaymentWarning(b) !== null);
  const unpaidTotal = unpaid.reduce((s, b) => {
    const w = getPaymentWarning(b);
    return s + (w?.owed || 0);
  }, 0);

  // Upcoming 7 days: checkouts and checkins
  const in7 = toStr(addDays(parseDate(today), 7));
  const arrivals = savedBookings.filter(b => b.from > today && b.from <= in7);
  const departures = savedBookings.filter(b => b.to > today && b.to <= in7);

  // Revenue delta
  const revDelta = prevMonthRevenue > 0 ? ((thisMonthRevenue - prevMonthRevenue) / prevMonthRevenue * 100).toFixed(1) : null;
  const revDeltaHtml = revDelta !== null
    ? `<span style="font-size:11px;font-weight:600;color:${revDelta>=0?"var(--green)":"var(--red)"};margin-left:6px">${revDelta>=0?"▲":"▼"}${Math.abs(revDelta)}% vs poprzedni miesiąc</span>`
    : "";

  // Location occupancy bars
  const locBars = DATA.locations.map(loc => {
    const total = loc.rooms.length;
    const occ = loc.rooms.filter(r => getRoomStatusToday(r.id).status === "occupied").length;
    const pct = total > 0 ? Math.round(occ / total * 100) : 0;
    const color = pct >= 80 ? "var(--red)" : pct >= 50 ? "var(--orange)" : "var(--green)";
    return `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:12px;font-weight:600">${locIcon(loc, 16)} ${esc(loc.name)}</span>
          <span style="font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums">${occ}/${total} · ${pct}%</span>
        </div>
        <div style="height:6px;background:var(--surface2);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:99px;transition:width 0.4s"></div>
        </div>
      </div>`;
  }).join("");

  // Arrivals list
  const arrivalRows = arrivals.length === 0
    ? `<div style="color:var(--text3);font-size:12px;padding:8px 0">Brak przyjazdów w ciągu 7 dni</div>`
    : arrivals.slice(0,5).map(b => {
        const loc = DATA.locations.find(l=>l.id===b.locId);
        const room = loc?.rooms.find(r=>r.id===b.roomId);
        const who = b.bookingType==="company" ? b.companyName : (b.guests[0]?.name||"—");
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
            <div>
              <div style="font-weight:600">${esc(who)}</div>
              <div style="color:var(--text2);font-size:11px">${loc ? locIcon(loc, 14) : ""} ${esc(loc?.name||"")} · ${esc(room?.name||"")}</div>
            </div>
            <div style="text-align:right">
              <div style="font-variant-numeric:tabular-nums;color:var(--blue)">${fmtDate(b.from)}</div>
              <span class="ibadge ${b.bookingType==="company"?"ibadge-co":"ibadge-in"}">${b.bookingType==="company"?"Firma":"Indyw."}</span>
            </div>
          </div>`;
      }).join("");

  // Departures list
  const departureRows = departures.length === 0
    ? `<div style="color:var(--text3);font-size:12px;padding:8px 0">Brak wyjazdów w ciągu 7 dni</div>`
    : departures.slice(0,5).map(b => {
        const loc = DATA.locations.find(l=>l.id===b.locId);
        const room = loc?.rooms.find(r=>r.id===b.roomId);
        const who = b.bookingType==="company" ? b.companyName : (b.guests[0]?.name||"—");
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
            <div>
              <div style="font-weight:600">${esc(who)}</div>
              <div style="color:var(--text2);font-size:11px">${loc ? locIcon(loc, 14) : ""} ${esc(loc?.name||"")} · ${esc(room?.name||"")}</div>
            </div>
            <div style="text-align:right">
              <div style="font-variant-numeric:tabular-nums;color:var(--orange)">${fmtDate(b.to)}</div>
            </div>
          </div>`;
      }).join("");

  const greet = now.getHours() < 12 ? "Dzień dobry" : now.getHours() < 18 ? "Witaj" : "Dobry wieczór";
  const dayNames = ["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];

  return `

// ─── LOCATIONS TAB ───────────────────────────────────────────
function buildLocations() {
  const q = state.search.toLowerCase();
  const filtered = DATA.locations
    .filter(l => l.name.toLowerCase().includes(q) || l.city.toLowerCase().includes(q))
    .sort((a, b) => a.city.localeCompare(b.city, "pl") || a.name.localeCompare(b.name, "pl"));

  // Group by city
  const byCity = {};
  filtered.forEach(l => {
    if (!byCity[l.city]) byCity[l.city] = [];
    byCity[l.city].push(l);
  });
  const cities = Object.keys(byCity).sort((a, b) => a.localeCompare(b, "pl"));

  if (filtered.length === 0) return `
    <h2 style="font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px">${ICONS.building(22)} Obiekty</h2>
    <p class="sec-label">0 obiektów</p>
    <div class="no-results-box">Brak wyników dla „${esc(state.search)}"</div>`;

  return `
    <h2 style="font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px">${ICONS.building(22)} Obiekty <span style="font-size:12px;font-weight:400;color:var(--text2);margin-left:6px">${filtered.length} ${filtered.length===1?"obiekt":filtered.length<5?"obiekty":"obiektów"} w ${cities.length} ${cities.length===1?"mieście":"miastach"}</span></h2>
    <p class="sec-label" style="margin-bottom:14px">Kliknij obiekt aby zarezerwować pokój</p>
    ${cities.map(city => `
      <div class="city-section">
        <div class="city-section-hdr">${ICONS.mapPin(14)} ${esc(city)} <span>${byCity[city].length}</span></div>
        <div class="loc-grid">${byCity[city].map(buildLocCard).join("")}</div>
      </div>`).join("")}`;
}

function buildLocCard(loc) {
  const min = Math.min(...loc.rooms.map(r=>r.basePrice));
  const rc = loc.rooms.length;
  const img = locImages[loc.id];
  const imgEl = img
    ? `<div class="loc-img" style="background:url('/loc_images/${esc(img)}?t=${Date.now()}') center/cover"></div>`
    : `<div class="loc-img" style="color:var(--text3)">${locIcon(loc, 44)}</div>`;
  return `
    <div class="loc-card" data-locid="${loc.id}">
      ${imgEl}
      <div class="loc-info">
        <div class="loc-name">${esc(loc.name)}</div>
        <div class="loc-city" style="display:flex;align-items:center;gap:4px">${ICONS.mapPin(11)} ${esc(loc.city)}</div>
        <div class="loc-rooms">${rc} ${npokoi(rc)} · od zł${min}/noc</div>
      </div>
    </div>`;
}

// ─── STATUS TAB ──────────────────────────────────────────────
function buildStatus() {
  const today = todayStr();
  const df = state.statusFrom || today;
  const dt = state.statusTo || toStr(addDays(parseDate(today), 30));

  // If detail view for specific location
  if (state.statusDetailLocId) {
    return buildStatusDetail(state.statusDetailLocId, df, dt);
  }

  // Overview: global date picker + all locations grid
  const from = state.statusSearched ? df : null;
  const to   = state.statusSearched ? dt : null;
  const sq = (state.statusSearch||"").toLowerCase();
  const filteredLocs = DATA.locations.filter(l =>
    l.name.toLowerCase().includes(sq) || l.city.toLowerCase().includes(sq)
  );

  return `
    <h2 style="font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px">${ICONS.grid(22)} Status obiektów</h2>

    <div class="status-controls">
      <div class="ctrl-group">
        <label>Od</label>
        <input type="date" id="statusFrom" value="${esc(df)}" />
      </div>
      <div class="ctrl-group">
        <label>Do</label>
        <input type="date" id="statusTo" value="${esc(dt)}" />
      </div>
      <div class="ctrl-group" style="flex:1;min-width:160px">
        <label>Szukaj obiektu</label>
        <div class="search-wrap" style="max-width:100%">
          <span class="search-icon">${ICONS.search(13)}</span>
          <input type="text" id="statusSearch" placeholder="Nazwa lub miasto…" value="${esc(state.statusSearch||"")}" autocomplete="off" />
        </div>
      </div>
      <button class="ctrl-search-btn" id="statusSearchBtn">Pokaż status</button>
      ${state.statusSearched ? `<button class="ctrl-search-btn" id="statusClearBtn" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)">Dzisiaj</button>` : ""}
    </div>

    <p class="sec-label">
      ${state.statusSearched
        ? `Status ${fmtDate(df)} → ${fmtDate(dt)} — ${filteredLocs.length} ${npokoi(filteredLocs.length).replace("pokój","obiekt").replace("pokoje","obiekty").replace("pokoi","obiektów")} — kliknij aby zobaczyć szczegóły`
        : `Aktualny stan (${fmtDate(today)}) — kliknij obiekt aby zobaczyć szczegóły`
      }

    ${filteredLocs.length===0 ? `<div class="no-results-box">Brak obiektów pasujących do „${esc(state.statusSearch)}"</div>` :

      ${filteredLocs.map(loc => buildStatusLocCard(loc, from, to)).join("")}
